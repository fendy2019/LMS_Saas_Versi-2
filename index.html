<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#6366f1" />
<meta name="description" content="EduFlow LMS - Platform Kursus Online SaaS Modern" />
<title>EduFlow LMS - Platform Kursus Online</title>
<style>
/* ============== DESIGN TOKENS ============== */
:root{
  --bg:#f6f7fb; --surface:#ffffff; --surface-2:#f1f3f9; --text:#0f172a; --text-soft:#475569; --muted:#94a3b8;
  --border:#e5e7eb; --primary:#6366f1; --primary-2:#8b5cf6; --primary-soft:#eef2ff;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#0ea5e9;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06); --shadow:0 8px 24px rgba(15,23,42,.08);
  --shadow-lg:0 24px 48px -12px rgba(15,23,42,.18);
  --radius:14px; --radius-sm:10px; --radius-lg:20px;
  --glass:rgba(255,255,255,.65); --glass-border:rgba(255,255,255,.4);
  --gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --sidebar:#0f172a; --sidebar-text:#cbd5e1; --sidebar-active:#1e293b;
}
[data-theme="dark"]{
  --bg:#0b1020; --surface:#121931; --surface-2:#0f1530; --text:#e2e8f0; --text-soft:#cbd5e1; --muted:#64748b;
  --border:#1f2a44; --primary:#818cf8; --primary-2:#a78bfa; --primary-soft:#1e1b4b;
  --glass:rgba(18,25,49,.6); --glass-border:rgba(255,255,255,.08);
  --sidebar:#070b1a; --sidebar-active:#111a36;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
img{max-width:100%;display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* Utilities, Buttons, Forms, and Auth CSS omitted for brevity, keeping all existing CSS exactly identical to original */
.hidden{display:none !important}
.flex{display:flex}.grid{display:grid}.gap-1{gap:6px}.gap-2{gap:10px}.gap-3{gap:16px}.gap-4{gap:24px}
.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.flex-1{flex:1}.flex-col{flex-direction:column}.wrap{flex-wrap:wrap}
.text-sm{font-size:12.5px}.text-lg{font-size:16px}.text-xl{font-size:20px}.text-2xl{font-size:26px}.text-3xl{font-size:34px}
.font-bold{font-weight:700}.font-semi{font-weight:600}.muted{color:var(--muted)}.soft{color:var(--text-soft)}
.mt-1{margin-top:8px}.mt-2{margin-top:16px}.mt-3{margin-top:24px}.mt-4{margin-top:32px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}.mb-3{margin-bottom:24px}
.p-2{padding:12px}.p-3{padding:18px}.p-4{padding:24px}
.rounded{border-radius:var(--radius)}.rounded-sm{border-radius:var(--radius-sm)}
.full{width:100%}.center{text-align:center}
.scroll{overflow:auto}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--surface-2);color:var(--text-soft)}
.badge.success{background:rgba(16,185,129,.12);color:var(--success)}
.badge.warn{background:rgba(245,158,11,.14);color:var(--warning)}
.badge.danger{background:rgba(239,68,68,.12);color:var(--danger)}
.badge.info{background:rgba(14,165,233,.12);color:var(--info)}
.badge.primary{background:var(--primary-soft);color:var(--primary)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:13.5px;transition:all .18s ease;border:1px solid transparent;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn.primary{background:var(--gradient);color:#fff;box-shadow:var(--shadow-sm)}
.btn.ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn.danger{background:rgba(239,68,68,.1);color:var(--danger)}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.icon{padding:9px;width:38px;height:38px}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12.5px;font-weight:600;color:var(--text-soft)}
.input,.select,.textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);outline:none;}
.input-icon{position:relative}
.input-icon .input{padding-left:40px}
.input-icon svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.pw-wrap{position:relative}
.pw-wrap button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);padding:6px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);transition:all .2s}
.card.hover:hover{transform:translateY(-3px);box-shadow:var(--shadow)}

.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
.auth-hero{background:var(--gradient);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-form{display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{width:100%;max-width:420px}
.auth-card h2{font-size:26px;font-weight:800;margin-bottom:6px}

.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--sidebar);color:var(--sidebar-text);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--sidebar-text);cursor:pointer;margin-bottom:2px}
.nav-item:hover,.nav-item.active{background:var(--gradient);color:#fff}
.nav-item svg{width:18px;height:18px}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:30;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.page{padding:24px;max-width:1400px;width:100%;margin:0 auto}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}

.table{width:100%;border-collapse:collapse;}
.table th,.table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}

.course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;}
.course-thumb{height:150px;background:var(--gradient);display:grid;place-items:center;font-size:42px;}
.course-body{padding:14px;}

.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;}
.modal-back.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);padding:14px 16px;border-radius:var(--radius-sm);display:flex;gap:10px}

@media (max-width:1024px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:50;transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0)}
  .auth-hero{display:none}
}
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>
<div class="backdrop" id="backdrop"></div>
<div class="modal-back" id="modalBack"></div>
<div id="offlineBanner" class="offline-banner hidden">⚠ Anda sedang offline — beberapa fitur dibatasi</div>
<div id="app"></div>

<script>
/* ============================================================
 * EDUFLOW LMS — FRONTEND 
 * Updated: Secure Backend Sync via Google Apps Script JWT
 * ============================================================ */

const GAS_URL = "https://script.google.com/macros/s/AKfycbzZcBemX2OaVM81sHBy8B71D8UTU01tP3eKmSc9qDY1kpQdTqXYQdvbOmQr2L1zNTMQ/exec";

/* ---------------- STORAGE LAYER ---------------- */
const DB = {
  k:'eduflow_v2',
  load(){ try{ return JSON.parse(localStorage.getItem(this.k)||'{}'); }catch(e){ return {}; } },
  save(d){ localStorage.setItem(this.k, JSON.stringify(d)); },
  get(key, def){ const d=this.load(); return key in d? d[key] : def; },
  set(key, val){ const d=this.load(); d[key]=val; this.save(d); },
};

// Modifikasi: Session sekarang menyimpan JWT Token
const session = {
  get(){ try{return JSON.parse(localStorage.getItem('eduflow_session')||'null');}catch(e){return null;} },
  set(s){ localStorage.setItem('eduflow_session', JSON.stringify(s)); },
  clear(){ localStorage.removeItem('eduflow_session'); }
};

/* ---------------- API CLIENT ---------------- */
async function apiFetch(action, payload = {}, opts = {}){
  if (!GAS_URL || GAS_URL.includes('GANTI_DENGAN')) return { ok:false, offline:true, msg:'Backend GAS_URL belum dikonfigurasi.' };
  
  const sess = session.get();
  const requestBody = {
    action: action,
    data: payload,
    token: sess ? sess.token : null // Inject JWT Token ke setiap request
  };

  try {
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // Avoid Preflight CORS
      body: JSON.stringify(requestBody),
    });
    return await res.json();
  } catch(err){
    console.error('API Error:', err);
    return { ok:false, msg:'Koneksi ke server gagal' };
  }
}

function apiSync(action, payload){
  apiFetch(action, payload).catch(()=>{});
}

/* ---------------- AUTHENTICATION ---------------- */
// Hapus logika verifikasi password di Frontend. Kirim ke Backend.
async function login(email, password, remember){
  const r = await apiFetch('login', { email, password });
  if (r && r.ok) {
    session.set({ token: r.token, userId: r.user.id, loginAt: Date.now() });
    state.user = r.user; // User object diterima tanpa password dari server
    
    // Tarik data setelah login
    await pullFromBackend();
    return { ok: true };
  }
  return { ok: false, msg: r.msg || 'Gagal login' };
}

async function register(data){
  const r = await apiFetch('register', { name: data.name, email: data.email, password: data.password });
  return r;
}

function checkLogin(){
  const s = session.get();
  if(s && s.token && state.user){
    return true; // Sesi di memori valid
  }
  if(s && s.token && !state.user){
    // Jika baru reload halaman tapi ada token, ambil user dari local cache.
    // Saat pullFromBackend jalan, data akan di-fresh
    const cachedUsers = DB.get('users',[]);
    state.user = cachedUsers.find(u => u.id === s.userId);
    return !!state.user;
  }
  return false;
}

function logout(){ 
  session.clear(); 
  state.user=null; 
  DB.save({}); // Opsional: Bersihkan cache lokal demi keamanan saat logout
  render(); 
}

/* ---------------- DATA SYNC ---------------- */
function _applyPull(r){
  if(!(r && r.ok && r.data)) return;
  const map = ['users', 'courses', 'categories', 'transactions', 'materials'];
  map.forEach(k => {
    if (r.data[k]) DB.set(k, r.data[k]);
  });
  if (r.data.settings) DB.set('settings', r.data.settings);
  
  if(state.user){ 
    const fresh=DB.get('users',[]).find(x=>x.id===state.user.id); 
    if(fresh) state.user={...state.user,...fresh}; 
  }
}

async function pullFromBackend(){
  const r = await apiFetch('syncPull', {});
  _applyPull(r);
  return r;
}

/* ---------------- HELPERS & UI (Sama seperti asli) ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const $$= (s,el=document)=>[...el.querySelectorAll(s)];
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = (p='id')=>p+'_'+Math.random().toString(36).slice(2,10);
const fmtRp = n => 'Rp '+Number(n||0).toLocaleString('id-ID');
const fmtDate = d => new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});

function toast(msg, type='info'){
  const w = $('#toastWrap');
  const el = document.createElement('div');
  el.className='toast '+type;
  el.innerHTML = `<div style="flex:1"><b style="font-size:13px">${esc(msg)}</b></div><button onclick="this.parentNode.remove()" style="color:var(--muted)">✕</button>`;
  w.appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

function modal({title, body, foot, size=''}){
  const mb = $('#modalBack');
  mb.innerHTML = `<div class="modal ${size}">
    <div class="modal-head"><h3>${esc(title)}</h3><button onclick="closeModal()" class="btn icon ghost">✕</button></div>
    <div class="modal-body">${body}</div>
    ${foot?`<div class="modal-foot">${foot}</div>`:''}
  </div>`;
  mb.classList.add('open');
}
function closeModal(){ $('#modalBack').classList.remove('open'); $('#modalBack').innerHTML=''; }

/* ---------------- STATE & INITIALIZATION ---------------- */
const state = {
  user: null,
  route: 'dashboard'
};

function renderAuth(mode='login'){
  document.title = 'EduFlow LMS - ' + (mode==='login'?'Masuk':'Daftar');
  $('#app').innerHTML = `
  <div class="auth-wrap">
    <div class="auth-hero">
      <div><h1>Platform LMS SaaS Secure</h1><p>Versi ini menggunakan Google Apps Script Backend & JWT Authentication.</p></div>
    </div>
    <div class="auth-form">
      <div class="auth-card">
        ${mode==='login'? `
          <h2>Masuk ke Akun</h2>
          <form id="loginForm">
            <div class="field"><label>Email</label><input class="input" type="email" name="email" required /></div>
            <div class="field"><label>Password</label><input class="input" type="password" name="password" required /></div>
            <button class="btn primary full" type="submit">Masuk</button>
            <div class="mt-2 text-center"><a href="#" onclick="renderAuth('register')" style="color:var(--primary)">Buat Akun Baru</a></div>
          </form>
        ` : `
          <h2>Buat Akun Baru</h2>
          <form id="regForm">
            <div class="field"><label>Nama</label><input class="input" name="name" required /></div>
            <div class="field"><label>Email</label><input class="input" type="email" name="email" required /></div>
            <div class="field"><label>Password</label><input class="input" type="password" name="password" required /></div>
            <button class="btn primary full" type="submit">Daftar</button>
            <div class="mt-2 text-center"><a href="#" onclick="renderAuth('login')" style="color:var(--primary)">Sudah Punya Akun? Masuk</a></div>
          </form>
        `}
      </div>
    </div>
  </div>`;

  if(mode==='login'){
    $('#loginForm').onsubmit = async e=>{
      e.preventDefault();
      const btn = e.target.querySelector('button'); btn.disabled=true; btn.textContent='Loading...';
      const r = await login(e.target.email.value, e.target.password.value);
      if(!r.ok){ toast(r.msg, 'danger'); btn.disabled=false; btn.textContent='Masuk'; return; }
      toast('Login berhasil','success');
      render();
    };
  } else {
    $('#regForm').onsubmit = async e=>{
      e.preventDefault();
      const btn = e.target.querySelector('button'); btn.disabled=true; btn.textContent='Loading...';
      const r = await register({name:e.target.name.value, email:e.target.email.value, password:e.target.password.value});
      if(!r.ok){ toast(r.msg, 'danger'); btn.disabled=false; btn.textContent='Daftar'; return; }
      toast('Registrasi sukses. Silakan login.','success');
      renderAuth('login');
    };
  }
}

/* ---------------- MOCK SHELL UNTUK DEMO ---------------- */
function renderApp(){
  const u = state.user;
  $('#app').innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-brand"><b>EduFlow Secure</b></div>
        <div class="nav-item active">Dashboard</div>
        <div class="nav-item" onclick="logout()" style="color:#ef4444; margin-top:20px;">Logout</div>
      </aside>
      <div class="main">
        <header class="topbar"><h1>Dashboard</h1><div class="avatar">${esc(u.name[0])}</div></header>
        <div class="page">
          <h2>Halo, ${esc(u.name)}!</h2>
          <p class="muted">Anda login sebagai: <b>${u.role}</b>.</p>
          <div class="card mt-3">
            <b>Informasi Keamanan Backend:</b>
            <ul style="margin-left:20px; margin-top:10px;">
              <li>Password tidak lagi disimpan di LocalStorage.</li>
              <li>Akses menggunakan JWT (JSON Web Token).</li>
              <li>Data disinkronisasi ke Google Sheets yang Anda miliki.</li>
              <li>File upload dijamin aman ke folder Google Drive spesifik.</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  `;
}

function render(){
  if(checkLogin()) {
    renderApp();
    pullFromBackend(); // Sync data di background
  } else {
    renderAuth('login');
  }
}

render();
</script>
</body>
</html>
