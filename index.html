function quizQuestionsEditor(cid, mid, after){
  const render = ()=>{
    const cs = DB.get('courses',[]); const c = cs.find(x=>x.id===cid);
    const m = c.modules.find(x=>x.id===mid);
    m.questions = (m.questions||[]).map(normalizeQuestion);
    const total = m.questions.reduce((a,b)=>a+(b.points||1),0);
    modal({ title:'Kelola Soal — '+m.title, size:'lg',
      body:`<div>
        <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:10px">
          <div><b>${m.questions.length} soal</b> · total <b>${total} poin</b> · passing <b>${m.passingGrade??70}%</b></div>
          <button class="btn primary sm" id="addQ">+ Tambah Soal</button>
        </div>
        <div id="qList" style="max-height:55vh;overflow:auto"></div>
      </div>`,
      foot:`<button class="btn primary" onclick="closeModal()">Selesai</button>`
    });
    const list = $('#qList');
    const drawList=()=>{
      list.innerHTML = m.questions.length? m.questions.map((qq,i)=>{
        let ansPreview='';
        if(qq.type==='multiple_choice') ansPreview = (qq.opts||[]).map((o,j)=>`<div class="${j===qq.answer?'badge success':'badge'}" style="display:inline-block;margin:2px">${esc(o)}${j===qq.answer?' ✓':''}</div>`).join('');
        else if(qq.type==='multiple_select') ansPreview = (qq.opts||[]).map((o,j)=>`<div class="${(qq.answer||[]).includes(j)?'badge success':'badge'}" style="display:inline-block;margin:2px">${esc(o)}${(qq.answer||[]).includes(j)?' ✓':''}</div>`).join('');
        else if(qq.type==='true_false') ansPreview = `<span class="badge success">Jawaban: ${qq.answer?'Benar':'Salah'}</span>`;
        else if(qq.type==='short_answer' || qq.type==='fill_blank') ansPreview = `<span class="badge success">Jawaban: ${esc((qq.answer||[]).join(' / '))}</span>`;
        else if(qq.type==='essay') ansPreview = `<span class="badge warn">Dinilai manual</span>`;
        else if(qq.type==='matching') ansPreview = (qq.pairs||[]).map(p=>`<span class="badge success" style="margin:2px">${esc(p.left)} ↔ ${esc(p.right)}</span>`).join('');
        else if(qq.type==='ordering') ansPreview = (qq.items||[]).map((o,j)=>`<span class="badge success" style="margin:2px">${j+1}. ${esc(o)}</span>`).join('');
        return `<div class="card mt-1" style="background:var(--surface-2)">
          <div class="flex" style="justify-content:space-between;gap:8px">
            <div class="flex-1">
              <span class="badge primary">${QTYPE_LABEL[qq.type]||qq.type}</span>
              <span class="badge">${qq.points||1} poin</span>
              <div style="margin-top:6px"><b>${i+1}. ${esc(qq.q||'(tanpa pertanyaan)')}</b></div>
              <div style="margin-top:6px">${ansPreview}</div>
              ${qq.explanation?`<div class="muted text-sm mt-1">💡 ${esc(qq.explanation)}</div>`:''}
            </div>
            <div class="flex gap-1">
              <button class="btn sm ghost" data-up="${i}">▲</button>
              <button class="btn sm ghost" data-dn="${i}">▼</button>
              <button class="btn sm" data-eq="${i}">Edit</button>
              <button class="btn sm danger" data-rm="${i}">Hapus</button>
            </div>
          </div>
        </div>`;
      }).join('') : '<div class="empty">Belum ada soal</div>';
      $$('[data-rm]',list).forEach(b=>b.onclick=()=>confirmModal('Hapus soal ini?',()=>{
        m.questions.splice(+b.dataset.rm,1); save(); drawList();
      }));
      $$('[data-eq]',list).forEach(b=>b.onclick=()=>questionForm(m.questions[+b.dataset.eq], (q)=>{ m.questions[+b.dataset.eq]=q; save(); drawList(); }));
      $$('[data-up]',list).forEach(b=>b.onclick=()=>{ const i=+b.dataset.up; if(i>0){ [m.questions[i-1],m.questions[i]]=[m.questions[i],m.questions[i-1]]; save(); drawList(); }});
      $$('[data-dn]',list).forEach(b=>b.onclick=()=>{ const i=+b.dataset.dn; if(i<m.questions.length-1){ [m.questions[i+1],m.questions[i]]=[m.questions[i],m.questions[i+1]]; save(); drawList(); }});
    };
    const save=()=>{ DB.set('courses',cs); apiSync('syncPush',{courses:cs}); };
    $('#addQ').onclick = ()=>questionForm(null,(q)=>{ m.questions.push(q); save(); drawList(); });
    drawList();
  };
  render();
  // refresh underlying list after close
  const orig = window.closeModal;
  // no override needed — after callback runs on each save via drawList
  setTimeout(()=>{ const oc = $('.modal-close'); if(oc) oc.addEventListener('click', ()=>after&&after(), {once:true}); }, 100);
}

function questionForm(existing, onSave){
  const q = existing ? JSON.parse(JSON.stringify(existing)) : { type:'multiple_choice', q:'', opts:['',''], answer:0, points:1, explanation:'' };
  modal({ title: existing?'Edit Soal':'Tambah Soal', size:'lg',
    body:`<form id="qf">
      <div class="grid-2">
        <div class="field"><label>Tipe Soal</label>
          <select class="select" name="type">${QTYPES.map(t=>`<option value="${t.v}" ${q.type===t.v?'selected':''}>${t.l}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Poin</label><input class="input" type="number" min="1" name="points" value="${q.points||1}"/></div>
      </div>
      <div class="field"><label>Pertanyaan</label><textarea class="textarea" name="q" required>${esc(q.q||'')}</textarea></div>
      <div id="qBody"></div>
      <div class="field"><label>Penjelasan / Pembahasan (opsional)</label><textarea class="textarea" name="explanation">${esc(q.explanation||'')}</textarea></div>
    </form>`,
    foot:`<button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="qSave">Simpan Soal</button>`
  });

  const body = $('#qBody');
  const drawBody=()=>{
    const t = $('#qf').type.value;
    q.type = t;
    if(t==='multiple_choice' || t==='multiple_select'){
      if(!Array.isArray(q.opts)||!q.opts.length) q.opts=['',''];
      if(t==='multiple_select' && !Array.isArray(q.answer)) q.answer=[];
      if(t==='multiple_choice' && Array.isArray(q.answer)) q.answer=q.answer[0]??0;
      body.innerHTML = `
        <div class="field"><label>Opsi Jawaban (centang yang benar)</label>
          <div id="optList"></div>
          <button type="button" class="btn sm mt-1" id="addOpt">+ Tambah Opsi</button>
        </div>`;
      const drawOpts=()=>{
        $('#optList').innerHTML = q.opts.map((o,i)=>`
          <div class="flex gap-1 mt-1" style="align-items:center">
            <input type="${t==='multiple_choice'?'radio':'checkbox'}" name="ans" ${
              t==='multiple_choice' ? (q.answer===i?'checked':'') : ((q.answer||[]).includes(i)?'checked':'')
            } data-i="${i}"/>
            <input class="input flex-1" value="${esc(o)}" data-o="${i}" placeholder="Opsi ${i+1}"/>
            <button type="button" class="btn sm danger" data-ro="${i}">✕</button>
          </div>`).join('');
        $$('[data-o]').forEach(inp=>inp.oninput=()=>{ q.opts[+inp.dataset.o]=inp.value; });
        $$('[data-ro]').forEach(b=>b.onclick=()=>{ q.opts.splice(+b.dataset.ro,1); if(t==='multiple_choice'){ if(q.answer>=q.opts.length) q.answer=0;} else { q.answer=(q.answer||[]).filter(x=>x!==+b.dataset.ro).map(x=>x>+b.dataset.ro?x-1:x); } drawOpts(); });
        $$('input[name="ans"]').forEach(r=>r.onchange=()=>{
          const i = +r.dataset.i;
          if(t==='multiple_choice'){ q.answer=i; }
          else {
            q.answer = q.answer||[];
            if(r.checked){ if(!q.answer.includes(i)) q.answer.push(i); } else { q.answer = q.answer.filter(x=>x!==i); }
          }
        });
      };
      $('#addOpt').onclick=()=>{ q.opts.push(''); drawOpts(); };
      drawOpts();
    } else if(t==='true_false'){
      if(typeof q.answer!=='boolean') q.answer=true;
      body.innerHTML = `<div class="field"><label>Jawaban Benar</label>
        <select class="select" id="tfAns"><option value="1" ${q.answer?'selected':''}>Benar</option><option value="0" ${!q.answer?'selected':''}>Salah</option></select>
      </div>`;
      $('#tfAns').onchange = e => q.answer = e.target.value==='1';
    } else if(t==='short_answer' || t==='fill_blank'){
      if(!Array.isArray(q.answer)) q.answer=[''];
      const hint = t==='fill_blank' ? 'Gunakan ___ pada pertanyaan untuk menandai bagian kosong.' : 'Beberapa varian jawaban dianggap benar (case-insensitive).';
      body.innerHTML = `<div class="field"><label>Jawaban yang Diterima</label>
        <div class="muted text-sm" style="margin-bottom:6px">${hint}</div>
        <div id="ansList"></div>
        <button type="button" class="btn sm mt-1" id="addAns">+ Tambah Varian</button>
      </div>`;
      const drawA=()=>{
        $('#ansList').innerHTML = q.answer.map((a,i)=>`<div class="flex gap-1 mt-1">
          <input class="input flex-1" value="${esc(a)}" data-a="${i}" placeholder="Jawaban benar ${i+1}"/>
          <button type="button" class="btn sm danger" data-ra="${i}">✕</button>
        </div>`).join('');
        $$('[data-a]').forEach(inp=>inp.oninput=()=>q.answer[+inp.dataset.a]=inp.value);
        $$('[data-ra]').forEach(b=>b.onclick=()=>{ q.answer.splice(+b.dataset.ra,1); if(!q.answer.length) q.answer=['']; drawA(); });
      };
      $('#addAns').onclick=()=>{ q.answer.push(''); drawA(); };
      drawA();
    } else if(t==='essay'){
      body.innerHTML = `<div class="field"><label>Panduan Penilaian / Rubrik (opsional)</label>
        <textarea class="textarea" id="essayRub" placeholder="Catatan untuk instruktur saat menilai...">${esc(q.rubric||'')}</textarea>
        <div class="muted text-sm" style="margin-top:6px">⚠️ Esai dinilai manual oleh instruktur.</div>
      </div>`;
      $('#essayRub').oninput=e=>q.rubric=e.target.value;
      q.answer = null;
    } else if(t==='matching'){
      if(!Array.isArray(q.pairs)||!q.pairs.length) q.pairs=[{left:'',right:''},{left:'',right:''}];
      body.innerHTML = `<div class="field"><label>Pasangan (kiri ↔ kanan)</label>
        <div id="pairList"></div>
        <button type="button" class="btn sm mt-1" id="addPair">+ Tambah Pasangan</button>
      </div>`;
      const drawP=()=>{
        $('#pairList').innerHTML = q.pairs.map((p,i)=>`<div class="flex gap-1 mt-1">
          <input class="input flex-1" value="${esc(p.left)}" data-pl="${i}" placeholder="Kiri ${i+1}"/>
          <span style="align-self:center">↔</span>
          <input class="input flex-1" value="${esc(p.right)}" data-pr="${i}" placeholder="Kanan ${i+1}"/>
          <button type="button" class="btn sm danger" data-rp="${i}">✕</button>
        </div>`).join('');
        $$('[data-pl]').forEach(i=>i.oninput=()=>q.pairs[+i.dataset.pl].left=i.value);
        $$('[data-pr]').forEach(i=>i.oninput=()=>q.pairs[+i.dataset.pr].right=i.value);
        $$('[data-rp]').forEach(b=>b.onclick=()=>{ q.pairs.splice(+b.dataset.rp,1); drawP(); });
      };
      $('#addPair').onclick=()=>{ q.pairs.push({left:'',right:''}); drawP(); };
      drawP();
    } else if(t==='ordering'){
      if(!Array.isArray(q.items)||!q.items.length) q.items=['',''];
      body.innerHTML = `<div class="field"><label>Item dalam Urutan Benar (atas → bawah)</label>
        <div id="ordList"></div>
        <button type="button" class="btn sm mt-1" id="addOrd">+ Tambah Item</button>
      </div>`;
      const drawO=()=>{
        $('#ordList').innerHTML = q.items.map((o,i)=>`<div class="flex gap-1 mt-1" style="align-items:center">
          <b style="width:24px">${i+1}.</b>
          <input class="input flex-1" value="${esc(o)}" data-oi="${i}" placeholder="Item ${i+1}"/>
          <button type="button" class="btn sm ghost" data-ou="${i}">▲</button>
          <button type="button" class="btn sm ghost" data-od="${i}">▼</button>
          <button type="button" class="btn sm danger" data-or="${i}">✕</button>
        </div>`).join('');
        $$('[data-oi]').forEach(inp=>inp.oninput=()=>q.items[+inp.dataset.oi]=inp.value);
        $$('[data-or]').forEach(b=>b.onclick=()=>{ q.items.splice(+b.dataset.or,1); drawO(); });
        $$('[data-ou]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.ou; if(i>0){[q.items[i-1],q.items[i]]=[q.items[i],q.items[i-1]]; drawO();} });
        $$('[data-od]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.od; if(i<q.items.length-1){[q.items[i+1],q.items[i]]=[q.items[i],q.items[i+1]]; drawO();} });
      };
      $('#addOrd').onclick=()=>{ q.items.push(''); drawO(); };
      drawO();
    }
  };
  $('#qf').type.onchange = drawBody;
  drawBody();

  $('#qSave').onclick = ()=>{
    const f = $('#qf');
    q.q = f.q.value.trim();
    q.points = +f.points.value||1;
    q.explanation = f.explanation.value;
    if(!q.q){ toast('Pertanyaan wajib diisi','danger'); return; }
    closeModal(); onSave(q);
  };
}

    const data = filter==='all'?trx:trx.filter(t=>t.status===filter);
    el.innerHTML = `
      <div class="page-head"><div><h2>Transaksi</h2><p>Total ${trx.length} transaksi</p></div></div>
      <div class="tabs">
        ${['all','success','pending','failed'].map(s=>`<button data-f="${s}" class="${filter===s?'active':''}">${s==='all'?'Semua':s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}
      </div>
      <div class="table-wrap"><table class="table">
        <thead><tr><th>ID</th><th>Peserta</th><th>Kursus</th><th>Gateway</th><th>Jumlah</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead>
        <tbody>${data.length?data.map(t=>{
          const isManual = t.gateway==='qris' || t.gateway==='bank';
          const canSuccess = isManual && t.status==='pending';
          const canRefund = t.status==='success';
          const actions = [
            canSuccess?`<button class="btn sm success" data-ok="${t.id}">✓ Success</button>`:'',
            canRefund?`<button class="btn sm danger" data-rf="${t.id}">↩ Refund</button>`:''
          ].filter(Boolean).join(' ') || '<span class="muted text-sm">-</span>';
          const title = t.courseTitle || (Array.isArray(t.courseTitles)? t.courseTitles.join(', ') : '');
          const amt = t.amount!=null? t.amount : (t.total!=null? t.total : 0);
          return `<tr><td><code style="font-size:11px">${t.id}</code></td><td>${esc(t.userName||'')}</td><td>${esc(title)}</td><td><span class="badge">${esc(t.gateway||'')}</span></td><td><b>${fmtRp(amt)}</b></td>
          <td><span class="badge ${t.status==='success'?'success':t.status==='pending'?'warn':'danger'}">${t.status}</span></td>
          <td>${fmtDate(t.createdAt)}</td>
          <td>${actions}</td></tr>`;
        }).join(''):'<tr><td colspan="8"><div class="empty">Belum ada transaksi</div></td></tr>'}</tbody>
      </table></div>
    `;
    el.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{filter=b.dataset.f;render();});
    el.querySelectorAll('[data-ok]').forEach(b=>b.onclick=()=>confirmModal('Tandai transaksi ini SUCCESS & aktifkan akses kursus peserta?', async ()=>{
      const r = await apiFetch('confirmPayment', { id: b.dataset.ok });
      if (!r || !r.ok){ toast('Gagal: '+((r&&r.msg)||'unknown'),'danger'); return; }
      await pullFromBackend(true);
      toast('Transaksi dikonfirmasi success','success');
      if (state.user){ const u=(DB.get('users',[])||[]).find(x=>x.id===state.user.id); if(u) state.user=u; }
      PAGES.transactions(el);
    }));
    el.querySelectorAll('[data-rf]').forEach(b=>b.onclick=()=>confirmModal('Proses refund transaksi ini?', async ()=>{
      const r = await apiFetch('refundPayment', { id: b.dataset.rf });
      if (!r || !r.ok){ toast('Gagal: '+((r&&r.msg)||'unknown'),'danger'); return; }
      await pullFromBackend(true);
      toast('Refund diproses','success');
      PAGES.transactions(el);
    }));
  };
  render();
};

function gatewayConfigForm(id, after){

  modal({title:`⚙️ Konfigurasi ${g.name}`, size:'md',

      </div>

        <b>Aktifkan ${g.name}</b>
      </label></div>
      <div class="field"><label>Mode</label>
        <select class="select" name="mode">
          <option value="sandbox" ${cfg.mode!=='live'?'selected':''}>🧪 Sandbox / Test</option>
          <option value="live" ${cfg.mode==='live'?'selected':''}>🟢 Live / Production</option>
        </select>
      </div>
      ${g.fields.map(fd=>`<div class="field"><label>${fd.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase())}</label>

      </div>`).join('')}
      <div class="muted text-sm">⚠️ Kredensial disimpan terenkripsi di backend.</div>

    foot:`<button class="btn danger" id="gcDel">Hapus Config</button><button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="gcSave">💾 Simpan</button>`
  });
  $('#gcSave').onclick=()=>{
    const f=$('#gcF');
    const newCfg = { enabled:f.enabled.checked, mode:f.mode.value };
    g.fields.forEach(fd=>newCfg[fd]=f[fd].value);
    s.gateways[id] = newCfg; savePaySettings(s);
    closeModal(); toast(g.name+' tersimpan','success'); after&&after();
  };
  $('#gcDel').onclick=()=>confirmModal('Hapus konfigurasi '+g.name+'?',()=>{
    delete s.gateways[id]; savePaySettings(s);
    closeModal(); toast('Dihapus','success'); after&&after();
  });
}

function simulatePayment(gw){
  const g = PAYMENT_GATEWAYS.find(x=>x.id===gw);
  const amount = Math.floor(50000+Math.random()*500000);
  modal({title:`Simulasi ${g.name}`, size:'md',
    body:`<div class="center" style="text-align:center">
      <div style="font-size:64px">${g.icon}</div>
      <b class="text-lg">${g.name}</b>
      <p class="muted">Memproses pembayaran sebesar</p>
      <div style="font-size:28px;font-weight:bold;color:var(--primary)">${fmtRp(amount)}</div>
      <p class="muted text-sm">Pilih hasil simulasi:</p>
    </div>`,
    foot:`<button class="btn danger" data-r="failed">✕ Failed</button>
          <button class="btn ghost" data-r="pending">⏳ Pending</button>
          <button class="btn primary" data-r="success">✓ Success</button>`
  });
  $$('[data-r]').forEach(b=>b.onclick=()=>{
    const status = b.dataset.r;
    const h = DB.get('paymentTests',[]);
    h.unshift({id:'pt_'+Date.now(), gateway:gw, amount, status, at:Date.now()});
    DB.set('paymentTests',h);
    closeModal();
    toast(`${g.name}: ${status.toUpperCase()}`, status==='success'?'success':status==='pending'?'warn':'danger');
    renderPage();
  });
}

function getAudienceOptions(){
  const opts = [
    {v:'all',                 l:'👥 Semua Pengguna'},
    {v:'student_all',         l:'🎓 Semua Peserta'},
    {v:'student_active',      l:'🎓 Peserta — Aktif'},
    {v:'student_inactive',    l:'🎓 Peserta — Nonaktif'},
    {v:'instructor_all',      l:'🧑‍🏫 Semua Instruktur'},
    {v:'affiliate_all',       l:'🤝 Semua Affiliate'},
  ];
  // tambahkan tiap paket membership sebagai audience
  (DB.get('memberships',[])||[]).forEach((p,i)=>{
    opts.push({v:'mbr_'+(p.id||i), l:'💎 Membership: '+p.name});
  });
  // tiap kursus
  (DB.get('courses',[])||[]).forEach(c=>{
    opts.push({v:'course_'+c.id, l:'📘 Peserta kursus: '+c.title});
  });
  return opts;
}
function audienceCount(v){
  const users = DB.get('users',[]);
  if(v==='all') return users.length;
  if(v==='student_all') return users.filter(u=>u.role==='student').length;
  if(v==='student_active') return users.filter(u=>u.role==='student'&&u.status==='active').length;
  if(v==='student_inactive') return users.filter(u=>u.role==='student'&&u.status==='inactive').length;
  if(v==='instructor_all') return DB.get('instructors',[]).length;
  if(v==='affiliate_all') return DB.get('affiliates',[]).length;
  if(v.startsWith('course_')){ const cid=v.slice(7); return users.filter(u=>u.enrolled?.some(e=>e.courseId===cid)).length; }
  if(v.startsWith('mbr_')){ return users.filter(u=>u.membership===v.slice(4)).length; }
  return 0;
}

/* ===== View-only protection helpers (block right-click / save shortcuts inside viewer) ===== */
function _viewerGuard(on){
  const stop = e => { e.preventDefault(); e.stopPropagation(); return false; };
  const keyStop = e => {
    // Block Ctrl/Cmd+S, Ctrl+P, Ctrl+U, Ctrl+Shift+S
    if((e.ctrlKey||e.metaKey) && ['s','p','u'].includes((e.key||'').toLowerCase())){ stop(e); toast('🔒 Konten ini hanya untuk dibaca','warn'); }
  };
  if(on){
    document._lmsCtx = stop; document._lmsKey = keyStop;
    document.addEventListener('contextmenu', stop, true);
    document.addEventListener('dragstart', stop, true);
    document.addEventListener('selectstart', stop, true);
    document.addEventListener('keydown', keyStop, true);
  } else {
    if(document._lmsCtx){
      document.removeEventListener('contextmenu', document._lmsCtx, true);
      document.removeEventListener('dragstart', document._lmsCtx, true);
      document.removeEventListener('selectstart', document._lmsCtx, true);
      document.removeEventListener('keydown', document._lmsKey, true);
      document._lmsCtx = document._lmsKey = null;
    }
  }
}

window.openModule = (cid,mid)=>{

  const noSel = 'user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-user-drag:none;';

    const isVimeo = /vimeo\.com/i.test(rawUrl);
    const isDirectVideo = /\.(mp4|webm|ogg|m4v|mov)(\?|$)/i.test(rawUrl);

      playerHtml = yid ? `<iframe src="https://www.youtube.com/embed/${yid}?rel=0" style="width:100%;height:100%;border:0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>` : '';
    } else if (isVimeo){
      const vid = rawUrl.match(/vimeo\.com\/(\d+)/)?.[1] || '';
      playerHtml = vid ? `<iframe src="https://player.vimeo.com/video/${vid}" style="width:100%;height:100%;border:0" allow="autoplay; fullscreen" allowfullscreen></iframe>` : '';
    } else if (isDirectVideo){
      playerHtml = `<video src="${esc(rawUrl)}" controls controlsList="nodownload" oncontextmenu="return false" style="width:100%;height:100%;background:#000" playsinline></video>`;
    } else if (rawUrl){
      playerHtml = `<iframe src="${esc(rawUrl)}" style="width:100%;height:100%;border:0" allow="autoplay; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin allow-popups allow-presentation"></iframe>`;
    }
    body = `<div style="${noSel};position:relative" oncontextmenu="return false">
      ${playerHtml ? `
        <div style="position:relative;width:100%;height:70vh;background:#000;border-radius:10px;overflow:hidden">

function setupVideo(){
  let playing=false, cur=0, dur=600, speed=1, intv;
  const pb=$('#pb'),tm=$('#tm'),pp=$('#pp'),vp=$('#vp');
  const upd=()=>{pb.style.width=(cur/dur*100)+'%';tm.textContent=fmtTime(cur)+' / '+fmtTime(dur);};
  const toggle=()=>{playing=!playing;pp.textContent=playing?'⏸':'▶';$('#playBtn').style.display=playing?'none':'';
    if(playing){intv=setInterval(()=>{cur+=speed;if(cur>=dur){cur=dur;clearInterval(intv);playing=false;pp.textContent='▶';$('#playBtn').style.display='';}upd();},1000);}
    else clearInterval(intv);
  };
  $('#playBtn').onclick=toggle; pp.onclick=toggle;
  $('#pg').onclick=e=>{const r=e.currentTarget.getBoundingClientRect();cur=(e.clientX-r.left)/r.width*dur;upd();};
  $('#spd').onchange=e=>speed=+e.target.value;
  $('#fs').onclick=()=>{if(!document.fullscreenElement)vp.requestFullscreen?.();else document.exitFullscreen?.();};
}
function fmtTime(s){s=Math.floor(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
window.markComplete = (cid,mid,silent)=>{

function renderQuiz(cid,m){
  // Normalisasi data quiz supaya kompatibel dengan dua bentuk:
  //   - {q, opts, a}            (dibuat oleh UI admin frontend)
  //   - {q, options, answer}    (seed backend / import lain)
  const normM = {
    id: m.id,
    questions: (m.questions||[]).map(qq => ({
      q: qq.q || qq.question || '',
      opts: Array.isArray(qq.opts) ? qq.opts : (Array.isArray(qq.options) ? qq.options : []),
      a: (qq.a != null) ? Number(qq.a) : (qq.answer != null ? Number(qq.answer) : 0)
    }))
  };
  // Escape </script> agar tidak memutus inline script & cegah HTML injection
  const safeJson = JSON.stringify(normM).replace(/<\/script/gi,'<\\/script').replace(/<!--/g,'<\\!--');
  return `<div id="qz" data-i="0" data-score="0">
    <div id="qzTimer" style="font-size:18px;font-weight:700;color:var(--danger);margin-bottom:10px">⏱ <span id="tmr">10:00</span></div>
    <div id="qzBody"></div>
  </div>
  <script>(()=>{
    const m = ${safeJson};
    let i=0, score=0, time=600, intv;
    const body=document.getElementById('qzBody'), tmr=document.getElementById('tmr');
    const escH = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function draw(){
      if(i>=m.questions.length){
        clearInterval(intv);
        body.innerHTML='<div class="empty"><div style="font-size:60px">'+(score>=m.questions.length*0.6?'🏆':'😅')+'</div><b class="text-2xl">Skor: '+score+'/'+m.questions.length+'</b><p>'+(score>=m.questions.length*0.6?'Selamat, Anda lulus!':'Coba lagi ya')+'</p><button class="btn primary mt-2" onclick="markComplete(\\''+'${cid}'+'\\',\\''+'${m.id}'+'\\');closeModal();">Selesai</button></div>';
        return;
      }
      const q=m.questions[i];
      body.innerHTML='<div class="card"><b>'+(i+1)+'. '+escH(q.q)+'</b><div class="mt-2">'+q.opts.map((o,j)=>'<button class="btn ghost full mt-1" data-j="'+j+'" style="text-align:left;justify-content:flex-start">'+(j+1)+'. '+escH(o)+'</button>').join('')+'</div></div>';
      body.querySelectorAll('[data-j]').forEach(b=>b.onclick=()=>{
        if(+b.dataset.j===q.a){score++;b.style.background='rgba(16,185,129,.2)';}else{b.style.background='rgba(239,68,68,.2)';}
        setTimeout(()=>{i++;draw();},600);
      });
    }
    intv=setInterval(()=>{time--;if(time<=0){clearInterval(intv);i=m.questions.length;draw();}tmr.textContent=Math.floor(time/60)+':'+String(time%60).padStart(2,'0');},1000);
    draw();
  })();<\/script>`;
}

            <b style="font-size:12px;display:block;margin-top:4px">${esc(g.name)}</b>
            ${g.mode==='manual'?'<div class="badge warn" style="margin-top:4px;font-size:9px">Konfirmasi Manual</div>':`<div class="badge ${g.mode2==='live'?'success':'primary'}" style="margin-top:4px;font-size:9px">${g.mode2==='live'?'Live':'Sandbox'}</div>`}
          </label>`).join('')}
        </div>
      </div>
      <hr style="margin:14px 0;border:0;border-top:1px solid var(--border)"/>
      <div class="flex justify-between text-lg" style="font-weight:800;color:var(--primary)"><span>Total Bayar</span><span>${fmtRp(total)}</span></div>
    </form>`,
    foot:`<button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="payBtn">Bayar Sekarang</button>`
  });

  // Highlight metode pembayaran yang dipilih dengan background berbeda
  $$('.pay-opt').forEach(el=>{
    el.onclick = ()=>{
      $$('.pay-opt').forEach(x=>x.classList.remove('selected'));
      el.classList.add('selected');
      const r = el.querySelector('input[type=radio]'); if(r){ r.checked = true; }
    };
  });


  $('#payBtn').onclick=async ()=>{
    const f=$('#cof');
    if(!f.checkValidity()){toast('Lengkapi data','danger');return;}
    const gw = f.gw.value;
    const method = methods.find(m=>m.id===gw);
    closeModal();

    // Flow MANUAL: tampilkan instruksi QRIS / transfer bank → status: pending
    if(method.mode==='manual'){
      const isQris = gw==='qris';
      const info = isQris?s.qris:s.bank;
      const body = isQris
        ? `<div class="center">
            <b class="text-lg">📱 Scan QRIS untuk Bayar</b>
            <div class="muted text-sm">${esc(info.merchantName||'')}</div>
            ${info.imageUrl||info.dataUrl?`<img src="${esc(info.dataUrl||info.imageUrl)}" alt="QRIS" style="max-width:260px;margin:14px auto;border:1px solid var(--border);border-radius:8px"/>`:'<div class="empty">Gambar QRIS belum diset admin</div>'}
            <div class="card" style="text-align:left;background:var(--surface-2);margin-top:8px">
              <b>📋 Instruksi</b>
              <p class="muted text-sm" style="white-space:pre-wrap;margin-top:4px">${esc(info.instructions||'')}</p>
            </div>
          </div>`
        : `<div>
            <b class="text-lg">🏦 Transfer ke Rekening</b>
            <div class="card" style="background:var(--surface-2);margin-top:10px">
              <div class="grid-2">
                <div><div class="muted text-sm">Bank</div><b>${esc(info.bankName||'-')}</b></div>
                <div><div class="muted text-sm">No. Rekening</div><b style="font-family:monospace;font-size:18px">${esc(info.accountNumber||'-')}</b></div>
              </div>
              <div style="margin-top:8px"><div class="muted text-sm">Atas Nama</div><b>${esc(info.accountName||'-')}</b></div>
              <div style="margin-top:8px"><div class="muted text-sm">Jumlah Transfer</div><b style="color:var(--primary);font-size:20px">${fmtRp(total)}</b></div>
            </div>
            <div class="muted text-sm mt-2">⚠️ Setelah transfer, klik tombol di bawah. Admin akan verifikasi & aktifkan akses kursus Anda.</div>
          </div>`;
      modal({title:`Pembayaran via ${esc(method.name)}`, size:'md', body,
        foot:`<button class="btn ghost" onclick="closeModal()">Tutup</button><button class="btn primary" id="confBtn">✓ Saya Sudah Bayar / Transfer</button>`});
      $('#confBtn').onclick = async ()=>{
        // Persist transaksi ke backend (sumber kebenaran)
        let r = null;
        try {
          r = await apiFetch('checkout', {
            userId: state.user.id, courseIds: items.map(c=>c.id), gateway: gw,
            couponCode: couponCode
          });
        } catch(e){ toast('Gagal menyimpan transaksi: '+(e.message||e),'danger'); return; }
        if (!r || !r.ok){ toast('Gagal: '+(r&&r.msg||'unknown'),'danger'); return; }
        await pullFromBackend(true);
        state.cart={}; DB.set('cart',{}); try{_persistCart();}catch(e){}
        closeModal();
        toast('Konfirmasi pembayaran dikirim. Menunggu verifikasi admin.','success');
        state.route='mytrx'; render();
      };
      return;
    }

    // Flow AUTO gateway
    modal({title:'Memproses Pembayaran...',body:`<div class="center" style="padding:30px"><div style="font-size:50px;animation:spin 1s infinite linear">⏳</div><b>Menghubungkan ke ${esc(method.name)}</b><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>`,foot:''});
    let serverTotal = total, trxId = null;
    if (API_ENABLED()){
      const r = await apiFetch('checkout',{
        userId: state.user.id, courseIds: items.map(c=>c.id), gateway: gw,
        couponCode: couponCode
      });
      if (r && r.ok){ serverTotal = r.total; trxId = r.trxId; }
      else { closeModal(); toast('Checkout gagal: '+((r&&r.msg)||'unknown'),'danger'); return; }
    }
    // Auto-confirm utk gateway (asumsi callback sukses dari payment provider)
    try { if (trxId) await apiFetch('confirmPayment', { id: trxId }); } catch(_){}
    await pullFromBackend(true);
    setTimeout(()=>{
      closeModal();
      state.cart={}; DB.set('cart',{}); try{_persistCart();}catch(e){}
      toast(`Pembayaran berhasil! Total ${fmtRp(serverTotal)} 🎉`,'success');
      state.route='mycourses'; render();
    },800);
  };
}

/* ============================================================
 * PWA - Service Worker via Blob URL (works from file:// too)
 * ============================================================ */
(function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  // Only register on real http(s), skip file://
  if(location.protocol!=='http:' && location.protocol!=='https:') return;
  const sw = `
    const C='eduflow-v1';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET') return;
      e.respondWith(
        caches.open(C).then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
          try{c.put(e.request,resp.clone());}catch(_){}
          return resp;
        }).catch(()=>c.match('/')||new Response('<h1>Offline</h1><p>Anda sedang offline.</p>',{headers:{'Content-Type':'text/html'}}))))
      );
    });
  `;
  const swUrl = URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
  navigator.serviceWorker.register(swUrl).catch(()=>{});
})();

function _instructorCourses(){
  const iid = state.user.id;
  return DB.get('courses',[]).filter(c=>c.instructorId===iid);
}
function _instructorStudents(){
  const cs = _instructorCourses();
  const cids = new Set(cs.map(c=>c.id));
  return DB.get('users',[]).filter(u=>u.role==='student' && (u.enrolled||[]).some(e=>cids.has(e.courseId)))
    .map(u=>({...u, enrolledInMine: u.enrolled.filter(e=>cids.has(e.courseId))}));
}

(async function boot(){
  try {
    const s = session.get();
    if (s && s.userId && API_ENABLED()){
      try { await pullFromBackend(true); } catch(_){}
      try { startAutoSync(); } catch(_){}

  render();
})();
