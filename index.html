<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#6366f1" />
<meta name="description" content="EduFlow LMS - Platform Kursus Online SaaS Modern" />
<title>EduFlow LMS - Platform Kursus Online</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236366f1'/%3E%3Cpath d='M16 24l16-8 16 8-16 8z' fill='white'/%3E%3Cpath d='M22 30v8c0 3 4 6 10 6s10-3 10-6v-8' stroke='white' stroke-width='2.5' fill='none'/%3E%3C/svg%3E" />
<style>
/* ============== DESIGN TOKENS ============== */
:root{
  --bg:#f6f7fb; --surface:#ffffff; --surface-2:#f1f3f9; --text:#0f172a; --text-soft:#475569; --muted:#94a3b8;
  --border:#e5e7eb; --primary:#6366f1; --primary-2:#8b5cf6; --primary-soft:#eef2ff;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#0ea5e9;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06); --shadow:0 8px 24px rgba(15,23,42,.08);
  --shadow-lg:0 24px 48px -12px rgba(15,23,42,.18);
  --radius:14px; --radius-sm:10px; --radius-lg:20px;
  --glass:rgba(255,255,255,.65); --glass-border:rgba(255,255,255,.4);
  --gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --sidebar:#0f172a; --sidebar-text:#cbd5e1; --sidebar-active:#1e293b;
}
[data-theme="dark"]{
  --bg:#0b1020; --surface:#121931; --surface-2:#0f1530; --text:#e2e8f0; --text-soft:#cbd5e1; --muted:#64748b;
  --border:#1f2a44; --primary:#818cf8; --primary-2:#a78bfa; --primary-soft:#1e1b4b;
  --glass:rgba(18,25,49,.6); --glass-border:rgba(255,255,255,.08);
  --sidebar:#070b1a; --sidebar-active:#111a36;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
img{max-width:100%;display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ============== UTILITIES ============== */
.hidden{display:none !important}
.flex{display:flex}.grid{display:grid}.gap-1{gap:6px}.gap-2{gap:10px}.gap-3{gap:16px}.gap-4{gap:24px}
.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.flex-1{flex:1}.flex-col{flex-direction:column}.wrap{flex-wrap:wrap}
.text-sm{font-size:12.5px}.text-lg{font-size:16px}.text-xl{font-size:20px}.text-2xl{font-size:26px}.text-3xl{font-size:34px}
.font-bold{font-weight:700}.font-semi{font-weight:600}.muted{color:var(--muted)}.soft{color:var(--text-soft)}
.mt-1{margin-top:8px}.mt-2{margin-top:16px}.mt-3{margin-top:24px}.mt-4{margin-top:32px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}.mb-3{margin-bottom:24px}
.p-2{padding:12px}.p-3{padding:18px}.p-4{padding:24px}
.rounded{border-radius:var(--radius)}.rounded-sm{border-radius:var(--radius-sm)}
.full{width:100%}.center{text-align:center}
.scroll{overflow:auto}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--surface-2);color:var(--text-soft)}
.badge.success{background:rgba(16,185,129,.12);color:var(--success)}
.badge.warn{background:rgba(245,158,11,.14);color:var(--warning)}
.badge.danger{background:rgba(239,68,68,.12);color:var(--danger)}
.badge.info{background:rgba(14,165,233,.12);color:var(--info)}
.badge.primary{background:var(--primary-soft);color:var(--primary)}

/* ============== BUTTONS ============== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:13.5px;transition:all .18s ease;border:1px solid transparent;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--gradient);color:#fff;box-shadow:var(--shadow-sm)}
.btn.primary:hover{box-shadow:0 10px 24px rgba(99,102,241,.35)}
.btn.ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.soft{background:var(--primary-soft);color:var(--primary)}
.btn.danger{background:rgba(239,68,68,.1);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.icon{padding:9px;width:38px;height:38px}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

/* ============== FORMS ============== */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12.5px;font-weight:600;color:var(--text-soft)}
.input,.select,.textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);background:var(--surface);
  border-radius:var(--radius-sm);transition:all .15s;outline:none;color:var(--text);
}
.input:focus,.select:focus,.textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.12)}
.textarea{min-height:90px;resize:vertical;font-family:inherit}
.input-icon{position:relative}
.input-icon .input{padding-left:40px}
.input-icon svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.pw-wrap{position:relative}
.pw-wrap button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);padding:6px}
.checkbox{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px}
.checkbox input{width:16px;height:16px;accent-color:var(--primary)}
.error-msg{color:var(--danger);font-size:12px;margin-top:4px;display:block}

/* ============== CARD ============== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);transition:all .2s}
.card.hover:hover{transform:translateY(-3px);box-shadow:var(--shadow)}

/* ============== AUTH ============== */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
.auth-hero{background:var(--gradient);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-hero::before,.auth-hero::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.08)}
.auth-hero::before{width:500px;height:500px;top:-200px;right:-200px}
.auth-hero::after{width:340px;height:340px;bottom:-140px;left:-100px}
.auth-hero > *{position:relative;z-index:1}
.auth-hero h1{font-size:38px;font-weight:800;line-height:1.15;margin-top:24px}
.auth-hero p{opacity:.9;margin-top:14px;font-size:15px;max-width:440px}
.auth-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:32px;max-width:480px}
.auth-stats div{background:rgba(255,255,255,.13);padding:14px;border-radius:14px;backdrop-filter:blur(6px)}
.auth-stats b{font-size:22px;display:block}
.auth-form{display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{width:100%;max-width:420px}
.auth-card h2{font-size:26px;font-weight:800;margin-bottom:6px}
.auth-card .sub{color:var(--text-soft);margin-bottom:24px}
.demo-creds{background:var(--primary-soft);border:1px dashed var(--primary);border-radius:var(--radius-sm);padding:12px;margin-top:16px;font-size:12.5px}
.demo-creds code{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;font-size:12px}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
@media (max-width:900px){.auth-wrap{grid-template-columns:1fr}.auth-hero{display:none}}

/* ============== APP LAYOUT ============== */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--sidebar);color:var(--sidebar-text);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform .25s}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
.sidebar-brand .logo{width:36px;height:36px;border-radius:10px;background:var(--gradient);display:grid;place-items:center;color:#fff;font-weight:800}
.sidebar-brand b{color:#fff;font-size:16px}
.sidebar-section{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--sidebar-text);cursor:pointer;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--sidebar-active);color:#fff}
.nav-item.active{background:var(--gradient);color:#fff;box-shadow:0 6px 14px rgba(99,102,241,.35)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:30;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.topbar h1{font-size:18px;font-weight:700}
.topbar .search{flex:1;max-width:420px}
.topbar .avatar{width:36px;height:36px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;cursor:pointer}
.page{padding:24px;max-width:1400px;width:100%;margin:0 auto}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.page-head h2{font-size:24px;font-weight:800}
.page-head p{color:var(--text-soft);margin-top:4px}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.stat .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);margin-bottom:10px}
.stat b{font-size:24px;font-weight:800;display:block;letter-spacing:-.02em}
.stat span{color:var(--muted);font-size:12.5px;font-weight:600}

/* Grids */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}

/* Table */
.table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden}
.table th,.table td{padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
.table th{background:var(--surface-2);font-weight:700;color:var(--text-soft);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
.table tbody tr:hover{background:var(--surface-2)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}

/* Course card */
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.course-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.course-thumb{height:150px;background:var(--gradient);display:grid;place-items:center;color:#fff;font-size:42px;font-weight:800;position:relative}
.course-thumb .cat{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.45);padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;color:#fff}
.course-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.course-body h3{font-size:15px;font-weight:700;line-height:1.35}
.course-body .ins{font-size:12px;color:var(--muted)}
.course-meta{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;border-top:1px solid var(--border)}
.course-meta .price{font-weight:800;color:var(--primary);font-size:15px}
.rating{display:inline-flex;align-items:center;gap:3px;color:#f59e0b;font-size:12px;font-weight:600}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;overflow-y:auto}
.modal-back.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:popin .2s}
.modal.lg{max-width:820px}.modal.xl{max-width:1000px}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:18px;font-weight:700}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface)}
@keyframes popin{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}

/* Toast */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;max-width:340px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);padding:14px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow);animation:slidein .25s;display:flex;gap:10px}
.toast.success{border-left-color:var(--success)}
.toast.danger{border-left-color:var(--danger)}
.toast.warn{border-left-color:var(--warning)}
@keyframes slidein{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1.5px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tabs button{padding:10px 16px;font-weight:600;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Empty */
.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.empty svg{width:54px;height:54px;margin-bottom:10px;opacity:.5}

/* Mobile */
.mobile-bar,.fab,.menu-toggle{display:none}
.menu-toggle{padding:8px;border-radius:8px}
@media (max-width:1024px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:50;transform:translateX(-100%);width:280px;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:inline-flex}
  .mobile-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:40;padding:8px;justify-content:space-around;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
  .mobile-bar button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;color:var(--muted);padding:6px 10px;border-radius:10px;font-weight:600;flex:1}
  .mobile-bar button.active{color:var(--primary);background:var(--primary-soft)}
  .mobile-bar svg{width:20px;height:20px}
  .page{padding-bottom:90px}
  .auth-hero{display:none}
}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45;display:none}
.backdrop.open{display:block}

/* Misc */
.offline-banner{position:fixed;top:0;left:0;right:0;background:var(--warning);color:#fff;text-align:center;padding:8px;font-size:12px;font-weight:600;z-index:300}
.progress-bar{height:8px;background:var(--surface-2);border-radius:8px;overflow:hidden}
.progress-bar > div{height:100%;background:var(--gradient);transition:width .35s}
.list-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border)}
.list-row:last-child{border:0}
.av{width:38px;height:38px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0;font-size:13px}
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>
<div class="backdrop" id="backdrop"></div>
<div class="modal-back" id="modalBack"></div>
<div id="offlineBanner" class="offline-banner hidden">⚠ Anda sedang offline — beberapa fitur dibatasi</div>
<div id="app"></div>

<script>
/* ============================================================
 * EDUFLOW LMS — FRONTEND BERHUBUNGAN DENGAN BACKEND GAS
 * TAHAP 5: INTEGRASI & WRAPPER APIFETCH
 * ============================================================ */

// MASUKAN URL DEPLOY GOOGLE APPS SCRIPT ANDA DISINI (Akhiran /exec)
const GAS_URL = "https://script.google.com/macros/s/AKfycbwnjPuwHbVtkJh5pplsduLZo0ksqQea9IHQxI7zBjqApUeM6sOqltdhxb0R5gzkCuh3sw/exec";

/* ---------------- API FETCH (Exponential Backoff) ---------------- */
async function apiFetch(action, payload = {}) {
  let retries = 3;
  let delay = 1000;
  
  while (retries > 0) {
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, data: payload })
      });
      const result = await res.json();
      return result;
    } catch (e) {
      retries--;
      console.warn(`Fetch gagal, mencoba ulang dalam ${delay}ms...`, e);
      if (retries === 0) return { ok: false, error: 'Koneksi ke server backend gagal / Timeout. Coba muat ulang.' };
      await new Promise(r => setTimeout(r, delay));
      delay *= 2;
    }
  }
}

/* ---------------- STATE & DB CACHE LOKAL ---------------- */
let DB_CACHE = {
  users: [], courses: [], categories: [], instructors: [],
  transactions: [], reviews: [], coupons: [], threads: [], 
  settings: {
    general:{name:'EduFlow LMS', tagline:'Belajar Tanpa Batas', logo:'🎓'},
    seo:{title:'EduFlow LMS - Platform Kursus Online',desc:'Belajar skill digital dari para ahli.'},
    payment:{midtransKey:'',xenditKey:'',stripeKey:'',paypalKey:''},
    smtp:{host:'',port:587,user:''}, security:{sessionTimeout:60,minPwLen:8}
  },
  calendar: [], notifications: [], cart: {}, affiliates: [], memberships: [], broadcasts: []
};

// Pengganti localStorage yang sinkron agar tidak merusak logika UI yang sudah ada.
const DB = {
  get(key, def){ return DB_CACHE[key] !== undefined ? DB_CACHE[key] : def; },
  set(key, val){ 
    DB_CACHE[key] = val; 
    if(key === 'cart' || key === 'theme') {
      localStorage.setItem('eduflow_'+key, JSON.stringify(val));
    }
  }
};

const session = {
  get(){ try{return JSON.parse(localStorage.getItem('eduflow_session')||'null');}catch(e){return null;} },
  set(s){ localStorage.setItem('eduflow_session', JSON.stringify(s)); },
  clear(){ localStorage.removeItem('eduflow_session'); }
};

const state = {
  user: null,
  route: 'dashboard',
  cart: (()=>{try{return JSON.parse(localStorage.getItem('eduflow_cart'))||{};}catch(e){return {};}})(),
};

// Mengambil Cache Theme dari LocalStorage agar visual tidak patah
document.documentElement.dataset.theme = (()=>{try{return JSON.parse(localStorage.getItem('eduflow_theme'))||'light';}catch(e){return 'light';}})();

/* ---------------- SINKRONISASI DATA UTAMA ---------------- */
async function syncWithBackend() {
  const s = session.get();
  const res = await apiFetch('init', { userId: s ? s.userId : null });
  
  if (res.ok) {
     if (res.data.needsSeed) {
        toast("Mengkonfigurasi database awal. Mohon tunggu...", "info");
        await setupAndSeedDatabase();
        return syncWithBackend(); // Reload setelah seeding
     }
     
     Object.assign(DB_CACHE, res.data);
     if(res.data.user) {
        state.user = res.data.user;
     }
  } else {
     toast("Gagal memuat data dari server: " + res.error, "danger");
  }
}

async function boot() {
  $('#app').innerHTML = `<div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:15px;">
    <div style="font-size:50px;animation:spin 1s linear infinite">⚙️</div>
    <b class="text-lg">Menyambungkan ke Server...</b>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>`;
  
  await syncWithBackend();
  
  if (session.get() && state.user) {
    renderApp();
  } else {
    renderAuth('login');
  }
}

/* ---------------- HELPERS ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const $$= (s,el=document)=>[...el.querySelectorAll(s)];
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = (p='id')=>p+'_'+Math.random().toString(36).slice(2,10);
const fmtRp = n => 'Rp '+Number(n||0).toLocaleString('id-ID');
const fmtDate = d => new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
const fmtDateTime = d => new Date(d).toLocaleString('id-ID');
const debounce=(f,w=200)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>f(...a),w);};};

function toast(msg, type='info'){
  const w = $('#toastWrap');
  const el = document.createElement('div');
  el.className='toast '+type;
  el.innerHTML = `<div style="flex:1"><b style="font-size:13px">${esc(msg)}</b></div><button onclick="this.parentNode.remove()" style="color:var(--muted)">✕</button>`;
  w.appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

function modal({title, body, foot, size=''}){
  const mb = $('#modalBack');
  mb.innerHTML = `<div class="modal ${size}">
    <div class="modal-head"><h3>${esc(title)}</h3><button onclick="closeModal()" class="btn icon ghost">✕</button></div>
    <div class="modal-body">${body}</div>
    ${foot?`<div class="modal-foot">${foot}</div>`:''}
  </div>`;
  mb.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){ $('#modalBack').classList.remove('open'); $('#modalBack').innerHTML=''; document.body.style.overflow=''; }
$('#modalBack').addEventListener('click', e=>{ if(e.target.id==='modalBack') closeModal(); });

function confirmModal(msg, onYes){
  modal({title:'Konfirmasi',body:`<p>${esc(msg)}</p>`,
    foot:`<button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="cfYes">Ya, lanjutkan</button>`
  });
  $('#cfYes').onclick=()=>{ closeModal(); onYes(); };
}

window.togglePw = btn => { const inp = btn.previousElementSibling; inp.type = inp.type==='password'?'text':'password'; };
window.closeModal = closeModal;

      </div>
      <button class="btn primary full" id="btnReg">Daftar Sekarang</button>

    </form>
  `;

function bindAuth(mode){
  $$('[data-go]').forEach(a=>a.onclick=e=>{e.preventDefault();renderAuth(a.dataset.go);});

  if(mode==='login'){
    $('#loginForm').onsubmit = async e => {
      e.preventDefault(); const f = e.target;
      if(!f.email.value || !f.password.value){toast('Isi formulir dengan lengkap','danger'); return;}
      
      $('#btnLog').disabled = true; $('#btnLog').textContent = "Memproses...";
      const r = await apiFetch('login', {email: f.email.value.trim(), password: f.password.value});
      
      if(!r.ok){ 
        toast(r.error,'danger'); 
        $('#btnLog').disabled = false; $('#btnLog').textContent = "Masuk";
        return; 
      }
      toast('Login berhasil','success');
      session.set({userId: r.data.user.id, loginAt: Date.now(), remember: !!f.remember.checked});
      state.user = r.data.user;
      await syncWithBackend();
      renderApp();
    };
  } else {
    $('#regForm').onsubmit = async e => {
      e.preventDefault(); const f = e.target;
      if(!f.name.value || !f.email.value || f.password.value.length < 8) {toast('Cek kembali data (Pass Min 8 char)','danger'); return;}
      
      $('#btnReg').disabled = true; $('#btnReg').textContent = "Memproses...";
      const r = await apiFetch('register', {name: f.name.value.trim(), email: f.email.value.trim(), password: f.password.value});
      
      if(!r.ok){ 
        toast(r.error,'danger'); 
        $('#btnReg').disabled = false; $('#btnReg').textContent = "Daftar Sekarang";
        return; 
      }
      toast('Pendaftaran berhasil! Silakan masuk.','success');
      renderAuth('login');
    };
  }
}

    foot:`<button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="saveC">Simpan ke Server</button>`

        btn.disabled=false; btn.textContent="Proses Pembayaran ke Server";
      }
    };
  }
};

PAGES.mytrx = el => {
  const trx = DB.get('transactions',[]).filter(t=>t.userId===state.user.id).sort((a,b)=>b.createdAt-a.createdAt);
  el.innerHTML = `
    <div class="page-head"><div><h2>Riwayat Transaksi Server</h2></div></div>
    <div class="table-wrap"><table class="table">
      <thead><tr><th>ID</th><th>Kursus</th><th>Jumlah Bayar (Kalkulasi Server)</th><th>Status</th></tr></thead>
      <tbody>${trx.map(t=>`<tr><td><code>${t.id}</code></td><td>${esc(t.courseTitle)}</td><td><b>${fmtRp(t.amount)}</b></td><td><span class="badge ${t.status==='success'?'success':t.status==='pending'?'warn':'danger'}">${t.status}</span></td></tr>`).join('')}</tbody>
    </table></div>
  `;
};
