<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#6366f1" />
<meta name="description" content="EduFlow LMS - Platform Kursus Online SaaS Modern" />
<title>EduFlow LMS - Platform Kursus Online</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236366f1'/%3E%3Cpath d='M16 24l16-8 16 8-16 8z' fill='white'/%3E%3Cpath d='M22 30v8c0 3 4 6 10 6s10-3 10-6v-8' stroke='white' stroke-width='2.5' fill='none'/%3E%3C/svg%3E" />
<link rel="manifest" href='data:application/manifest+json,{"name":"EduFlow LMS","short_name":"EduFlow","start_url":".","display":"standalone","background_color":"%230f172a","theme_color":"%236366f1","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 512 512%27%3E%3Crect width=%27512%27 height=%27512%27 rx=%27110%27 fill=%27%236366f1%27/%3E%3Cpath d=%27M128 192l128-64 128 64-128 64z%27 fill=%27white%27/%3E%3Cpath d=%27M176 240v64c0 24 32 48 80 48s80-24 80-48v-64%27 stroke=%27white%27 stroke-width=%2720%27 fill=%27none%27/%3E%3C/svg%3E","sizes":"any","type":"image/svg+xml","purpose":"any maskable"}]}' />
<style>
/* ============== DESIGN TOKENS ============== */
:root{
  --bg:#f6f7fb; --surface:#ffffff; --surface-2:#f1f3f9; --text:#0f172a; --text-soft:#475569; --muted:#94a3b8;
  --border:#e5e7eb; --primary:#6366f1; --primary-2:#8b5cf6; --primary-soft:#eef2ff;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#0ea5e9;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06); --shadow:0 8px 24px rgba(15,23,42,.08);
  --shadow-lg:0 24px 48px -12px rgba(15,23,42,.18);
  --radius:14px; --radius-sm:10px; --radius-lg:20px;
  --glass:rgba(255,255,255,.65); --glass-border:rgba(255,255,255,.4);
  --gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --sidebar:#0f172a; --sidebar-text:#cbd5e1; --sidebar-active:#1e293b;
}
[data-theme="dark"]{
  --bg:#0b1020; --surface:#121931; --surface-2:#0f1530; --text:#e2e8f0; --text-soft:#cbd5e1; --muted:#64748b;
  --border:#1f2a44; --primary:#818cf8; --primary-2:#a78bfa; --primary-soft:#1e1b4b;
  --glass:rgba(18,25,49,.6); --glass-border:rgba(255,255,255,.08);
  --sidebar:#070b1a; --sidebar-active:#111a36;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
img{max-width:100%;display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ============== UTILITIES ============== */
.hidden{display:none !important}
.flex{display:flex}.grid{display:grid}.gap-1{gap:6px}.gap-2{gap:10px}.gap-3{gap:16px}.gap-4{gap:24px}
.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.flex-1{flex:1}.flex-col{flex-direction:column}.wrap{flex-wrap:wrap}
.text-sm{font-size:12.5px}.text-lg{font-size:16px}.text-xl{font-size:20px}.text-2xl{font-size:26px}.text-3xl{font-size:34px}
.font-bold{font-weight:700}.font-semi{font-weight:600}.muted{color:var(--muted)}.soft{color:var(--text-soft)}
.mt-1{margin-top:8px}.mt-2{margin-top:16px}.mt-3{margin-top:24px}.mt-4{margin-top:32px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}.mb-3{margin-bottom:24px}
.p-2{padding:12px}.p-3{padding:18px}.p-4{padding:24px}
.rounded{border-radius:var(--radius)}.rounded-sm{border-radius:var(--radius-sm)}
.full{width:100%}.center{text-align:center}
.scroll{overflow:auto}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--surface-2);color:var(--text-soft)}
.badge.success{background:rgba(16,185,129,.12);color:var(--success)}
.badge.warn{background:rgba(245,158,11,.14);color:var(--warning)}
.badge.danger{background:rgba(239,68,68,.12);color:var(--danger)}
.badge.info{background:rgba(14,165,233,.12);color:var(--info)}
.badge.primary{background:var(--primary-soft);color:var(--primary)}

/* ============== BUTTONS ============== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:13.5px;transition:all .18s ease;border:1px solid transparent;white-space:nowrap}
.btn.primary{background:var(--gradient);color:#fff;box-shadow:var(--shadow-sm)}
.btn.ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn.soft{background:var(--primary-soft);color:var(--primary)}
.btn.danger{background:rgba(239,68,68,.1);color:var(--danger)}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.icon{padding:9px;width:38px;height:38px}

/* ============== FORMS ============== */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12.5px;font-weight:600;color:var(--text-soft)}
.input,.select,.textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);outline:none;color:var(--text);}
.input-icon{position:relative}
.input-icon .input{padding-left:40px}
.input-icon svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.pw-wrap{position:relative}
.pw-wrap button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);padding:6px}
.error-msg{color:var(--danger);font-size:12px;margin-top:4px;display:block}

/* ============== CARDS & LAYOUT ============== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm)}
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
.auth-hero{background:var(--gradient);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-form{display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{width:100%;max-width:420px}
@media (max-width:900px){.auth-wrap{grid-template-columns:1fr}.auth-hero{display:none}}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--sidebar);color:var(--sidebar-text);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer}
.nav-item.active{background:var(--gradient);color:#fff}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:30;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.page{padding:24px;max-width:1400px;width:100%;margin:0 auto}

/* Modals & Loaders */
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-back.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:22px}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;max-width:340px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);padding:14px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow);display:flex;gap:10px}
.toast.danger{border-left-color:var(--danger)}

#globalLoader {position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;color:var(--primary);backdrop-filter:blur(4px);display:none;}
[data-theme="dark"] #globalLoader {background:rgba(11,16,32,0.8);}
.spinner {width:40px;height:40px;border:4px solid var(--primary-soft);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px;}
@keyframes spin {to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="globalLoader"><div class="spinner"></div><span>Memuat Data...</span></div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="modal-back" id="modalBack"></div>
<div id="app"></div>

<script>
/**
 * ==============================================================================
 * EDUFLOW LMS - FRONTEND PRESENTATION LAYER
 * ==============================================================================
 * Architecture: Clean Architecture (Frontend as Presentation Only)
 * All CRUD, Logic, and Sensitive Data handling are delegated to Backend (GAS).
 * API Configuration: Set CONFIG.GAS_WEB_APP_URL to your deployed Google Apps Script URL.
 * ==============================================================================
 */

const CONFIG = {
  // ISI DENGAN URL WEB APP DEPLOYMENT GOOGLE APPS SCRIPT ANDA
  // Kosongkan untuk menjalankan Mode Simulasi Canvas
  GAS_WEB_APP_URL: "https://script.google.com/macros/s/AKfycbzWSjryOJPLj7S962NqTSip1NRQLToFFW8vXYzywEoP_3UGExcFhORzy7a6JmVStl4WAA/exec", 
};

// State Management (Local Session)
const state = {
  token: localStorage.getItem('eduflow_token') || null,
  user: JSON.parse(localStorage.getItem('eduflow_user') || 'null'),
  route: 'dashboard',
  courses: [],
  dashboardStats: null,
};

/* ============================================================
 * API SERVICE LAYER (Komunikasi ke Backend)
 * ============================================================ */
async function apiCall(action, payload = {}) {
  const loader = document.getElementById('globalLoader');
  loader.style.display = 'flex';
  
  try {
    let response;
    
    if (!CONFIG.GAS_WEB_APP_URL) {
      // PREVIEW MODE: Mencegat Fetch jika GAS URL belum disetel (Simulator Canvas)
      console.warn("MOCK API MODE: Simulasi backend aktif karena GAS URL belum disetel.");
      response = await MockBackendSimulator.process(action, payload, state.token);
    } else {
      // PRODUCTION MODE: Fetch ke Google Apps Script sesungguhnya
      const res = await fetch(CONFIG.GAS_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload, token: state.token }),
        mode: 'cors'
      });
      response = await res.json();
    }
    
    loader.style.display = 'none';
    
    if (!response.success) {
      if(response.message.includes("Sesi")) handleLogout(); // Auto logout jika token expired
      throw new Error(response.message);
    }
    return response.data;
  } catch (err) {
    loader.style.display = 'none';
    toast(err.message || 'Gagal terhubung ke server', 'danger');
    throw err;
  }
}

/* ============================================================
 * UI HELPERS
 * ============================================================ */
const $ = (s, el = document) => el.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtRp = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');

function toast(msg, type='info'){
  const w = $('#toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<div style="flex:1"><b style="font-size:13px">${esc(msg)}</b></div><button onclick="this.parentNode.remove()" style="color:var(--muted)">✕</button>`;
  w.appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

function handleLogout() {
  localStorage.removeItem('eduflow_token');
  localStorage.removeItem('eduflow_user');
  state.token = null;
  state.user = null;
  renderAuth();
}

/* ============================================================
 * AUTHENTICATION PAGES
 * ============================================================ */
function renderAuth() {
  $('#app').innerHTML = `
  <div class="auth-wrap">
    <div class="auth-hero">
      <div>
        <h1 style="font-size:38px;font-weight:800;">EduFlow LMS</h1>
        <p style="margin-top:14px;font-size:15px;max-width:440px">Platform Manajemen Pembelajaran Terintegrasi berbasis Google Workspace. Aman, Cepat, dan Tersinkronisasi penuh.</p>
        <div style="margin-top:20px;padding:12px;background:rgba(0,0,0,0.2);border-radius:10px;font-size:12px;display:inline-block;">
          🛡 <b>Enterprise Grade Security</b><br>Tidak ada data tersimpan di frontend.
        </div>
      </div>
    </div>
    <div class="auth-form">
      <div class="auth-card">
        <h2>Masuk ke Sistem</h2>
        <p class="muted" style="margin-bottom:24px">Silakan autentikasi menggunakan kredensial Anda.</p>
        <form id="loginForm" novalidate>
          <div class="field">
            <label>Email</label>
            <input class="input" type="email" name="email" required placeholder="admin@lms.com"/>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="pw-wrap">
              <input class="input" type="password" name="password" required placeholder="Admin123!"/>
              <button type="button" onclick="const i=this.previousElementSibling; i.type=i.type==='password'?'text':'password'">👁</button>
            </div>
          </div>
          <button class="btn primary full" type="submit" style="margin-top:14px">Login</button>
          <div style="margin-top:16px;padding:12px;background:var(--primary-soft);border:1px dashed var(--primary);border-radius:8px;font-size:12px;color:var(--text);">
            <b>Mode Demonstrasi Aktif:</b><br>
            Coba gunakan: <code>admin@lms.com</code> / <code>Admin123!</code>
          </div>
        </form>
      </div>
    </div>
  </div>`;

  $('#loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = e.target.email.value;
    const password = e.target.password.value;
    
    try {
      // Panggil backend API untuk verifikasi credentials
      const data = await apiCall('login', { email, password });
      
      // Simpan Token Session (Hanya Token dan Info dasar, TIdak ada Password)
      state.token = data.token;
      state.user = data.user;
      localStorage.setItem('eduflow_token', data.token);
      localStorage.setItem('eduflow_user', JSON.stringify(data.user));
      
      toast('Login berhasil', 'success');
      initApp(); // Load Main Dashboard
    } catch (error) {
      // Error ditangani oleh apiCall dan toast ditampilkan
    }
  };
}

/* ============================================================
 * MAIN APPLICATION SHELL
 * ============================================================ */
async function initApp() {
  if (!state.token || !state.user) {
    renderAuth();
    return;
  }
  
  try {
    // Ambil data krusial dari server saat inisialisasi
    if(state.user.role === 'admin') {
      state.dashboardStats = await apiCall('getDashboardStats');
      state.courses = await apiCall('getCoursesAdmin');
    }
    renderAppShell();
  } catch (error) {
    handleLogout(); // Force logout jika token tidak valid atau ditolak server
  }
}

function renderAppShell() {
  const u = state.user;
  const isAdmin = u.role === 'admin';
  state.route = isAdmin ? 'dashboard' : 'sdashboard';

  $('#app').innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div style="width:36px;height:36px;border-radius:10px;background:var(--gradient);display:grid;place-items:center;color:#fff;font-weight:800">🎓</div>
          <div><b style="color:white;font-size:16px">EduFlow</b><div style="font-size:10.5px;color:#64748b">${isAdmin?'Admin Panel':'Student Area'}</div></div>
        </div>
        <div class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
          Dashboard Utama
        </div>
        ${isAdmin ? `
        <div class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16v12H4z"/></svg>
          Manajemen Kursus
        </div>
        ` : ''}
        <div style="margin-top:auto;padding-top:20px;">
          <button class="nav-item" onclick="handleLogout()" style="width:100%;color:#fca5a5">Logout</button>
        </div>
      </aside>
      <div class="main">
        <header class="topbar">
          <h1 style="font-size:18px;font-weight:700">Selamat datang, ${esc(u.name)}!</h1>
          <div class="flex-1"></div>
          ${!CONFIG.GAS_WEB_APP_URL ? `<span class="badge warn" style="margin-right:10px">Preview / Mock Server Mode</span>` : `<span class="badge success" style="margin-right:10px">Connected to GAS</span>`}
          <div style="width:36px;height:36px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;">${esc(u.name[0].toUpperCase())}</div>
        </header>
        <div class="page" id="pageContent"></div>
      </div>
    </div>
  `;
  renderPageContent();
}

function renderPageContent() {
  const el = $('#pageContent');
  if (state.user.role === 'admin') {
    const stats = state.dashboardStats;
    el.innerHTML = `
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">
        <div class="card"><b>Total Pengguna</b><br><span style="font-size:24px;font-weight:800">${stats.totalUsers}</span></div>
        <div class="card"><b>Total Pendapatan</b><br><span style="font-size:24px;font-weight:800;color:var(--primary)">${fmtRp(stats.totalRevenue)}</span></div>
        <div class="card"><b>Total Kursus</b><br><span style="font-size:24px;font-weight:800">${stats.totalCourses}</span></div>
      </div>
      <div class="card">
        <div class="flex justify-between items-center" style="margin-bottom:16px">
          <b class="text-lg">Data Kursus (Tersinkronisasi dari Spreadsheet)</b>
          <button class="btn primary btn-sm" onclick="simulasiTambahKursus()">+ Tambah Kursus</button>
        </div>
        <table style="width:100%;border-collapse:collapse;text-align:left;">
          <tr style="border-bottom:2px solid var(--border)"><th style="padding:10px">Judul Kursus</th><th style="padding:10px">Harga</th></tr>
          ${state.courses.map(c => `
            <tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px">${c.emoji} ${esc(c.title)}</td>
              <td style="padding:10px">${fmtRp(c.price)}</td>
            </tr>
          `).join('')}
        </table>
      </div>
    `;
  } else {
    el.innerHTML = `
      <div class="card center" style="padding:50px">
        <h2>Area Peserta</h2>
        <p class="muted">Silakan akses kursus yang telah Anda beli.</p>
        <button class="btn primary" style="margin-top:20px" onclick="toast('Menghubungi Backend...','info')">Lihat Katalog</button>
      </div>
    `;
  }
}

async function simulasiTambahKursus() {
  try {
    // CRUD Create -> Diserahkan ke Backend (API POST)
    const newCourse = { title: "Kursus Baru " + new Date().toLocaleTimeString(), price: 500000 };
    await apiCall('saveCourse', newCourse);
    
    // Refresh Data Setelah Modifikasi (Read -> Get from Backend)
    toast('Berhasil menyimpan ke Spreadsheet Backend', 'success');
    state.courses = await apiCall('getCoursesAdmin');
    renderPageContent();
  } catch (error) {
    // error handled by apiCall
  }
}

/* ============================================================
 * MOCK BACKEND SIMULATOR (Khusus Preview Canvas)
 * Melakukan simulasi Database Logic dan Verifikasi Token
 * BUKAN BAGIAN DARI KODE PRODUKSI FRONTEND.
 * ============================================================ */
const MockBackendSimulator = {
  db: {
    users: [
      { id: 'u1', email: 'admin@lms.com', name: 'Administrator', passwordHash: 'hashed_admin123', role: 'admin', status: 'active' },
      { id: 'u2', email: 'peserta@lms.com', name: 'Peserta', passwordHash: 'hashed_peserta123', role: 'student', status: 'active' }
    ],
    courses: [
      { id: 'k1', title: 'Digital Marketing Mastery', price: 499000, emoji: '📈' },
      { id: 'k2', title: 'Fullstack Web Engineer', price: 1299000, emoji: '💻' }
    ]
  },
  
  async process(action, payload, token) {
    // Simulasi Network Latency
    await new Promise(resolve => setTimeout(resolve, 800));

    switch (action) {
      case 'login':
        // Simulasi verifikasi hash di backend
        if (payload.password !== 'Admin123!' && payload.password !== 'Peserta123!') throw new Error("Password Salah.");
        const user = this.db.users.find(u => u.email === payload.email);
        if (!user) throw new Error("Akun tidak ditemukan");
        
        // Buat Mock JWT
        const mockToken = `mockJWT.${btoa(JSON.stringify({ userId: user.id, role: user.role, exp: Date.now() + 86400000 }))}.signature`;
        return { token: mockToken, user: { id: user.id, name: user.name, email: user.email, role: user.role } };
        
      case 'getDashboardStats':
        this.verifyToken(token, ['admin']);
        return { totalUsers: this.db.users.length, totalRevenue: 15400000, totalCourses: this.db.courses.length };
        
      case 'getCoursesAdmin':
        this.verifyToken(token, ['admin']);
        return this.db.courses;
        
      case 'saveCourse':
        this.verifyToken(token, ['admin']);
        const newCourse = { id: 'k' + Date.now(), title: payload.title, price: payload.price, emoji: '📘' };
        this.db.courses.push(newCourse); // Simulasi save ke Google Sheet
        return newCourse;

      default:
        throw new Error("Action Mock Tidak Ditemukan");
    }
  },

  verifyToken(token, allowedRoles) {
    if (!token) throw new Error("Akses ditolak. Token hilang.");
    try {
      const decoded = JSON.parse(atob(token.split('.')[1]));
      if (Date.now() > decoded.exp) throw new Error("Sesi berakhir.");
      if (allowedRoles && !allowedRoles.includes(decoded.role)) throw new Error("Akses dilarang (RBAC).");
      return decoded;
    } catch(e) {
      throw new Error("Token tidak valid.");
    }
  }
};

/* ============================================================
 * BOOTSTRAP APP
 * ============================================================ */
window.onload = initApp;

</script>
