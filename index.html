<style>
/* ============== DESIGN TOKENS ============== */
:root{
  --bg:#f6f7fb; --surface:#ffffff; --surface-2:#f1f3f9; --text:#0f172a; --text-soft:#475569; --muted:#94a3b8;
  --border:#e5e7eb; --primary:#6366f1; --primary-2:#8b5cf6; --primary-soft:#eef2ff;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#0ea5e9;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06); --shadow:0 8px 24px rgba(15,23,42,.08);
  --shadow-lg:0 24px 48px -12px rgba(15,23,42,.18);
  --radius:14px; --radius-sm:10px; --radius-lg:20px;
  --glass:rgba(255,255,255,.65); --glass-border:rgba(255,255,255,.4);
  --gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --sidebar:#0f172a; --sidebar-text:#cbd5e1; --sidebar-active:#1e293b;
}
[data-theme="dark"]{
  --bg:#0b1020; --surface:#121931; --surface-2:#0f1530; --text:#e2e8f0; --text-soft:#cbd5e1; --muted:#64748b;
  --border:#1f2a44; --primary:#818cf8; --primary-2:#a78bfa; --primary-soft:#1e1b4b;
  --glass:rgba(18,25,49,.6); --glass-border:rgba(255,255,255,.08);
  --sidebar:#070b1a; --sidebar-active:#111a36;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
img{max-width:100%;display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ============== UTILITIES ============== */
.hidden{display:none !important}
.flex{display:flex}.grid{display:grid}.gap-1{gap:6px}.gap-2{gap:10px}.gap-3{gap:16px}.gap-4{gap:24px}
.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.flex-1{flex:1}.flex-col{flex-direction:column}.wrap{flex-wrap:wrap}
.text-sm{font-size:12.5px}.text-lg{font-size:16px}.text-xl{font-size:20px}.text-2xl{font-size:26px}.text-3xl{font-size:34px}
.font-bold{font-weight:700}.font-semi{font-weight:600}.muted{color:var(--muted)}.soft{color:var(--text-soft)}
.mt-1{margin-top:8px}.mt-2{margin-top:16px}.mt-3{margin-top:24px}.mt-4{margin-top:32px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}.mb-3{margin-bottom:24px}
.p-2{padding:12px}.p-3{padding:18px}.p-4{padding:24px}
.rounded{border-radius:var(--radius)}.rounded-sm{border-radius:var(--radius-sm)}
.full{width:100%}.center{text-align:center}
.scroll{overflow:auto}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--surface-2);color:var(--text-soft)}
.badge.success{background:rgba(16,185,129,.12);color:var(--success)}
.badge.warn{background:rgba(245,158,11,.14);color:var(--warning)}
.badge.danger{background:rgba(239,68,68,.12);color:var(--danger)}
.badge.info{background:rgba(14,165,233,.12);color:var(--info)}
.badge.primary{background:var(--primary-soft);color:var(--primary)}

/* ============== BUTTONS ============== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:13.5px;transition:all .18s ease;border:1px solid transparent;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--gradient);color:#fff;box-shadow:var(--shadow-sm)}
.btn.primary:hover{box-shadow:0 10px 24px rgba(99,102,241,.35)}
.btn.ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.soft{background:var(--primary-soft);color:var(--primary)}
.btn.danger{background:rgba(239,68,68,.1);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.icon{padding:9px;width:38px;height:38px}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

/* ============== FORMS ============== */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12.5px;font-weight:600;color:var(--text-soft)}
.input,.select,.textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);background:var(--surface);
  border-radius:var(--radius-sm);transition:all .15s;outline:none;color:var(--text);
}
.input:focus,.select:focus,.textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.12)}
.textarea{min-height:90px;resize:vertical;font-family:inherit}
.input-icon{position:relative}
.input-icon .input{padding-left:40px}
.input-icon svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.pw-wrap{position:relative}
.pw-wrap button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);padding:6px}
.checkbox{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px}
.checkbox input{width:16px;height:16px;accent-color:var(--primary)}
.error-msg{color:var(--danger);font-size:12px;margin-top:4px;display:block}

/* ============== CARD ============== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);transition:all .2s}
.card.hover:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.pay-opt{transition:all .18s}
.pay-opt.selected{background:linear-gradient(135deg,var(--primary-soft),rgba(99,102,241,.18))!important;border:2px solid var(--primary)!important;box-shadow:0 6px 18px -6px var(--primary);transform:translateY(-2px)}
.pay-opt.selected::after{content:'✓';position:absolute;top:6px;right:8px;background:var(--primary);color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700}
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border)}

/* ============== AUTH ============== */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
.auth-hero{background:var(--gradient);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-hero::before,.auth-hero::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.08)}
.auth-hero::before{width:500px;height:500px;top:-200px;right:-200px}
.auth-hero::after{width:340px;height:340px;bottom:-140px;left:-100px}
.auth-hero > *{position:relative;z-index:1}
.auth-hero h1{font-size:38px;font-weight:800;line-height:1.15;margin-top:24px}
.auth-hero p{opacity:.9;margin-top:14px;font-size:15px;max-width:440px}
.auth-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:32px;max-width:480px}
.auth-stats div{background:rgba(255,255,255,.13);padding:14px;border-radius:14px;backdrop-filter:blur(6px)}
.auth-stats b{font-size:22px;display:block}
.auth-form{display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{width:100%;max-width:420px}
.auth-card h2{font-size:26px;font-weight:800;margin-bottom:6px}
.auth-card .sub{color:var(--text-soft);margin-bottom:24px}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
@media (max-width:900px){.auth-wrap{grid-template-columns:1fr}.auth-hero{display:none}}

/* ============== APP LAYOUT ============== */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--sidebar);color:var(--sidebar-text);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform .25s}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
.sidebar-brand .logo{width:36px;height:36px;border-radius:10px;background:var(--gradient);display:grid;place-items:center;color:#fff;font-weight:800}
.sidebar-brand b{color:#fff;font-size:16px}
.sidebar-section{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--sidebar-text);cursor:pointer;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--sidebar-active);color:#fff}
.nav-item.active{background:var(--gradient);color:#fff;box-shadow:0 6px 14px rgba(99,102,241,.35)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:30;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.topbar h1{font-size:18px;font-weight:700}
.topbar .search{flex:1;max-width:420px}
.topbar .avatar{width:36px;height:36px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;cursor:pointer}
.page{padding:24px;max-width:1400px;width:100%;margin:0 auto}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.page-head h2{font-size:24px;font-weight:800}
.page-head p{color:var(--text-soft);margin-top:4px}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.stat .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);margin-bottom:10px}
.stat b{font-size:24px;font-weight:800;display:block;letter-spacing:-.02em}
.stat span{color:var(--muted);font-size:12.5px;font-weight:600}
.stat .trend{position:absolute;top:18px;right:18px;font-size:11.5px;color:var(--success);font-weight:600}

/* Grids */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}

/* Table */
.table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden}
.table th,.table td{padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
.table th{background:var(--surface-2);font-weight:700;color:var(--text-soft);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
.table tbody tr:hover{background:var(--surface-2)}
.table tbody tr:last-child td{border-bottom:0}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}

/* Course card */
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.course-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.course-thumb{height:150px;background:var(--gradient);display:grid;place-items:center;color:#fff;font-size:42px;font-weight:800;position:relative}
.course-thumb .cat{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.45);padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;color:#fff}
.course-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.course-body h3{font-size:15px;font-weight:700;line-height:1.35}
.course-body .ins{font-size:12px;color:var(--muted)}
.course-meta{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;border-top:1px solid var(--border)}
.course-meta .price{font-weight:800;color:var(--primary);font-size:15px}
.rating{display:inline-flex;align-items:center;gap:3px;color:#f59e0b;font-size:12px;font-weight:600}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;overflow-y:auto}
.modal-back.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:popin .2s}
.modal.lg{max-width:820px}
.modal.xl{max-width:1000px}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:18px;font-weight:700}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface)}
@keyframes popin{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}

/* Toast */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;max-width:340px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);padding:14px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow);animation:slidein .25s;display:flex;gap:10px}
.toast.success{border-left-color:var(--success)}
.toast.danger{border-left-color:var(--danger)}
.toast.warn{border-left-color:var(--warning)}
@keyframes slidein{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1.5px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tabs button{padding:10px 16px;font-weight:600;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Empty */
.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.empty svg{width:54px;height:54px;margin-bottom:10px;opacity:.5}

/* Mobile */
.mobile-bar,.fab,.menu-toggle{display:none}
.menu-toggle{padding:8px;border-radius:8px}
@media (max-width:1024px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:50;transform:translateX(-100%);width:280px;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:inline-flex}
  .mobile-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:40;padding:8px;justify-content:space-around;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
  .mobile-bar button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;color:var(--muted);padding:6px 10px;border-radius:10px;font-weight:600;flex:1}
  .mobile-bar button.active{color:var(--primary);background:var(--primary-soft)}
  .mobile-bar svg{width:20px;height:20px}
  .fab{display:grid;place-items:center;position:fixed;bottom:80px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--gradient);color:#fff;box-shadow:0 12px 26px rgba(99,102,241,.45);z-index:39}
  .page{padding-bottom:90px}
  .topbar h1{font-size:15px}
  .topbar .search{display:none}
  .auth-hero{display:none}
}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45;display:none}
.backdrop.open{display:block}

/* Video player */
.vp{background:#000;border-radius:var(--radius);aspect-ratio:16/9;position:relative;display:grid;place-items:center;color:#fff;overflow:hidden}
.vp .play{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;cursor:pointer;backdrop-filter:blur(8px)}
.vp .controls{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);display:flex;align-items:center;gap:10px;font-size:12px}
.vp .progress{flex:1;height:4px;background:rgba(255,255,255,.25);border-radius:4px;cursor:pointer;position:relative}
.vp .progress .bar{height:100%;background:var(--primary);border-radius:4px;width:0;transition:width .15s}

/* Chart */
canvas.chart{width:100%;max-height:280px}

/* Certificate */
.cert{aspect-ratio:1.41;background:linear-gradient(135deg,#fef3c7,#fde68a);border:14px double #b45309;padding:34px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:10px;color:#78350f;font-family:Georgia,serif;border-radius:8px;position:relative}
.cert h1{font-size:34px;letter-spacing:.08em}
.cert .name{font-size:30px;font-weight:bold;border-bottom:2px solid #78350f;padding-bottom:6px;margin:18px auto;display:inline-block}
.cert .qr{position:absolute;bottom:18px;right:18px;width:64px;height:64px;background:#fff;padding:4px;border-radius:6px;display:grid;place-items:center;font-size:8px;color:#000}

/* Forum */
.thread{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer}
.thread:hover{border-color:var(--primary)}

/* Pricing */
.plan{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-align:center;transition:all .2s}
.plan.featured{border-color:var(--primary);box-shadow:0 16px 40px rgba(99,102,241,.18);transform:scale(1.03)}
.plan h3{font-size:18px;font-weight:700}
.plan .price{font-size:34px;font-weight:800;margin:12px 0;color:var(--primary)}
.plan ul{list-style:none;text-align:left;margin:14px 0}
.plan li{padding:7px 0;display:flex;gap:8px;font-size:13px}
.plan li::before{content:"✓";color:var(--success);font-weight:700}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-grid .day{aspect-ratio:1;background:var(--surface-2);border-radius:8px;padding:6px;font-size:12px;font-weight:600;position:relative;cursor:pointer}
.cal-grid .day.has{background:var(--primary-soft);color:var(--primary)}
.cal-grid .day.today{background:var(--gradient);color:#fff}
.cal-grid .head{aspect-ratio:auto;text-align:center;font-size:11px;color:var(--muted);background:none;padding:4px}

/* Misc */
.offline-banner{position:fixed;top:0;left:0;right:0;background:var(--warning);color:#fff;text-align:center;padding:8px;font-size:12px;font-weight:600;z-index:300}
.progress-bar{height:8px;background:var(--surface-2);border-radius:8px;overflow:hidden}
.progress-bar > div{height:100%;background:var(--gradient);transition:width .35s}
.list-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border)}
.list-row:last-child{border:0}
.av{width:38px;height:38px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0;font-size:13px}

<body>
<div class="toast-wrap" id="toastWrap"></div>
<div class="backdrop" id="backdrop"></div>
<div class="modal-back" id="modalBack"></div>
<div id="offlineBanner" class="offline-banner hidden">⚠ Anda sedang offline — beberapa fitur dibatasi</div>
<div id="app"></div>

<script>
/* ============================================================
 * EDUFLOW LMS — Single File SaaS Application
 * Vanilla HTML / CSS / JS only. No external libraries.
 * ============================================================ */

/* ---------------- STORAGE LAYER ----------------
 * IN-MEMORY ONLY — TIDAK menggunakan localStorage.
 * Sumber kebenaran ada di backend (Google Apps Script + Spreadsheet/Drive).
 * Cache di-hydrate via pullFromBackend(); setiap DB.set() utk key yg di-sync
 * otomatis push ke backend (debounced) supaya semua perangkat konsisten.
 * Session JWT tetap di sessionStorage (auto clear saat tab ditutup).
 * ============================================================ */
const _MEM = Object.create(null);
// Key data yg di-sinkron ke spreadsheet via syncPush (selain itu hanya cache UI)
const SYNC_KEYS = new Set([
  'users','courses','categories','instructors','transactions','coupons',
  'reviews','threads','calendar','notifications','affiliates','memberships',
  'broadcasts','materials','certificates','settings','paymentSettings','certTemplate',
  'paymentTests','enrollments','submissions','modules','quizzes','assignments'
]);
const _pushQueue = {};
let _pushTimer = null;
let _pushFailRetry = 0;
async function _flushPush(){
  _pushTimer = null;
  const payload = Object.assign({}, _pushQueue);
  for (const k in _pushQueue) delete _pushQueue[k];
  if (!Object.keys(payload).length) return;
  try {
    const r = await apiFetch('syncPush', payload, {retries:3});
    if (!r || !r.ok){
      Object.keys(payload).forEach(k=>{ if (!(k in _pushQueue)) _pushQueue[k] = payload[k]; });
      _pushFailRetry = Math.min(_pushFailRetry + 1, 6);
      const backoff = Math.min(30000, 1000 * Math.pow(2, _pushFailRetry));
      if (typeof toast === 'function') toast('Gagal sinkron ke server, mencoba lagi…','warn');
      _pushTimer = setTimeout(_flushPush, backoff);
    } else {
      _pushFailRetry = 0;
    }
  } catch(_){
    Object.keys(payload).forEach(k=>{ if (!(k in _pushQueue)) _pushQueue[k] = payload[k]; });
    _pushTimer = setTimeout(_flushPush, 3000);
  }
}
function _schedulePush(key, val){
  if (!SYNC_KEYS.has(key)) return;
  if (typeof API_ENABLED === 'function' && !API_ENABLED()) return;
  _pushQueue[key] = val;
  if (_pushTimer) clearTimeout(_pushTimer);
  _pushTimer = setTimeout(_flushPush, 400);
}
// Flush sisa queue saat tab ditutup (best effort)
if (typeof window !== 'undefined'){
  window.addEventListener('beforeunload', ()=>{
    if (Object.keys(_pushQueue).length){ try { _flushPush(); } catch(_){} }
  });
}
const DB = {
  get(key, def){ return (key in _MEM) ? _MEM[key] : def; },
  set(key, val){ _MEM[key] = val; _schedulePush(key, val); },
  // kompatibilitas API lama (no-op)
  load(){ return Object.assign({}, _MEM); },
  save(d){ if (d && typeof d==='object') Object.assign(_MEM, d); },
};
const session = {
  get(){ try{return JSON.parse(sessionStorage.getItem('eduflow_session')||'null');}catch(e){return null;} },
  set(s){ try{ sessionStorage.setItem('eduflow_session', JSON.stringify(s)); }catch(e){} },
  clear(){ try{ sessionStorage.removeItem('eduflow_session'); }catch(e){} }
};

/* ============================================================
 * BACKEND API LAYER — Google Apps Script (Code.gs)  [SECURE]
 *
 *  CONFIG: paste dari hasil Deploy → New Deployment → Web App
 *  - GAS_URL     : URL Web App
 *  - CLIENT_HMAC : sama dgn HMAC_SECRET di Script Properties (Code.gs)
 *
 *  Semua request ditandatangani HMAC-SHA256 (browser SubtleCrypto).
 *  Login mengembalikan JWT — disimpan di sessionStorage (tidak persistent
 *  di localStorage agar tidak bisa dibaca script pihak lain via XSS reflection).
 * ============================================================ */
// Bisa di-override runtime via window.GAS_URL / window.CLIENT_HMAC (atau window.HMAC_SECRET)
const GAS_URL     = (typeof window!=='undefined' && window.GAS_URL) || "https://script.google.com/macros/s/AKfycbwyZsvGF-MDFWMlUNb97F5RMw2BxE_WHnjSzNuRWPflgmSL8FEioPz-UT-xp4cIvSTi/exec";
const CLIENT_HMAC = (typeof window!=='undefined' && (window.CLIENT_HMAC || window.HMAC_SECRET)) || "V9kX4mP7tR2wQ8zN5cL1hF6aD3sJ9eB7yU2gK8nM4vC1xT5qW9rL6pZ3dH7fS2aY8nE4jR1uI6oP9bV5cX2tM7wQ3kL8yF1";
const API_ENABLED = () => GAS_URL && !GAS_URL.includes('URL_DEPLOY_GAS_ANDA');

// JWT token store — sessionStorage = auto-clear saat tab ditutup
const tokenStore = {
  get(){ try{ return sessionStorage.getItem('eduflow_jwt')||''; }catch(e){ return ''; } },
  set(t){ try{ sessionStorage.setItem('eduflow_jwt', t||''); }catch(e){} },
  clear(){ try{ sessionStorage.removeItem('eduflow_jwt'); }catch(e){} }
};

// HMAC-SHA256 (Web Crypto) → base64url
async function _hmacSign(message){
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(CLIENT_HMAC),
    {name:'HMAC', hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
  let bin=''; new Uint8Array(sig).forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function apiFetch(action, payload = {}, opts = {}){
  if (!API_ENABLED()) return { ok:false, offline:true, msg:'Backend offline (GAS_URL belum diset)' };
  const max = opts.retries ?? 3;
  let delay = 600, lastErr = null;
  for (let i=0; i<max; i++){
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(()=>ctrl.abort(), opts.timeout || 30000);
      const ts = Date.now();
      // BULLETPROOF: tandatangani body MENTAH yg dikirim. Server verifikasi byte-byte
      // yg sama persis dgn yg diterima (tanpa rebuild, tanpa re-stringify).
      const envelope = { action, data: payload, ts, token: tokenStore.get() };
      const raw = JSON.stringify(envelope);
      const sig = await _hmacSign(raw);
      // Sig dikirim via query-param + juga di body (mode fallback) supaya kompatibel.
      const url = GAS_URL + (GAS_URL.indexOf('?')>=0 ? '&' : '?') + 'sig=' + encodeURIComponent(sig);
      const res = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'}, // hindari preflight
        body: raw,
        redirect:'follow',
        signal: ctrl.signal
      });
      clearTimeout(tid);
      if (!res.ok) throw new Error('HTTP '+res.status);
      const json = await res.json();
      // server boleh mengembalikan token baru (login/register)
      if (json && json.token) tokenStore.set(json.token);
      return json;
    } catch(err){
      lastErr = err;
      if (i < max-1){ await new Promise(r=>setTimeout(r, delay)); delay *= 2; }
    }
  }
  console.warn('[apiFetch]', action, 'gagal:', lastErr);
  return { ok:false, offline:true, msg:'Tidak dapat terhubung ke server: '+(lastErr&&lastErr.message||'') };
}

// fire-and-forget
function apiSync(action, payload){
  if (!API_ENABLED()) return;
  apiFetch(action, payload, {retries:2}).catch(()=>{});
}

/* ===== FILE UPLOAD ke Google Drive via GAS =====
   Contract GAS (Code.gs di sisi Anda harus handle):
     POST { action:'uploadFile', data:{ filename, mime, base64, type, title, description } }
       -> { ok:true, data:{ fileId, url, viewUrl, size } }
     POST { action:'deleteFile', data:{ fileId } } -> { ok:true }
   Jika GAS_URL belum diset, file disimpan sebagai data-URL di localStorage (fallback).
*/
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=> res(String(r.result).split(',')[1]||'');
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function fileToDataUrl(file){
  return new Promise((res,rej)=>{
    const r = new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file);
  });
}
function blobToBase64(blob){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=> res(String(r.result).split(',')[1]||'');
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}
/* ====== Chunk Upload v2 ======
   - Pecah file → potongan 4MB (CHUNK_SIZE bisa diubah).
   - uploadId deterministik (resume otomatis setelah refresh / offline).
   - getUploadStatus → skip chunk yang sudah ada di server.
   - Retry+backoff per chunk; mergeChunks di akhir.
   - localStorage menyimpan progress untuk hint resume.
*/
const CHUNK_SIZE = (window.CHUNK_SIZE_MB ? Number(window.CHUNK_SIZE_MB) : 4) * 1024 * 1024;
const _RESUME_MEM = Object.create(null);

function _genUploadId(file){
  const sig = `${file.name}|${file.size}|${file.lastModified}`;
  let h = 0; for (let i=0;i<sig.length;i++){ h = (h*31 + sig.charCodeAt(i))|0; }
  return 'u' + Math.abs(h).toString(36) + '_' + file.size.toString(36);
}
function _resumeRead(){ return Object.assign({}, _RESUME_MEM); }
function _resumeSave(id, info){ _RESUME_MEM[id] = Object.assign({}, _RESUME_MEM[id]||{}, info, {ts:Date.now()}); }
function _resumeDrop(id){ delete _RESUME_MEM[id]; }

async function uploadToDrive(file, meta={}){
  // SEMUA file → Google Drive via chunk upload. Tidak ada fallback localStorage.
  if (!API_ENABLED()){
    return { ok:false, msg:'Backend (GAS_URL) belum dikonfigurasi.' };
  }
  const mime = file.type || 'application/octet-stream';
  const type = mime.startsWith('video')?'video':mime.startsWith('audio')?'audio':mime.startsWith('image')?'image':(mime==='application/pdf'?'pdf':'doc');
  const total = Math.max(1, Math.ceil(file.size / CHUNK_SIZE));
  const uploadId = _genUploadId(file);

  const report = (pct, idx, tot, label) => {
    if (typeof meta.onProgress === 'function'){ try { meta.onProgress(pct, idx, tot, label||''); } catch(_){} }
    if (typeof meta.onStatus === 'function'){ try { meta.onStatus(label||''); } catch(_){} }
  };

  try {
    report(0, 0, total, `Memulai upload (${total} chunk @ ${(CHUNK_SIZE/1024/1024).toFixed(0)} MB)`);

    // 1) cek progress di server (resume)
    let done = new Set();
    try {
      const st = await apiFetch('getUploadStatus', { uploadId }, { retries:1, timeout:30000 });
      if (st && st.ok && st.data && Array.isArray(st.data.uploadedChunks)){
        st.data.uploadedChunks.forEach(i => { if (i < total) done.add(i); });
      }
    } catch(_){}
    if (done.size){
      report(Math.round(done.size*100/total), done.size, total, `Resume ${done.size}/${total} chunk`);
    }
    _resumeSave(uploadId, { name:file.name, size:file.size, total, mime });

    // 2) kirim chunk yg belum ada (sequential agar urutan + memori aman)
    for (let i = 0; i < total; i++){
      if (done.has(i)) continue;
      const start = i * CHUNK_SIZE;
      const slice = file.slice(start, Math.min(start + CHUNK_SIZE, file.size));
      const base64 = await blobToBase64(slice);

      let ok = false, lastErr = null;
      for (let attempt = 1; attempt <= 4 && !ok; attempt++){
        try {
          const r = await apiFetch('uploadChunk', {
            uploadId, fileName: file.name, mime, totalSize: file.size,
            chunkIndex: i, totalChunks: total, chunkData: base64,
            title: meta.title || file.name, description: meta.description || ''
          }, { timeout: 180000, retries: 0 });
          if (!r || !r.ok) throw new Error((r && r.msg) || 'chunk gagal');
          ok = true;
        } catch(e){
          lastErr = e;
          report(Math.round(done.size*100/total), done.size, total,
                 `Chunk ${i+1}/${total} gagal (percobaan ${attempt}): ${e.message||e}`);
          await new Promise(r => setTimeout(r, 800 * attempt));
        }
      }
      if (!ok){
        _resumeSave(uploadId, { uploaded: Array.from(done) });
        return { ok:false, msg:'Chunk '+(i+1)+'/'+total+' gagal terus: '+(lastErr && lastErr.message || lastErr) };
      }
      done.add(i);
      _resumeSave(uploadId, { uploaded: Array.from(done) });
      report(Math.round(done.size*100/total), done.size, total, `Mengupload chunk ${done.size}/${total}`);
    }

    // 3) merge di server
    report(100, total, total, 'Menggabungkan file di server…');
    const m = await apiFetch('mergeChunks', {
      uploadId, fileName: file.name, mime, totalChunks: total,
      title: meta.title || file.name, description: meta.description || ''
    }, { timeout: 600000, retries: 1 });
    if (!m || !m.ok) return { ok:false, msg:(m && m.msg) || 'Merge gagal' };

    _resumeDrop(uploadId);
    m.data.type = m.data.type || type;
    m.data.mime = m.data.mime || mime;
    report(100, total, total, 'Upload selesai ✔');
    return m;
  } catch(e){
    return { ok:false, msg: String(e && e.message || e) };
  }
}

/** Batalkan upload yang masih berjalan / sisa chunk di server. */
async function cancelUpload(file){
  if (!file) return;
  const uploadId = _genUploadId(file);
  try { await apiFetch('cleanupChunks', { uploadId }, { retries:1 }); } catch(_){}
  _resumeDrop(uploadId);
}

async function deleteFromDrive(fileId){
  if (!fileId) return { ok:true };
  if (!API_ENABLED() || String(fileId).startsWith('local_')) return { ok:true };
  return apiFetch('deleteFile', { fileId }, { retries:1 });
}

/**
 * Selaraskan skema sheet (flat: modules/materials/quizzes/assignments dengan courseId+moduleId)
 * dengan skema frontend (modules nested di dalam course; field alias: calendar.date, threads.body).
 */
function _normalizeBackendData(){
  // ---- Calendar: backend pakai `start`/`end`, frontend baca `date`
  const cal = _MEM.calendar || [];
  if (Array.isArray(cal)){
    cal.forEach(e=>{
      if (e && e.date == null) e.date = e.start || e.startAt || e.createdAt || Date.now();
    });
  }
  // ---- Threads: backend pakai `content`, frontend baca `body`
  const ths = _MEM.threads || [];
  if (Array.isArray(ths)){
    ths.forEach(t=>{
      if (t && t.body == null) t.body = t.content || '';
      if (Array.isArray(t.replies)) t.replies.forEach(r=>{ if (r && r.body == null) r.body = r.content || ''; });
      if (typeof t.likes !== 'number') t.likes = 0;
      if (!Array.isArray(t.replies)) t.replies = [];
    });
  }
  // ---- Nest modules + materials + quizzes + assignments ke dalam course
  const courses = _MEM.courses || [];
  const mods    = _MEM.modules || [];
  const mats    = _MEM.materials || [];
  const qzs     = _MEM.quizzes || [];
  const asgs    = _MEM.assignments || [];
  if (Array.isArray(courses) && courses.length){
    courses.forEach(c=>{
      // Hanya overwrite kalau backend benar2 punya modules utk course ini
      const cMods = mods.filter(m=>m && m.courseId===c.id);
      if (cMods.length){
        // Tambahkan materi & quiz & assignment sebagai "module" agar UI lama tetap jalan
        const list = [];
        cMods.sort((a,b)=>(a.order||0)-(b.order||0)).forEach(m=>{
          list.push({
            id:m.id, title:m.title, type:'text', content:m.description||'',
            duration:(m.duration||10)+':00', materialSource:'link', url:'', fileId:'',
            _kind:'module'
          });
          mats.filter(x=>x.moduleId===m.id).sort((a,b)=>(a.order||0)-(b.order||0)).forEach(mt=>{
            list.push({
              id:mt.id, title:mt.title, type:(mt.type==='video'?'video':mt.type==='pdf'?'pdf':'text'),
              content:mt.content||'', url:mt.url||'', fileId:mt.fileId||'',
              duration:(mt.duration||10)+':00', materialSource: mt.fileId?'upload':'link',
              materialId: mt.id, _kind:'material'
            });
          });
          qzs.filter(x=>x.moduleId===m.id).forEach(q=>{
            list.push({ id:q.id, title:q.title, type:'quiz', content:JSON.stringify(q.questions||[]),
              passingScore:q.passingScore||70, duration:'15:00', _kind:'quiz' });
          });
          asgs.filter(x=>x.moduleId===m.id).forEach(a=>{
            list.push({ id:a.id, title:a.title, type:'assignment', content:a.description||'',
              deadline:a.deadline, maxScore:a.maxScore||100, duration:'60:00', _kind:'assignment' });
          });
        });
        c.modules = list;
      } else if (!Array.isArray(c.modules)){
        c.modules = [];
      }
    });
  }
}

async function pullFromBackend(silent){
  const r = await apiFetch('syncPull', {}, {retries:1});
  if (r && r.ok && r.data){
    const map = {
      users:'users', courses:'courses', categories:'categories', instructors:'instructors',
      transactions:'transactions', coupons:'coupons', reviews:'reviews', threads:'threads',
      calendar:'calendar', notifications:'notifications', affiliates:'affiliates',
      memberships:'memberships', broadcasts:'broadcasts', materials:'materials',
      certificates:'certificates', settings:'settings', paymentSettings:'paymentSettings',
      certTemplate:'certTemplate',
      modules:'modules', quizzes:'quizzes', assignments:'assignments',
      submissions:'submissions', enrollments:'enrollments', paymentTests:'paymentTests'
    };
    // Snapshot edit lokal yg masih di queue → jangan ditimpa hasil pull lama
    const pendingKeys = Object.keys(_pushQueue||{});
    Object.entries(map).forEach(([k,sk])=>{
      if (pendingKeys.indexOf(sk) >= 0) return; // ada edit pending → skip overwrite key ini
      if (r.data[k] !== undefined && r.data[k] !== null) {
        _MEM[sk] = r.data[k];
      }
    });
    // Normalisasi schema backend ↔ frontend
    try { _normalizeBackendData(); } catch(e){ console.warn('normalize', e); }
    // SCAN Drive: file yang diupload manual ke Drive ID akan otomatis muncul sbg materi
    try {
      const ds = await apiFetch('listDriveFiles', {}, {retries:1});
      if (ds && ds.ok && Array.isArray(ds.data)){
        const mats = DB.get('materials',[]);
        let added = 0;
        ds.data.forEach(f=>{
          if (!mats.some(m=>m.fileId===f.fileId)){
            mats.unshift({
              id:'mat_drv_'+f.fileId, title:f.name, type:f.type,
              fileId:f.fileId, url:f.url, viewUrl:f.viewUrl,
              mime:f.mime, size:f.size, createdAt:f.createdAt||Date.now(),
              source:'drive-scan'
            });
            added++;
          }
        });
        if (added){ DB.set('materials', mats); }
      }
    } catch(_){}
    if (!silent) toast('Data tersinkron dari server','success');
  }
}
// Auto-poll setiap 30 detik bila user sudah login & backend aktif.
// Skip pull bila masih ada push pending (hindari overwrite edit lokal yg belum terkirim).
let _syncTimer = null;
function startAutoSync(){
  if (_syncTimer) clearInterval(_syncTimer);
  if (!API_ENABLED()) return;
  _syncTimer = setInterval(()=>{
    if (!state || !state.user) return;
    if (_pushTimer) return; // ada edit lokal yg belum ke-push, skip cycle ini
    pullFromBackend(true).then(()=>{ try{ render(); }catch(_){} });
  }, 30000);
}
window.startAutoSync = startAutoSync;
// push seluruh state lokal ke backend (sekali jalan saat first run)
async function pushToBackend(){
  const payload = {
    users:DB.get('users',[]), courses:DB.get('courses',[]), categories:DB.get('categories',[]),
    instructors:DB.get('instructors',[]), transactions:DB.get('transactions',[]),
    coupons:DB.get('coupons',[]), reviews:DB.get('reviews',[]), threads:DB.get('threads',[]),
    calendar:DB.get('calendar',[]), notifications:DB.get('notifications',[]),
    affiliates:DB.get('affiliates',[]), memberships:DB.get('memberships',[]),
    broadcasts:DB.get('broadcasts',[]), materials:DB.get('materials',[]),
    certificates:DB.get('certificates',[]), modules:DB.get('modules',[]),
    quizzes:DB.get('quizzes',[]), assignments:DB.get('assignments',[]),
    submissions:DB.get('submissions',[]), enrollments:DB.get('enrollments',[]),
    paymentTests:DB.get('paymentTests',[]),
    settings:DB.get('settings'), paymentSettings:DB.get('paymentSettings'),
    certTemplate:DB.get('certTemplate')
  };
  return apiFetch('syncPush', payload);
}
window.pullFromBackend = pullFromBackend;
window.pushToBackend = pushToBackend;

/* ---------------- HELPERS ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const $$= (s,el=document)=>[...el.querySelectorAll(s)];
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = (p='id')=>p+'_'+Math.random().toString(36).slice(2,10);
const fmtRp = n => 'Rp '+Number(n||0).toLocaleString('id-ID');
const fmtDate = d => new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
const fmtDateTime = d => new Date(d).toLocaleString('id-ID');
const debounce=(f,w=200)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>f(...a),w);};};

function toast(msg, type='info'){
  const w = $('#toastWrap');
  const el = document.createElement('div');
  el.className='toast '+type;
  el.innerHTML = `<div style="flex:1"><b style="font-size:13px">${esc(msg)}</b></div><button onclick="this.parentNode.remove()" style="color:var(--muted)">✕</button>`;
  w.appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

function modal({title, body, foot, size=''}){
  const mb = $('#modalBack');
  mb.innerHTML = `<div class="modal ${size}">
    <div class="modal-head"><h3>${esc(title)}</h3><button onclick="closeModal()" class="btn icon ghost">✕</button></div>
    <div class="modal-body">${body}</div>
    ${foot?`<div class="modal-foot">${foot}</div>`:''}
  </div>`;
  mb.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){ $('#modalBack').classList.remove('open'); $('#modalBack').innerHTML=''; document.body.style.overflow=''; }
$('#modalBack').addEventListener('click', e=>{ if(e.target.id==='modalBack') closeModal(); });

function confirmModal(msg, onYes){
  modal({

/* ---------------- AUTH ---------------- */
function checkLogin(){
  const s = session.get();
  if(s && s.userId){
    const users = DB.get('users',[]);
    let u = users.find(x=>x.id===s.userId);
    if(!u){
      const ins = DB.get('instructors',[]).find(x=>x.id===s.userId);
      if(ins) u = { id:ins.id, name:ins.name, email:ins.email, role:'instructor', status:'active',
                    expertise:ins.expertise||'', bio:ins.bio||'', permissions:ins.permissions||{} };
    }
    if(u){
      const tout = (DB.get('settings').security?.sessionTimeout||60)*60*1000;
      if(Date.now() - (s.loginAt||0) > tout){
        session.clear(); state.user=null;
        toast('Sesi berakhir, silakan login kembali','warn');
        return false;
      }
      state.user = u;
      if (u.cart && typeof u.cart === 'object') state.cart = Object.assign({}, u.cart);
      return true;
    }
  }
  return false;
}

function login(email, password, remember){
  // Otentikasi 100% di backend (Code.gs). Tidak ada fallback password lokal.
  if (!API_ENABLED()){
    return Promise.resolve({ok:false, msg:'Backend belum dikonfigurasi (GAS_URL). Hubungi admin.'});
  }
  return loginAsync(email, password, remember);
}
async function loginAsync(email, password, remember){
  const r = await apiFetch('login', {email, password});
  if (!r || !r.ok) return {ok:false, msg:(r && r.msg) || 'Login gagal'};
  // simpan profil minimal (TANPA password) ke users cache
  const us = DB.get('users',[]); const ix = us.findIndex(x=>x.id===r.user.id);
  const safe = Object.assign({}, r.user); delete safe.password;
  if (ix>=0) us[ix] = {...us[ix], ...safe}; else us.push(safe);
  DB.set('users', us);
  session.set({userId:r.user.id, loginAt:Date.now(), remember:!!remember});
  state.user = safe;
  if (safe.cart && typeof safe.cart === 'object') state.cart = Object.assign({}, safe.cart);
  return {ok:true};
}
function logout(){ session.clear(); tokenStore.clear(); state.user=null; render(); }
function register(data){
  if (API_ENABLED()) return registerAsync(data);
  // Backend belum dikonfigurasi → tolak. Password TIDAK pernah disimpan plaintext di localStorage.
  return Promise.resolve({
    ok:false,
    msg:'Registrasi memerlukan backend aktif. Set GAS_URL pada Code.gs (deploy Web App) terlebih dahulu.'
  });
}
async function registerAsync(data){
  const r = await apiFetch('register', {name:data.name, email:data.email, password:data.password});
  if (!r || !r.ok) return {ok:false, msg:(r && r.msg) || 'Registrasi gagal'};
  const us = DB.get('users',[]);
  const safe = Object.assign({}, r.user); delete safe.password;
  us.push(safe); DB.set('users', us);
  return {ok:true, user:safe};
}

}

function bindAuth(mode){
  $$('[data-go]').forEach(a=>a.onclick=e=>{e.preventDefault();renderAuth(a.dataset.go);});

  if(mode==='login'){
    $('#loginForm').onsubmit = async e=>{
      e.preventDefault();
      const f = e.target;
      let ok=true;
      const showErr=(n,m)=>{const s=f.querySelector(`[data-err="${n}"]`);s.textContent=m;s.classList.toggle('hidden',!m);if(m)ok=false;};
      showErr('email', !/^\S+@\S+\.\S+$/.test(f.email.value)?'Email tidak valid':'');
      showErr('password', f.password.value.length<6?'Password minimal 6 karakter':'');
      if(!ok) return;
      const btn = f.querySelector('button[type="submit"]'); if(btn){btn.disabled=true; btn.textContent='Memproses…';}
      try {
        const res = login(f.email.value.trim(), f.password.value, f.remember.checked);
        const r = (res && typeof res.then === 'function') ? await res : res;
        if(!r.ok){ toast(r.msg,'danger'); return; }
        toast('Login berhasil','success');
        try { await pullFromBackend(true); } catch(_){}
        startAutoSync();
        render();
      } finally { if(btn){btn.disabled=false; btn.textContent='Masuk';} }
    };
  } else if(mode==='register'){
    $('#regForm').onsubmit = async e=>{
      e.preventDefault();
      const f = e.target;
      let ok=true;
      const showErr=(n,m)=>{const s=f.querySelector(`[data-err="${n}"]`);s.textContent=m;s.classList.toggle('hidden',!m);if(m)ok=false;};
      showErr('name', f.name.value.trim().length<3?'Nama minimal 3 karakter':'');
      showErr('email', !/^\S+@\S+\.\S+$/.test(f.email.value)?'Email tidak valid':'');
      showErr('password', f.password.value.length<8?'Minimal 8 karakter':'');
      showErr('tos', !f.tos.checked?'Wajib disetujui':'');
      if(!ok) return;
      const btn = f.querySelector('button[type="submit"]'); if(btn){btn.disabled=true; btn.textContent='Memproses…';}
      try {
        const res = register({name:f.name.value.trim(),email:f.email.value.trim(),password:f.password.value});
        const r = (res && typeof res.then === 'function') ? await res : res;
        if(!r.ok){ toast(r.msg,'danger'); return; }
        toast('Pendaftaran berhasil! Silakan masuk.','success');
        renderAuth('login');
      } finally { if(btn){btn.disabled=false; btn.textContent='Daftar Sekarang';} }
    };
  } else {
    $('#forgotForm').onsubmit = e=>{
      e.preventDefault();
      const em = e.target.email.value.trim();
      if(!/^\S+@\S+\.\S+$/.test(em)){ toast('Email tidak valid','danger'); return; }
      toast('Link reset telah dikirim (simulasi) ke '+em,'success');
      setTimeout(()=>renderAuth('login'), 1500);
    };
  }
}

function statCard(label,val,ic,trend){
  return `<div class="stat"><div class="ic">${ic}</div><b>${val}</b><span>${label}</span>${trend?`<div class="trend">${trend}</div>`:''}</div>`;

function genLast7Days(trx){
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const next=d.getTime()+86400000;
    const tot = trx.filter(t=>t.createdAt>=d.getTime()&&t.createdAt<next).reduce((a,t)=>a+(t.amount!=null?t.amount:(t.total!=null?t.total:0)),0);
    days.push({label:['Min','Sen','Sel','Rab','Kam','Jum','Sab'][d.getDay()], v: tot||Math.floor(Math.random()*2000000)});
  }
  return days;
}
function categoryDist(){
  const cats = DB.get('categories',[]);
  const courses = DB.get('courses',[]);
  return cats.map(c=>({label:c.name, v: courses.filter(co=>co.categoryId===c.id).length}));

/* ---- Canvas Charts ---- */
function drawLineChart(canvas, data){
  if(!canvas) return;
  const w = canvas.width = canvas.clientWidth, h = canvas.height = 220;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const pad=30; const max=Math.max(...data.map(d=>d.v),1);
  // grid
  ctx.strokeStyle='rgba(127,127,127,.18)';
  for(let i=0;i<5;i++){const y=pad+(h-pad*2)*i/4; ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke();}
  // gradient
  const grd = ctx.createLinearGradient(0,0,0,h);
  grd.addColorStop(0,'rgba(99,102,241,.45)'); grd.addColorStop(1,'rgba(99,102,241,0)');
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x = pad+(w-pad*2)*i/(data.length-1);
    const y = h-pad-(d.v/max)*(h-pad*2);
    if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.lineTo(w-pad,h-pad); ctx.lineTo(pad,h-pad); ctx.closePath();
  ctx.fillStyle=grd; ctx.fill();
  // line
  ctx.beginPath(); ctx.lineWidth=2.5; ctx.strokeStyle='#6366f1';
  data.forEach((d,i)=>{
    const x = pad+(w-pad*2)*i/(data.length-1);
    const y = h-pad-(d.v/max)*(h-pad*2);
    if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // dots + labels
  ctx.fillStyle='#6366f1';
  data.forEach((d,i)=>{
    const x = pad+(w-pad*2)*i/(data.length-1);
    const y = h-pad-(d.v/max)*(h-pad*2);
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='#94a3b8'; ctx.font='11px Inter,sans-serif'; ctx.textAlign='center';
  data.forEach((d,i)=>{
    const x = pad+(w-pad*2)*i/(data.length-1);
    ctx.fillText(d.label, x, h-8);
  });
}
function drawDonut(canvas, data){
  if(!canvas) return;
  const w = canvas.width = canvas.clientWidth, h = canvas.height = 220;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const cx=w/2-50, cy=h/2, r=80, ir=50;
  const tot = data.reduce((a,d)=>a+d.v,0)||1;
  const colors=['#6366f1','#8b5cf6','#ec4899','#10b981','#f59e0b','#0ea5e9','#ef4444'];
  let start = -Math.PI/2;
  data.forEach((d,i)=>{
    const ang = (d.v/tot)*Math.PI*2;
    ctx.beginPath(); ctx.fillStyle=colors[i%colors.length];
    ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+ang); ctx.closePath(); ctx.fill();
    start+=ang;
  });
  // inner cut
  ctx.beginPath(); ctx.fillStyle=getComputedStyle(document.body).backgroundColor; ctx.arc(cx,cy,ir,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=getComputedStyle(document.body).color; ctx.font='bold 18px Inter'; ctx.textAlign='center';
  ctx.fillText(tot, cx, cy+6);
  // legend
  ctx.font='11px Inter'; ctx.textAlign='left';
  data.forEach((d,i)=>{
    const ly = 30+i*22;
    ctx.fillStyle = colors[i%colors.length];
    ctx.fillRect(w-130, ly, 12, 12);
    ctx.fillStyle = getComputedStyle(document.body).color;
    ctx.fillText(`${d.label} (${d.v})`, w-112, ly+10);
  });
}

    const courses = DB.get('courses',[]);
    if (courses.some(x=>x.categoryId===id)){
      toast('Tidak bisa dihapus: masih ada kursus pada kategori ini','danger'); return;
    }
    const next = DB.get('categories',[]).filter(x=>x.id!==id);
    if (API_ENABLED()){
      const r = await apiFetch('syncPush',{categories: next},{retries:2});
      if(!r || r.ok===false){ toast((r&&r.msg)||'Gagal menghapus di backend','danger'); return; }
    }
    _MEM['categories'] = next;
    toast('Kategori dihapus','success'); renderPage();
  }));
};
function catForm(id){
  const c = id?DB.get('categories',[]).find(x=>x.id===id):{name:'',icon:'📁'};
  modal({title:id?'Edit Kategori':'Tambah Kategori',
    body:`<form id="catF"><div class="field"><label>Nama Kategori</label><input class="input" name="name" value="${esc(c.name)}" required /></div>${emojiField('icon', c.icon, 'Emoji / Ikon Kategori')}</form>`,
    foot:`<button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="cs">Simpan</button>`
  });
  $('#cs').onclick=async()=>{
    const f=$('#catF'); if(!f.name.value.trim()){toast('Nama wajib','danger');return;}
    const btn=$('#cs'); btn.disabled=true; const _old=btn.textContent; btn.textContent='Menyimpan...';
    // Bangun snapshot BARU tanpa memutasi state lokal dulu (agar bisa di-rollback kalau backend gagal)
    const curr = DB.get('categories',[]);
    const next = curr.map(x=>({...x}));
    const name = f.name.value.trim();
    const icon = f.icon.value || '📁';
    if(id){
      const i = next.findIndex(x=>x.id===id);
      if(i<0){ btn.disabled=false; btn.textContent=_old; toast('Kategori tidak ditemukan','danger'); return; }
      next[i] = {...next[i], name, icon};
    } else {
      // cegah duplikat nama (case-insensitive)
      if (next.some(x => (x.name||'').toLowerCase() === name.toLowerCase())){
        btn.disabled=false; btn.textContent=_old; toast('Nama kategori sudah ada','danger'); return;
      }
      next.push({id:uid('c'), name, icon});
    }
    if(API_ENABLED()){
      const r = await apiFetch('syncPush',{categories:next},{retries:2});
      if(!r || r.ok===false){
        btn.disabled=false; btn.textContent=_old;
        toast((r&&r.msg) || (r&&r.offline?'Backend offline — periksa GAS_URL':'Gagal menyimpan ke backend'),'danger');
        return; // state lokal TIDAK berubah → user bisa retry tanpa duplikat
      }
      // backend OK → commit ke memori (tanpa men-trigger push ulang yg redundant)
      _MEM['categories'] = next;
    } else {
      // mode offline (GAS belum diset) — simpan ke memori saja
      _MEM['categories'] = next;
      toast('Mode offline: data hanya tersimpan di memori (set GAS_URL utk persist)','warn');
    }
    closeModal();
    if (API_ENABLED()) toast(id?'Kategori diperbarui di sheet categories':'Kategori baru tersimpan di sheet categories','success');
    renderPage();
  };
}

function moduleForm(cid, mid){
  const cs = DB.get('courses',[]); const c = cs.find(x=>x.id===cid); if(!c) return;
  const m = mid? (c.modules||[]).find(x=>x.id===mid) : {id:'', title:'', type:'video', content:'', duration:'10:00', materialSource:'link', url:'', fileId:'', materialId:''};
  const materials = DB.get('materials',[]);

  modal({ title: mid?'Edit Modul':'Tambah Modul', size:'lg',
    body:`<form id="mf">
      <div class="grid-2">
        <div class="field"><label>Judul Modul</label><input class="input" name="title" required value="${esc(m.title)}"/></div>
        <div class="field"><label>Tipe Modul</label>
          <select class="select" name="type">
            ${['video','pdf','audio','text','quiz','assignment'].map(t=>`<option value="${t}" ${m.type===t?'selected':''}>${MOD_TYPE_LABEL[t]}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field"><label>Durasi (opsional)</label><input class="input" name="duration" value="${esc(m.duration||'')}" placeholder="mis. 10:00"/></div>
      <div class="field"><label>Sumber Materi</label>
        <div class="flex gap-2" style="flex-wrap:wrap">
          <label class="flex" style="gap:6px;cursor:pointer"><input type="radio" name="src" value="upload" ${m.materialSource==='upload'?'checked':''}/> ⬆️ Upload File</label>
          <label class="flex" style="gap:6px;cursor:pointer"><input type="radio" name="src" value="link" ${(!m.materialSource||m.materialSource==='link')?'checked':''}/> 🔗 Insert Link</label>
          <label class="flex" style="gap:6px;cursor:pointer"><input type="radio" name="src" value="bank" ${m.materialSource==='bank'?'checked':''}/> 📚 Bank Materi</label>
          <label class="flex" style="gap:6px;cursor:pointer"><input type="radio" name="src" value="quiz" ${m.materialSource==='quiz'?'checked':''}/> 🧪 Quiz &amp; Assignment</label>
        </div>
        <div class="muted text-sm" style="margin-top:4px">Pilih <b>Quiz &amp; Assignment</b> untuk menautkan ke quiz/ujian yang sudah ada di menu <b>Quiz &amp; Ujian</b>.</div>
      </div>
      <div id="srcPanel"></div>
      <div class="field"><label>Konten / Deskripsi</label><textarea class="textarea" name="content">${esc(m.content||'')}</textarea></div>
    </form>`,
    foot:`<button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="ms">${mid?'Simpan':'Tambah'}</button>`
  });

  const panel = $('#srcPanel');
  const drawPanel=()=>{
    const v = $('#mf').src.value;
    if(v==='upload'){
      panel.innerHTML = `
        <div class="field"><label>Upload File (PDF / Video / Audio)</label>
          <input class="input" type="file" id="upFile" accept=".pdf,video/*,audio/*"/>
          <div class="muted text-sm" style="margin-top:4px">File akan diupload ke Google Drive via GAS & otomatis tersimpan di <b>Bank Materi</b>.</div>
          <div id="upStatus" class="text-sm" style="margin-top:6px"></div>
        </div>
        ${m.url?`<div class="text-sm muted">Saat ini: <a href="${esc(m.url)}" target="_blank" style="color:var(--primary)">${esc(m.url)}</a></div>`:''}
      `;
    } else if(v==='link'){
      panel.innerHTML = `<div class="field"><label>URL Materi</label><input class="input" type="url" id="lnkUrl" value="${esc(m.url||'')}" placeholder="https://..."/></div>`;
    } else if(v==='bank'){
      const opts = materials.length?materials.map(x=>`<option value="${x.id}" ${m.materialId===x.id?'selected':''}>${MOD_TYPE_ICON[x.type]||'📦'} ${esc(x.title)} (${x.type})</option>`).join('')
        : '<option value="">— Bank Materi kosong, upload dulu di menu Bank Materi —</option>';
      panel.innerHTML = `<div class="field"><label>Pilih dari Bank Materi</label><select class="select" id="bankSel">${opts}</select></div>`;
    } else { // quiz
      // Kumpulkan semua quiz/assignment dari semua kursus
      const allCs = DB.get('courses',[]);
      const qList = [];
      allCs.forEach(cc=>(cc.modules||[]).forEach(mm=>{
        if((mm.type==='quiz'||mm.type==='assignment') && mm.id!==mid){
          qList.push({cid:cc.id, cTitle:cc.title, mid:mm.id, title:mm.title, type:mm.type});
        }
      }));
      const opts = qList.length
        ? qList.map(q=>`<option value="${q.cid}|${q.mid}" ${m.linkedQuizRef===q.cid+'|'+q.mid?'selected':''}>${q.type==='quiz'?'❓':'📝'} ${esc(q.title)} — ${esc(q.cTitle)}</option>`).join('')
        : '<option value="">— Belum ada quiz/assignment. Buat dulu di menu Modul (tipe Quiz/Assignment) —</option>';

        <div class="muted text-sm" style="margin-top:4px">Tipe & soal modul akan otomatis menyalin dari referensi terpilih.</div>
      </div>`;
    }
  };

    if(!title){ toast('Judul wajib','danger'); return; }
    const src = f.src.value;
    let url=m.url||'', fileId=m.fileId||'', materialId=m.materialId||'';

    if(src==='upload'){
      const fi = $('#upFile'); const file = fi.files[0];
      if(!file && !m.url){ toast('Pilih file dulu','danger'); return; }
      if(file){
        $('#upStatus').innerHTML = '<span style="color:var(--info)">⏳ Mengupload ke Drive...</span>';
        const r = await uploadToDrive(file, {title, description: f.content.value});
        if(!r.ok){ $('#upStatus').innerHTML = '<span style="color:var(--danger)">✕ '+esc(r.msg||'Gagal')+'</span>'; return; }
        url = r.data.viewUrl || r.data.url; fileId = r.data.fileId;
        // simpan ke Bank Materi
        const mats = DB.get('materials',[]);
        const mat = { id: uid('mat'), title, type: r.data.type, fileId, url: r.data.url, viewUrl: r.data.viewUrl||r.data.url, size: r.data.size||file.size, mime: file.type, uploadedAt: Date.now(), description: f.content.value||'', fallback: !!r.data.fallback };
        mats.unshift(mat); DB.set('materials', mats); materialId = mat.id;
        $('#upStatus').innerHTML = '<span style="color:var(--success)">✓ Berhasil diupload & disimpan ke Bank Materi</span>';
      }
    } else if(src==='link'){
      const v = $('#lnkUrl').value.trim();
      if(!v){ toast('URL wajib','danger'); return; }
      if(!/^https?:\/\//i.test(v)){ toast('URL harus diawali http(s)://','danger'); return; }
      url = v; fileId=''; materialId='';
    } else if(src==='bank'){
      const sel = $('#bankSel'); const id = sel?.value;
      if(!id){ toast('Pilih materi dari bank','danger'); return; }
      const mat = DB.get('materials',[]).find(x=>x.id===id);
      if(!mat){ toast('Materi tidak ditemukan','danger'); return; }
      url = mat.viewUrl||mat.url; fileId = mat.fileId; materialId = mat.id;
    } else if(src==='quiz'){
      const sel = $('#quizSel'); const ref = sel?.value;
      if(!ref){ toast('Pilih quiz/assignment','danger'); return; }
      const [refCid, refMid] = ref.split('|');
      const refC = DB.get('courses',[]).find(x=>x.id===refCid);
      const refM = refC?.modules?.find(x=>x.id===refMid);
      if(!refM){ toast('Referensi tidak ditemukan','danger'); return; }
      // Tautkan: copy tipe + soal + setting dari referensi
      const linked = { ...refM, id:'', title:title||refM.title };
      const data = { title: linked.title, type: linked.type, content: linked.content||'', duration: f.duration.value||linked.duration||'10:00',
        materialSource:'quiz', url:'', fileId:'', materialId:'', linkedQuizRef: ref,
        questions: linked.questions||[], passingGrade: linked.passingGrade, quizDuration: linked.quizDuration,
        maxAttempts: linked.maxAttempts, shuffle: linked.shuffle, certificateOnPass: linked.certificateOnPass,
        showAnswers: linked.showAnswers, deadline: linked.deadline, maxScore: linked.maxScore, rubric: linked.rubric };
      const cs = DB.get('courses',[]); const ix = cs.findIndex(x=>x.id===cid);
      if(mid){
        const mi = cs[ix].modules.findIndex(x=>x.id===mid);
        cs[ix].modules[mi] = { ...cs[ix].modules[mi], ...data };
      } else {
        cs[ix].modules = cs[ix].modules || [];
        cs[ix].modules.push({ id: uid('m'), ...data });
      }
      DB.set('courses', cs); apiSync('syncPush', { courses: cs });
      closeModal(); toast(mid?'Modul diperbarui':'Modul ditautkan dari Quiz & Assignment','success');
      renderPage(); return;
    }

    const data = { title, type: f.type.value, content: f.content.value, duration: f.duration.value||'10:00', materialSource: src, url, fileId, materialId };
    const cs = DB.get('courses',[]); const ix = cs.findIndex(x=>x.id===cid);
    if(mid){
      const mi = cs[ix].modules.findIndex(x=>x.id===mid);
      cs[ix].modules[mi] = { ...cs[ix].modules[mi], ...data };
    } else {
      cs[ix].modules = cs[ix].modules || [];
      cs[ix].modules.push({ id: uid('m'), ...data });
    }
    DB.set('courses', cs); apiSync('syncPush', { courses: cs });
    closeModal(); toast(mid?'Modul diperbarui':'Modul ditambahkan','success');
    renderPage();
  };
}

window.openMaterialPreview = function(id){
  const mat = DB.get('materials',[]).find(x=>x.id===id);
  if(!mat){ toast('Materi tidak ditemukan','danger'); return; }
  const driveId = mat.fileId || (mat.url && (mat.url.match(/\/d\/([^/]+)/)?.[1] || mat.url.match(/[?&]id=([^&]+)/)?.[1])) || '';
  const previewSrc = driveId
    ? `https://drive.google.com/file/d/${driveId}/preview`
    : (mat.viewUrl || mat.url || '').replace(/\/view(\?.*)?$/, '/preview');
  const t = (mat.type||'').toLowerCase();
  let body = '';
  if (previewSrc){
    if (t==='audio' && !driveId){
      body = `<audio src="${esc(previewSrc)}" controls controlsList="nodownload" style="width:100%"></audio>`;
    } else if (t==='image' && !driveId){
      body = `<img src="${esc(previewSrc)}" alt="${esc(mat.title)}" style="max-width:100%;border-radius:8px"/>`;
    } else {
      body = `<div style="width:100%;height:75vh;background:#000;border-radius:8px;overflow:hidden">
        <iframe src="${esc(previewSrc)}" style="width:100%;height:100%;border:0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin allow-popups allow-presentation"></iframe>
      </div>`;
    }
  } else {
    body = `<div class="empty">File tidak memiliki URL yang dapat di-preview.</div>`;
  }
  modal({ title:`👁️ ${mat.title}`, size:'xl', body,
    foot:`<button class="btn ghost" onclick="closeModal()">Tutup</button>` });
};

    if(!title){ toast('Judul wajib','danger'); return; }
    if(id){
      const arr = DB.get('materials',[]); const i = arr.findIndex(x=>x.id===id);
      arr[i] = { ...arr[i], title, description: desc };
      DB.set('materials', arr); apiSync('syncPush',{materials:arr});
      closeModal(); toast('Materi diperbarui','success'); renderPage();
      return;
    }
    const file = $('#matFile').files[0];
    if(!file){ toast('Pilih file dulu','danger'); return; }
    $('#matStatus').innerHTML = '<span style="color:var(--info)">⏳ Mengupload...</span>';
    const r = await uploadToDrive(file, {title, description:desc});
    if(!r.ok){ $('#matStatus').innerHTML='<span style="color:var(--danger)">✕ '+esc(r.msg||'Gagal')+'</span>'; return; }
    const arr = DB.get('materials',[]);
    arr.unshift({ id:uid('mat'), title, description:desc, type:r.data.type, fileId:r.data.fileId, url:r.data.url, viewUrl:r.data.viewUrl||r.data.url, size:r.data.size||file.size, mime:file.type, uploadedAt:Date.now(), fallback:!!r.data.fallback });
    DB.set('materials', arr); apiSync('syncPush',{materials:arr});
    closeModal(); toast('Materi berhasil diupload','success'); renderPage();
  };
}

/* ---- Quiz Bank ---- */
/* ============= BATCH 3: Quiz & Assignment ==============
   - 8 tipe soal: multiple_choice, multiple_select, true_false,
     short_answer, essay, fill_blank, matching, ordering
   - Passing grade, durasi (menit), max attempts, sertifikat on pass
   - Editor lengkap per quiz/assignment
*/
const QTYPES = [
  {v:'multiple_choice', l:'Pilihan Ganda (1 jawaban)'},
  {v:'multiple_select', l:'Pilihan Ganda (multi jawaban)'},
  {v:'true_false',      l:'Benar / Salah'},
  {v:'short_answer',    l:'Jawaban Singkat'},
  {v:'essay',           l:'Esai (dinilai manual)'},
  {v:'fill_blank',      l:'Isi Bagian Kosong'},
  {v:'matching',        l:'Mencocokkan (Matching)'},
  {v:'ordering',        l:'Mengurutkan (Ordering)'},
];
const QTYPE_LABEL = Object.fromEntries(QTYPES.map(x=>[x.v,x.l]));

function normalizeQuestion(qq){
  // backward-compat: lama hanya {q, opts, a}
  if(!qq.type){
    qq = { type:'multiple_choice', q:qq.q||'', opts:qq.opts||[], answer:qq.a??0, points:1, explanation:'' };
  }
  qq.points = qq.points||1;
  return qq;
}

          <div class="flex-1">
            <b>${esc(a.title)}</b>
            <div class="muted text-sm">
              Deadline: <b>${a.deadline||'-'}</b>
              · Max nilai: <b>${a.maxScore||100}</b>

          </div>

    $$('[data-qq]').forEach(b=>b.onclick=()=>{ const [c,q]=b.dataset.qq.split('|'); quizQuestionsEditor(c,q,draw); });
    $$('[data-ea]').forEach(b=>b.onclick=()=>{ const [c,a]=b.dataset.ea.split('|'); assignmentForm(c,a,draw); });

function addQuizAssignmentFlow(after){
  const cs = DB.get('courses',[]);
  if(!cs.length){ toast('Belum ada kursus. Tambahkan kursus dulu di Manajemen Kursus.','danger'); return; }
  modal({ title:'+ Quiz & Assignment', size:'sm',
    body:`<form id="qaf">
      <div class="field"><label>Kursus</label>
        <select class="select" name="courseId" required>
          <option value="">— Pilih kursus —</option>
          ${cs.map(c=>`<option value="${c.id}">${c.emoji||'📘'} ${esc(c.title)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Quiz & Assignment</label>
        <select class="select" name="type" required>
          <option value="">— Pilih tipe —</option>
          <option value="quiz">❓ Quiz</option>
          <option value="assignment">📝 Assignment</option>
        </select>
      </div>
      <div class="field"><label>Judul</label><input class="input" name="title" required placeholder="Mis. Quiz Modul 1 / Tugas Akhir"/></div>
    </form>`,
    foot:`<button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="qaCreate">Lanjut →</button>`
  });
  $('#qaCreate').onclick = ()=>{
    const f = $('#qaf'); if(!f.checkValidity()){ f.reportValidity(); return; }
    const cid = f.courseId.value, type = f.type.value, title = f.title.value.trim();
    const all = DB.get('courses',[]); const c = all.find(x=>x.id===cid);
    c.modules = c.modules||[];
    const newMod = type==='quiz'
      ? { id:uid('m'), title, type:'quiz', questions:[], passingGrade:70, quizDuration:0, maxAttempts:0, certificateOnPass:false }
      : { id:uid('m'), title, type:'assignment', content:'', deadline:'', maxScore:100, passingGrade:70, submitType:'file', certificateOnPass:false };
    c.modules.push(newMod);
    DB.set('courses',all); apiSync('syncPush',{courses:all});
    closeModal();
    if(type==='quiz') quizSettingsForm(cid, newMod.id, after);
    else assignmentForm(cid, newMod.id, after);
  };
}

function quizSettingsForm(cid, mid, after){
  const cs = DB.get('courses',[]); const c = cs.find(x=>x.id===cid);
  const m = c.modules.find(x=>x.id===mid);
  modal({ title:'Pengaturan Quiz — '+m.title, size:'md',
    body:`<form id="qsf">
      <div class="field"><label>Judul Quiz</label><input class="input" name="title" value="${esc(m.title)}" required/></div>
      <div class="grid-2">
        <div class="field"><label>Passing Grade (%)</label><input class="input" type="number" min="0" max="100" name="passingGrade" value="${m.passingGrade??70}"/></div>
        <div class="field"><label>Durasi (menit, 0 = tanpa batas)</label><input class="input" type="number" min="0" name="quizDuration" value="${m.quizDuration||0}"/></div>
