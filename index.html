<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#6366f1" />
<meta name="description" content="EduFlow LMS - Platform Kursus Online SaaS Modern" />
<title>EduFlow LMS - Platform Kursus Online</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236366f1'/%3E%3Cpath d='M16 24l16-8 16 8-16 8z' fill='white'/%3E%3Cpath d='M22 30v8c0 3 4 6 10 6s10-3 10-6v-8' stroke='white' stroke-width='2.5' fill='none'/%3E%3C/svg%3E" />
<style>
/* ============== DESIGN TOKENS (TETAP SAMA) ============== */
:root{
  --bg:#f6f7fb; --surface:#ffffff; --surface-2:#f1f3f9; --text:#0f172a; --text-soft:#475569; --muted:#94a3b8;
  --border:#e5e7eb; --primary:#6366f1; --primary-2:#8b5cf6; --primary-soft:#eef2ff;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#0ea5e9;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06); --shadow:0 8px 24px rgba(15,23,42,.08);
  --shadow-lg:0 24px 48px -12px rgba(15,23,42,.18);
  --radius:14px; --radius-sm:10px; --radius-lg:20px;
  --glass:rgba(255,255,255,.65); --glass-border:rgba(255,255,255,.4);
  --gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --sidebar:#0f172a; --sidebar-text:#cbd5e1; --sidebar-active:#1e293b;
}
[data-theme="dark"]{
  --bg:#0b1020; --surface:#121931; --surface-2:#0f1530; --text:#e2e8f0; --text-soft:#cbd5e1; --muted:#64748b;
  --border:#1f2a44; --primary:#818cf8; --primary-2:#a78bfa; --primary-soft:#1e1b4b;
  --glass:rgba(18,25,49,.6); --glass-border:rgba(255,255,255,.08);
  --sidebar:#070b1a; --sidebar-active:#111a36;
}
*{box-sizing:border-box;margin:0;padding:0} html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{color:inherit;text-decoration:none} button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit} img{max-width:100%;display:block}
::-webkit-scrollbar{width:10px;height:10px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}

.hidden{display:none !important} .flex{display:flex} .grid{display:grid} .gap-1{gap:6px} .gap-2{gap:10px} .gap-3{gap:16px}
.items-center{align-items:center} .justify-between{justify-content:space-between} .flex-1{flex:1} .flex-col{flex-direction:column}
.text-sm{font-size:12.5px} .text-lg{font-size:16px} .text-xl{font-size:20px} .font-bold{font-weight:700} .muted{color:var(--muted)}
.mt-1{margin-top:8px} .mt-2{margin-top:16px} .mt-3{margin-top:24px} .mb-1{margin-bottom:8px} .mb-2{margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--surface-2);color:var(--text-soft)}
.badge.success{background:rgba(16,185,129,.12);color:var(--success)} .badge.warn{background:rgba(245,158,11,.14);color:var(--warning)}
.badge.danger{background:rgba(239,68,68,.12);color:var(--danger)} .badge.primary{background:var(--primary-soft);color:var(--primary)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:13.5px;transition:all .18s ease;border:1px solid transparent;white-space:nowrap}
.btn.primary{background:var(--gradient);color:#fff;box-shadow:var(--shadow-sm)} .btn.ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn.danger{background:rgba(239,68,68,.1);color:var(--danger)} .btn.sm{padding:7px 12px;font-size:12.5px} .btn.icon{padding:9px;width:38px;height:38px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px} .field label{font-size:12.5px;font-weight:600;color:var(--text-soft)}
.input,.select,.textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);outline:none;color:var(--text);}
.textarea{min-height:90px;resize:vertical} .pw-wrap{position:relative} .pw-wrap button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);padding:6px}
.error-msg{color:var(--danger);font-size:12px;margin-top:4px;display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm)}
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
.auth-hero{background:var(--gradient);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-form{display:flex;align-items:center;justify-content:center;padding:40px 24px} .auth-card{width:100%;max-width:420px}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--sidebar);color:var(--sidebar-text);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
.sidebar-section{font-size:10.5px;font-weight:700;text-transform:uppercase;color:#64748b;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;margin-bottom:2px}
.nav-item:hover{background:var(--sidebar-active);color:#fff} .nav-item.active{background:var(--gradient);color:#fff;}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:30;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.page{padding:24px;max-width:1400px;width:100%;margin:0 auto} .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.stat b{font-size:24px;font-weight:800;display:block} .stat span{color:var(--muted);font-size:12.5px;font-weight:600}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px} .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.table{width:100%;border-collapse:collapse;background:var(--surface);font-size:13px} .table th,.table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border)}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;display:flex;flex-direction:column}
.course-thumb{height:150px;background:var(--gradient);display:grid;place-items:center;color:#fff;font-size:42px}
.course-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal-back.open{display:flex} .modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal.lg{max-width:820px} .modal.xl{max-width:1000px}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:22px} .modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);padding:14px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow);animation:slidein .25s;display:flex;gap:10px}
@keyframes slidein{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.list-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border)}
.av{width:38px;height:38px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0}

/* LOADING OVERLAY (NEW) */
.loader-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.85);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(4px)}
.loader-overlay.show{display:flex}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader-overlay" id="globalLoader"><div class="spinner"></div><b id="loaderText">Memproses...</b></div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="modal-back" id="modalBack"></div>
<div id="app"></div>

<script>
/* ============================================================
 * EDUFLOW LMS — FRONTEND ARCHITECTURE (SECURE API SYNC)
 * ============================================================ */

// ⚠️ WAJIB DIISI: GANTI URL INI DENGAN URL DEPLOYMENT GAS ANDA
const GAS_URL = "https://script.google.com/macros/s/AKfycbzGq_RexPyeE3_aIPWftipig7Q1ekciVHRjpwSI2NmvrEIOic8AFDLR82HrxTclRwowGg/exec"; 

/* ---------------- API & STATE LAYER ---------------- */
window.APP_DATA = {}; // Global state to replace localStorage

const session = {
  get(){ try{return JSON.parse(localStorage.getItem('eduflow_auth')||'null');}catch(e){return null;} },
  set(s){ localStorage.setItem('eduflow_auth', JSON.stringify(s)); },
  clear(){ localStorage.removeItem('eduflow_auth'); }
};

// Pengganti localStorage DB
const DB = {
  get(key, def){ return APP_DATA[key] !== undefined ? APP_DATA[key] : def; },
  // set sekarang hanya update UI lokal. Data asli tersimpan di Backend lewat API.
  setLocal(key, val){ APP_DATA[key] = val; } 
};

const state = { user:null, route:null, cart: {} };

// Core API Call
async function apiCall(action, payload = {}) {
  try {
    const token = session.get()?.token || '';
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Untuk bypass CORS Preflight Google Script
      body: JSON.stringify({ action, token, payload })
    });
    return await response.json();
  } catch (e) {
    console.error("API Error:", e);
    return { success: false, message: 'Koneksi ke server terputus.' };
  }
}

// Global Loader
function showLoader(txt="Memproses..."){ $('#loaderText').textContent=txt; $('#globalLoader').classList.add('show'); }
function hideLoader(){ $('#globalLoader').classList.remove('show'); }

/* ---------------- HELPERS ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const $$= (s,el=document)=>[...el.querySelectorAll(s)];
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = ()=>Math.random().toString(36).slice(2,10);
const fmtRp = n => 'Rp '+Number(n||0).toLocaleString('id-ID');
const fmtDate = d => new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});

function toast(msg, type='info'){
  const w = $('#toastWrap'), el = document.createElement('div');
  el.className='toast '+type;
  el.innerHTML = `<div style="flex:1"><b>${esc(msg)}</b></div><button onclick="this.parentNode.remove()" style="color:var(--muted)">✕</button>`;
  w.appendChild(el); setTimeout(()=>el.remove(), 4000);
}

function modal({title, body, foot, size=''}){
  const mb = $('#modalBack');
  mb.innerHTML = `<div class="modal ${size}"><div class="modal-head"><h3>${esc(title)}</h3><button onclick="closeModal()" class="btn icon ghost">✕</button></div><div class="modal-body">${body}</div>${foot?`<div class="modal-foot">${foot}</div>`:''}</div>`;
  mb.classList.add('open');
}
function closeModal(){ $('#modalBack').classList.remove('open'); }
function confirmModal(msg, onYes){
  modal({title:'Konfirmasi',body:`<p>${esc(msg)}</p>`,foot:`<button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn primary" id="cfYes">Ya, lanjutkan</button>`});
  $('#cfYes').onclick=()=>{ closeModal(); onYes(); };
}

/* ============================================================
 * BOOTSTRAP APP
 * ============================================================ */
async function bootApp() {
  const auth = session.get();
  if (!auth || !auth.token) {
    renderAuth('login');
    return;
  }
  
  showLoader("Memuat data sistem...");
  const res = await apiCall('init_app');
  hideLoader();

  if (res.success) {
    window.APP_DATA = res.data;
    state.user = res.data.currentUser;
    // Default setting fallback if empty
    if(!APP_DATA.settings?.general) APP_DATA.settings = {general:{name:'EduFlow LMS',logo:'🎓'}};
    
    renderApp();
  } else {
    toast("Sesi berakhir, silakan login kembali", "warn");
    session.clear();
    renderAuth('login');
  }
}

/* ============================================================
 * AUTH PAGES (LOGIN / REGISTER)
 * ============================================================ */
function renderAuth(mode='login'){
  $('#app').innerHTML = `
  <div class="auth-wrap">
    <div class="auth-hero">
      <div class="flex items-center gap-2"><div style="font-size:32px">🎓</div><b style="font-size:20px">EduFlow LMS</b></div>
      <div><h1>Platform Akademi SaaS</h1><p>Akses kursus premium dan tingkatkan skill Anda.</p></div>
    </div>
    <div class="auth-form"><div class="auth-card">
      ${mode==='login' ? `
        <h2>Masuk ke Akun</h2><p class="muted mb-2">Silakan masuk untuk melanjutkan belajar.</p>
        <form id="loginForm">
          <div class="field"><label>Email</label><input class="input" type="email" name="email" required /></div>
          <div class="field"><label>Password</label><input class="input" type="password" name="password" required /></div>
          <button class="btn primary full" type="submit">Masuk</button>
          <div style="margin-top:14px;text-align:center"><a href="#" onclick="renderAuth('register');return false;" style="color:var(--primary);font-weight:bold">Belum punya akun? Daftar</a></div>
        </form>
      ` : `
        <h2>Buat Akun Baru</h2><p class="muted mb-2">Mulai perjalanan belajar Anda.</p>
        <form id="regForm">
          <div class="field"><label>Nama</label><input class="input" name="name" required /></div>
          <div class="field"><label>Email</label><input class="input" type="email" name="email" required /></div>
          <div class="field"><label>Password</label><input class="input" type="password" name="password" required /></div>
          <button class="btn primary full" type="submit">Daftar Sekarang</button>
          <div style="margin-top:14px;text-align:center"><a href="#" onclick="renderAuth('login');return false;" style="color:var(--primary);font-weight:bold">Sudah punya akun? Masuk</a></div>
        </form>
      `}
    </div></div>
  </div>`;

  if(mode === 'login'){
    $('#loginForm').onsubmit = async e => {
      e.preventDefault();
      showLoader("Memverifikasi...");
      const res = await apiCall('login', { email: e.target.email.value, password: e.target.password.value });
      hideLoader();
      
      if(res.success){
        session.set({ token: res.data.token, userId: res.data.user.id });
        toast("Login berhasil", "success");
        bootApp();
      } else {
        toast(res.message, "danger");
      }
    };
  } else {
    $('#regForm').onsubmit = async e => {
      e.preventDefault();
      showLoader("Mendaftarkan akun...");
      const res = await apiCall('register', { name: e.target.name.value, email: e.target.email.value, password: e.target.password.value });
      hideLoader();
      
      if(res.success){
        toast("Pendaftaran berhasil, silakan login", "success");
        renderAuth('login');
      } else {
        toast(res.message, "danger");
      }
    };
  }
}

/* ============================================================
 * MAIN APP SHELL & ROUTER
 * ============================================================ */
function renderApp(){
  const u = state.user;
  const isAdmin = u.role==='admin';
  if(!state.route) state.route = isAdmin ? 'dashboard' : 'sdashboard';
  
  const set = DB.get('settings');

  const nav = isAdmin ? [
    {sec:'Admin',items:[{id:'dashboard',label:'Dashboard'},{id:'courses',label:'Manajemen Kursus'},{id:'categories',label:'Kategori'},{id:'students',label:'Peserta'},{id:'transactions',label:'Transaksi'}]}
  ] : [
    {sec:'Belajar',items:[{id:'sdashboard',label:'Beranda'},{id:'mycourses',label:'Kursus Saya'},{id:'catalog',label:'Katalog'},{id:'cart',label:'Keranjang'}]}
  ];

  $('#app').innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-brand"><b>${esc(set.general.logo)} ${esc(set.general.name)}</b></div>
        ${nav.map(s=>`
          <div class="sidebar-section">${s.sec}</div>
          ${s.items.map(it=>`<div class="nav-item ${state.route===it.id?'active':''}" data-route="${it.id}">- ${it.label}</div>`).join('')}
        `).join('')}
        <button class="nav-item" style="color:var(--danger);margin-top:20px" onclick="session.clear();renderAuth('login')">Logout</button>
      </aside>
      <div class="main">
        <header class="topbar"><h1 id="pageTitle"></h1><div class="flex-1"></div><div class="av">${u.name[0]}</div></header>
        <div class="page" id="page"></div>
      </div>
    </div>
  `;

  $$('[data-route]').forEach(el=>el.onclick = ()=>{ state.route = el.dataset.route; renderApp(); });
  
  const pages = {
    dashboard: renderAdminDashboard, courses: renderAdminCourses, categories: renderAdminCategories,
    students: renderAdminStudents, transactions: renderAdminTransactions,
    sdashboard: renderStudentDashboard, mycourses: renderMyCourses, catalog: renderCatalog, cart: renderCart
  };
  
  if(pages[state.route]) pages[state.route]($('#page'));
  else $('#page').innerHTML = '<div class="empty">Halaman dalam pengembangan</div>';
}

/* ============================================================
 * ADMIN PAGES (Dengan Data Sync Backend)
 * ============================================================ */
function renderAdminDashboard(el){
  $('#pageTitle').textContent = "Dashboard Admin";
  const courses = DB.get('courses',[]);
  const users = DB.get('users',[]);
  const trx = DB.get('transactions',[]);
  const rev = trx.filter(t=>t.status==='success').reduce((a,b)=>a+b.amount,0);
  
  el.innerHTML = `
    <div class="stats">
      <div class="stat"><b>${users.filter(u=>u.role==='student').length}</b><span>Total Peserta</span></div>
      <div class="stat"><b>${courses.length}</b><span>Total Kursus</span></div>
      <div class="stat"><b>${fmtRp(rev)}</b><span>Pendapatan</span></div>
    </div>
    <div class="card mt-3"><b>Transaksi Terbaru</b>
      <table class="table mt-2">
        <thead><tr><th>ID</th><th>Peserta</th><th>Kursus</th><th>Jumlah</th></tr></thead>
        <tbody>${trx.slice(0,5).map(t=>`<tr><td>${t.id}</td><td>${esc(t.userName)}</td><td>${esc(t.courseTitle)}</td><td>${fmtRp(t.amount)}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  `;
}

// Wrapper Cerdas untuk Sinkronisasi Admin ke Backend
async function syncAdminData(entityName, localArrayData) {
  showLoader(`Menyimpan data ${entityName}...`);
  const res = await apiCall('admin_sync', { entity: entityName, data: localArrayData });
  hideLoader();
  if(res.success){
    DB.setLocal(entityName.toLowerCase(), localArrayData); // Update lokal cache
    toast("Berhasil disimpan", "success");
    renderApp(); // Reload page
  } else {
    toast(res.message, "danger");
  }
}

function renderAdminCourses(el){
  $('#pageTitle').textContent = "Manajemen Kursus";
  const courses = DB.get('courses',[]);
  el.innerHTML = `
    <button class="btn primary mb-2" id="addC">+ Tambah Kursus</button>
    <div class="card"><table class="table">
      <thead><tr><th>Judul</th><th>Harga</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody>${courses.map(c=>`<tr><td><b>${c.emoji} ${esc(c.title)}</b></td><td>${fmtRp(c.price)}</td><td><span class="badge">${c.status}</span></td>
      <td><button class="btn sm danger" data-del="${c.id}">Hapus</button></td></tr>`).join('')}</tbody>
    </table></div>
  `;
  
  $('#addC').onclick = ()=>{
    modal({title:'Tambah Kursus', body:`<form id="cf"><div class="field"><label>Judul</label><input name="title" required class="input"></div><div class="field"><label>Harga (Rp)</label><input type="number" name="price" required class="input"></div></form>`, foot:`<button class="btn primary" id="sv">Simpan</button>`});
    $('#sv').onclick = () => {
      const f = $('#cf');
      courses.unshift({id:'k_'+uid(), title:f.title.value, price:Number(f.price.value), emoji:'📘', status:'published', level:'Pemula', duration:10, enrolled:0, rating:5, modules:[]});
      closeModal(); syncAdminData('Courses', courses);
    };
  };
  
  $$('[data-del]').forEach(b=>b.onclick=()=>confirmModal('Hapus kursus?',()=>{
    syncAdminData('Courses', courses.filter(x=>x.id!==b.dataset.del));
  }));
}

function renderAdminCategories(el){ $('#pageTitle').textContent = "Kategori"; el.innerHTML='<div class="empty">Fitur CRUD Kategori (Gunakan pola syncAdminData seperti Kursus)</div>'; }
function renderAdminStudents(el){ $('#pageTitle').textContent = "Peserta"; el.innerHTML='<div class="empty">Daftar Peserta</div>'; }
function renderAdminTransactions(el){ $('#pageTitle').textContent = "Transaksi"; el.innerHTML='<div class="empty">Laporan Transaksi</div>'; }

/* ============================================================
 * STUDENT PAGES
 * ============================================================ */
function renderStudentDashboard(el){
  $('#pageTitle').textContent = `Halo, ${state.user.name} 👋`;
  const courses = DB.get('courses',[]);
  const myEnrolled = state.user.enrolled || [];
  
  el.innerHTML = `
    <div class="stats mb-3">
      <div class="stat"><b>${myEnrolled.length}</b><span>Kursus Diikuti</span></div>
      <div class="stat"><b>${myEnrolled.filter(e=>e.progress>=100).length}</b><span>Selesai</span></div>
    </div>
    <b class="text-lg">Katalog Populer</b>
    <div class="grid-3 mt-2">${courses.slice(0,3).map(c=>`
      <div class="course-card" onclick="openCourseInfo('${c.id}')">
        <div class="course-thumb">${c.emoji}</div>
        <div class="course-body"><h3>${esc(c.title)}</h3><b style="color:var(--primary)">${fmtRp(c.price)}</b></div>
      </div>
    `).join('')}</div>
  `;
}

function renderCatalog(el){
  $('#pageTitle').textContent = `Katalog Kursus`;
  const courses = DB.get('courses',[]);
  el.innerHTML = `<div class="grid-3">${courses.map(c=>`
    <div class="course-card" onclick="openCourseInfo('${c.id}')">
      <div class="course-thumb">${c.emoji}</div>
      <div class="course-body"><h3>${esc(c.title)}</h3><b style="color:var(--primary)">${fmtRp(c.price)}</b></div>
    </div>
  `).join('')}</div>`;
}

function renderMyCourses(el){
  $('#pageTitle').textContent = `Kursus Saya`;
  const courses = DB.get('courses',[]);
  const myEnrolled = state.user.enrolled || [];
  el.innerHTML = `<div class="grid-3">${myEnrolled.length ? myEnrolled.map(e=>{const c=courses.find(x=>x.id===e.courseId); return `
    <div class="course-card" onclick="alert('Buka Modul Viewer (Dalam Pengembangan)')">
      <div class="course-thumb">${c.emoji}</div>
      <div class="course-body"><h3>${esc(c.title)}</h3><span class="badge success">${e.progress}% Selesai</span></div>
    </div>
  `}).join('') : '<div class="empty" style="grid-column:1/-1">Belum ada kursus diikuti</div>'}</div>`;
}

window.openCourseInfo = (cid) => {
  const c = DB.get('courses',[]).find(x=>x.id===cid);
  modal({title:c.title, size:'lg', body:`
    <div class="flex gap-3"><div class="course-thumb" style="width:150px;border-radius:10px">${c.emoji}</div>
    <div><h2 style="margin-bottom:10px">${esc(c.title)}</h2><p>${esc(c.description||'Deskripsi kursus')}</p>
    <b style="color:var(--primary);font-size:24px;display:block;margin-top:10px">${fmtRp(c.price)}</b></div></div>
  `, foot:`<button class="btn primary" onclick="addToCart('${cid}')">🛒 Tambah Keranjang</button>`});
}

window.addToCart = (cid) => {
  state.cart[cid] = 1;
  toast('Ditambahkan ke keranjang','success'); closeModal(); renderApp();
}

function renderCart(el){
  $('#pageTitle').textContent = `Keranjang Belanja`;
  const courses = DB.get('courses',[]);
  const items = Object.keys(state.cart).map(id=>courses.find(c=>c.id===id)).filter(Boolean);
  const subtotal = items.reduce((a,b)=>a+b.price,0);
  
  if(items.length===0){ el.innerHTML='<div class="empty">Keranjang Kosong</div>'; return; }
  
  el.innerHTML = `
    <div class="grid" style="grid-template-columns:2fr 1fr;gap:20px">
      <div>${items.map(c=>`<div class="card mb-2 flex justify-between items-center">
        <div class="flex items-center gap-2"><div class="av">${c.emoji}</div><b>${esc(c.title)}</b></div>
        <b>${fmtRp(c.price)}</b>
      </div>`).join('')}</div>
      <div class="card" style="height:fit-content">
        <b class="text-lg">Ringkasan</b>
        <div class="field mt-2"><label>Kode Diskon</label><input class="input" id="cpnCode" placeholder="Masukkan kode"></div>
        <div class="flex justify-between mt-2 text-lg"><span>Total</span><b style="color:var(--primary)">${fmtRp(subtotal)}</b></div>
        <button class="btn primary full mt-2" id="btnCheckout">Checkout Sekarang</button>
      </div>
    </div>
  `;
  
  $('#btnCheckout').onclick = async () => {
    // KEAMANAN KETAT: Perhitungan akhir PASTI dilakukan di Backend
    showLoader("Memproses pembayaran aman...");
    const res = await apiCall('checkout', { 
      cart: state.cart, 
      couponCode: $('#cpnCode').value,
      gateway: 'midtrans' 
    });
    hideLoader();
    
    if(res.success){
      state.cart = {}; 
      toast("Pembayaran Berhasil! Kursus telah ditambahkan.", "success");
      bootApp(); // Reload untuk mendapat data enrolled terbaru
    } else {
      toast(res.message, "danger");
    }
  };
}

// Mulai aplikasi
bootApp();
</script>
</body>
</html>
