<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#6366f1" />
<meta name="description" content="EduFlow LMS - Platform Kursus Online SaaS Modern" />
<title>EduFlow LMS - Platform Kursus Online</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236366f1'/%3E%3Cpath d='M16 24l16-8 16 8-16 8z' fill='white'/%3E%3Cpath d='M22 30v8c0 3 4 6 10 6s10-3 10-6v-8' stroke='white' stroke-width='2.5' fill='none'/%3E%3C/svg%3E" />
<style>
/* ============== DESIGN TOKENS ============== */
:root{
  --bg:#f6f7fb; --surface:#ffffff; --surface-2:#f1f3f9; --text:#0f172a; --text-soft:#475569; --muted:#94a3b8;
  --border:#e5e7eb; --primary:#6366f1; --primary-2:#8b5cf6; --primary-soft:#eef2ff;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#0ea5e9;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06); --shadow:0 8px 24px rgba(15,23,42,.08);
  --shadow-lg:0 24px 48px -12px rgba(15,23,42,.18);
  --radius:14px; --radius-sm:10px; --radius-lg:20px;
  --glass:rgba(255,255,255,.65); --glass-border:rgba(255,255,255,.4);
  --gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --sidebar:#0f172a; --sidebar-text:#cbd5e1; --sidebar-active:#1e293b;
}
[data-theme="dark"]{
  --bg:#0b1020; --surface:#121931; --surface-2:#0f1530; --text:#e2e8f0; --text-soft:#cbd5e1; --muted:#64748b;
  --border:#1f2a44; --primary:#818cf8; --primary-2:#a78bfa; --primary-soft:#1e1b4b;
  --glass:rgba(18,25,49,.6); --glass-border:rgba(255,255,255,.08);
  --sidebar:#070b1a; --sidebar-active:#111a36;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
img{max-width:100%;display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ============== UTILITIES ============== */
.hidden{display:none !important}
.flex{display:flex}.grid{display:grid}.gap-1{gap:6px}.gap-2{gap:10px}.gap-3{gap:16px}.gap-4{gap:24px}
.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.flex-1{flex:1}.flex-col{flex-direction:column}.wrap{flex-wrap:wrap}
.text-sm{font-size:12.5px}.text-lg{font-size:16px}.text-xl{font-size:20px}.text-2xl{font-size:26px}.text-3xl{font-size:34px}
.font-bold{font-weight:700}.font-semi{font-weight:600}.muted{color:var(--muted)}.soft{color:var(--text-soft)}
.mt-1{margin-top:8px}.mt-2{margin-top:16px}.mt-3{margin-top:24px}.mt-4{margin-top:32px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}.mb-3{margin-bottom:24px}
.p-2{padding:12px}.p-3{padding:18px}.p-4{padding:24px}
.rounded{border-radius:var(--radius)}.rounded-sm{border-radius:var(--radius-sm)}
.full{width:100%}.center{text-align:center}
.scroll{overflow:auto}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--surface-2);color:var(--text-soft)}
.badge.success{background:rgba(16,185,129,.12);color:var(--success)}
.badge.warn{background:rgba(245,158,11,.14);color:var(--warning)}
.badge.danger{background:rgba(239,68,68,.12);color:var(--danger)}
.badge.info{background:rgba(14,165,233,.12);color:var(--info)}
.badge.primary{background:var(--primary-soft);color:var(--primary)}

/* ============== BUTTONS ============== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:13.5px;transition:all .18s ease;border:1px solid transparent;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--gradient);color:#fff;box-shadow:var(--shadow-sm)}
.btn.primary:hover{box-shadow:0 10px 24px rgba(99,102,241,.35)}
.btn.ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.soft{background:var(--primary-soft);color:var(--primary)}
.btn.danger{background:rgba(239,68,68,.1);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.icon{padding:9px;width:38px;height:38px}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

/* ============== FORMS ============== */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12.5px;font-weight:600;color:var(--text-soft)}
.input,.select,.textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);background:var(--surface);
  border-radius:var(--radius-sm);transition:all .15s;outline:none;color:var(--text);
}
.input:focus,.select:focus,.textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.12)}
.textarea{min-height:90px;resize:vertical;font-family:inherit}
.input-icon{position:relative}
.input-icon .input{padding-left:40px}
.input-icon svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.pw-wrap{position:relative}
.pw-wrap button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);padding:6px}
.checkbox{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px}
.checkbox input{width:16px;height:16px;accent-color:var(--primary)}
.error-msg{color:var(--danger);font-size:12px;margin-top:4px;display:block}

/* ============== CARD ============== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);transition:all .2s}
.card.hover:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border)}

/* ============== AUTH ============== */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
.auth-hero{background:var(--gradient);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-hero::before,.auth-hero::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.08)}
.auth-hero::before{width:500px;height:500px;top:-200px;right:-200px}
.auth-hero::after{width:340px;height:340px;bottom:-140px;left:-100px}
.auth-hero > *{position:relative;z-index:1}
.auth-hero h1{font-size:38px;font-weight:800;line-height:1.15;margin-top:24px}
.auth-hero p{opacity:.9;margin-top:14px;font-size:15px;max-width:440px}
.auth-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:32px;max-width:480px}
.auth-stats div{background:rgba(255,255,255,.13);padding:14px;border-radius:14px;backdrop-filter:blur(6px)}
.auth-stats b{font-size:22px;display:block}
.auth-form{display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{width:100%;max-width:420px}
.auth-card h2{font-size:26px;font-weight:800;margin-bottom:6px}
.auth-card .sub{color:var(--text-soft);margin-bottom:24px}
.demo-creds{background:var(--primary-soft);border:1px dashed var(--primary);border-radius:var(--radius-sm);padding:12px;margin-top:16px;font-size:12.5px}
.demo-creds code{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;font-size:12px}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}

/* ============== APP LAYOUT ============== */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--sidebar);color:var(--sidebar-text);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform .25s}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
.sidebar-brand .logo{width:36px;height:36px;border-radius:10px;background:var(--gradient);display:grid;place-items:center;color:#fff;font-weight:800}
.sidebar-brand b{color:#fff;font-size:16px}
.sidebar-section{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--sidebar-text);cursor:pointer;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--sidebar-active);color:#fff}
.nav-item.active{background:var(--gradient);color:#fff;box-shadow:0 6px 14px rgba(99,102,241,.35)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:30;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.topbar h1{font-size:18px;font-weight:700}
.topbar .search{flex:1;max-width:420px}
.topbar .avatar{width:36px;height:36px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;cursor:pointer}
.page{padding:24px;max-width:1400px;width:100%;margin:0 auto}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.page-head h2{font-size:24px;font-weight:800}

/* Component Styles */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.stat .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);margin-bottom:10px}
.stat b{font-size:24px;font-weight:800;display:block}
.stat span{color:var(--muted);font-size:12.5px;font-weight:600}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden}
.table th,.table td{padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
.table th{background:var(--surface-2);font-weight:700;color:var(--text-soft);font-size:11.5px;text-transform:uppercase}
.table tbody tr:hover{background:var(--surface-2)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.course-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.course-thumb{height:150px;background:var(--gradient);display:grid;place-items:center;color:#fff;font-size:42px;font-weight:800;position:relative}
.course-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.course-body h3{font-size:15px;font-weight:700;line-height:1.35}
.course-meta{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;border-top:1px solid var(--border)}
.rating{display:inline-flex;align-items:center;gap:3px;color:#f59e0b;font-size:12px;font-weight:600}
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;overflow-y:auto}
.modal-back.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:popin .2s}
.modal.lg{max-width:820px}
.modal.xl{max-width:1000px}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:18px;font-weight:700}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface)}
@keyframes popin{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;max-width:340px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);padding:14px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow);animation:slidein .25s;display:flex;gap:10px}
.toast.success{border-left-color:var(--success)}
.toast.danger{border-left-color:var(--danger)}
@keyframes slidein{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.tabs{display:flex;gap:4px;border-bottom:1.5px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tabs button{padding:10px 16px;font-weight:600;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45;display:none}
.backdrop.open{display:block}
.progress-bar{height:8px;background:var(--surface-2);border-radius:8px;overflow:hidden}
.progress-bar > div{height:100%;background:var(--gradient);transition:width .35s}
.list-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border)}
.av{width:38px;height:38px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0;font-size:13px}

/* Loader Overlay */
#loader{position:fixed;inset:0;background:rgba(255,255,255,.8);backdrop-filter:blur(5px);z-index:9999;display:none;place-items:center;flex-direction:column;gap:15px;color:var(--primary)}
[data-theme="dark"] #loader{background:rgba(11,16,32,.8)}
.spinner{width:40px;height:40px;border:4px solid var(--primary-soft);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><b style="font-size:16px">Memuat Data...</b></div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="backdrop" id="backdrop"></div>
<div class="modal-back" id="modalBack"></div>
<div id="app"></div>

<script>
/* ============================================================
 * EDUFLOW LMS — API-FIRST ARCHITECTURE (CLIENT)
 * Terhubung ke Google Apps Script Backend
 * ============================================================ */

// ================= WAJIB DIGANTI: URL WEB APP GAS ================= //
const GAS_URL = "https://script.google.com/macros/s/AKfycbwXY8v3bbcI2H89_VJFUqw3AThIVVd8nODy9LUIrNqa29ySYujaf0edYmeKZCP1NZw9TQ/exec"; 
// ================================================================== //

/* ---------------- STATE MANAGEMENT ---------------- */
// Local Storage hanya digunakan untuk Token dan UI Preference
const localState = {
  getToken: () => localStorage.getItem('lms_token'),
  setToken: (t) => localStorage.setItem('lms_token', t),
  clearToken: () => localStorage.removeItem('lms_token'),
  getCart: () => JSON.parse(localStorage.getItem('lms_cart')||'{}'),
  setCart: (c) => localStorage.setItem('lms_cart', JSON.stringify(c))
};

// Global App State (Diambil dari Backend)
const appState = {
  user: null,
  route: '',
  data: {
    courses: [], categories: [], instructors: [], settings: {},
    transactions: [], users: [], coupons: [], reviews: []
  }
};

/* ---------------- API WRAPPER ---------------- */
async function apiCall(action, payload = {}) {
  try {
    const response = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, // CORS Hack for GAS
      body: JSON.stringify({
        action: action,
        payload: payload,
        token: localState.getToken()
      })
    });
    
    const res = await response.json();
    if(res.status === 'error' && res.message.includes('Sesi telah berakhir')) {
        logout();
    }
    return res;
  } catch (err) {
    console.error("API Error:", err);
    return { status: "error", message: "Gagal terhubung ke server." };
  }
}

/* ---------------- HELPERS ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const $$= (s,el=document)=>[...el.querySelectorAll(s)];
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtRp = n => 'Rp '+Number(n||0).toLocaleString('id-ID');
const fmtDate = d => new Date(parseInt(d)).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});

function showLoader() { $('#loader').style.display = 'flex'; }
function hideLoader() { $('#loader').style.display = 'none'; }

function toast(msg, type='info'){
  const w = $('#toastWrap');
  const el = document.createElement('div');
  el.className='toast '+type;
  el.innerHTML = `<div style="flex:1"><b style="font-size:13px">${esc(msg)}</b></div><button onclick="this.parentNode.remove()" style="color:var(--muted)">✕</button>`;
  w.appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

function modal({title, body, foot, size=''}){
  const mb = $('#modalBack');
  mb.innerHTML = `<div class="modal ${size}">
    <div class="modal-head"><h3>${esc(title)}</h3><button onclick="closeModal()" class="btn icon ghost">✕</button></div>
    <div class="modal-body">${body}</div>
    ${foot?`<div class="modal-foot">${foot}</div>`:''}
  </div>`;
  mb.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){ $('#modalBack').classList.remove('open'); $('#modalBack').innerHTML=''; document.body.style.overflow=''; }
window.closeModal = closeModal;

/* ---------------- AUTHENTICATION & BOOTSTRAP ---------------- */
async function bootApp() {
  const token = localState.getToken();
  if(!token) {
    renderAuth('login');
    return;
  }

  showLoader();
  const res = await apiCall('fetch_app_data');
  hideLoader();

  if(res.status === 'success') {
    appState.user = res.data.user;
    appState.data = res.data; // Assign all backend data to memory
    appState.route = appState.user.role === 'admin' ? 'dashboard' : 'sdashboard';
    renderAppShell();
  } else {
    toast(res.message, 'danger');
    localState.clearToken();
    renderAuth('login');
  }
}

async function login(email, password) {
  showLoader();
  const res = await apiCall('login', { email, password });
  hideLoader();
  if(res.status === 'success') {
    localState.setToken(res.data.token);
    toast('Login berhasil', 'success');
    bootApp();
  } else {
    toast(res.message, 'danger');
  }
}

async function register(data) {
  showLoader();
  const res = await apiCall('register', data);
  hideLoader();
  if(res.status === 'success') {
    toast('Pendaftaran berhasil! Silakan login.', 'success');
    renderAuth('login');
  } else {
    toast(res.message, 'danger');
  }
}

function logout() {
  localState.clearToken();
  appState.user = null;
  renderAuth('login');
}

/* ============================================================
 * AUTH PAGES (UI)
 * ============================================================ */
function renderAuth(mode='login'){
  const siteName = appState.data.settings?.general?.name || 'EduFlow LMS';
  document.title = siteName + ' - ' + (mode==='login'?'Masuk':'Daftar');
  $('#app').innerHTML = `
  <div class="auth-wrap">
    <div class="auth-hero">
      <div class="flex items-center gap-2">
        <div style="width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:22px">🎓</div>
        <b style="font-size:20px">${esc(siteName)}</b>
      </div>
      <div>
        <h1>Platform LMS SaaS Modern & Aman</h1>
        <p>Didukung oleh Serverless Architecture. Kelola kursus, peserta, dan pembayaran dalam satu dashboard tersentralisasi.</p>
        <div class="auth-stats">
          <div><b>Secure</b><span style="opacity:.85">Token Auth</span></div>
          <div><b>Cloud</b><span style="opacity:.85">Backend Sync</span></div>
          <div><b>Fast</b><span style="opacity:.85">API Driven</span></div>
        </div>
      </div>
      <div style="opacity:.7;font-size:12px">© ${new Date().getFullYear()} EduFlow LMS</div>
    </div>
    <div class="auth-form">
      <div class="auth-card">
        ${mode==='login'?loginForm():registerForm()}
      </div>
    </div>
  </div>`;
  bindAuth(mode);
}

function loginForm(){
  return `
    <h2>Masuk ke Akun</h2>
    <p class="sub">Silakan masuk untuk melanjutkan.</p>
    <form id="loginForm">
      <div class="field"><label>Email</label><input class="input" type="email" name="email" required /></div>
      <div class="field"><label>Password</label><input class="input" type="password" name="password" required /></div>
      <button class="btn primary full" type="submit">Masuk</button>
      <div class="divider">atau</div>
      <button class="btn ghost full" type="button" onclick="renderAuth('register')">Buat akun baru</button>
      <div class="demo-creds mt-2">
        <b>🔐 Akun Demo:</b><br>
        Admin: <code>admin@lms.com</code> / <code>Admin123!</code><br>
        Peserta: <code>peserta@lms.com</code> / <code>Peserta123!</code>
      </div>
    </form>
  `;
}

function registerForm(){
  return `
    <h2>Buat Akun Baru</h2>
    <form id="regForm">
      <div class="field"><label>Nama Lengkap</label><input class="input" type="text" name="name" required /></div>
      <div class="field"><label>Email</label><input class="input" type="email" name="email" required /></div>
      <div class="field"><label>Password</label><input class="input" type="password" name="password" required minlength="8" /></div>
      <button class="btn primary full" type="submit">Daftar Sekarang</button>
      <div class="divider">atau</div>
      <button class="btn ghost full" type="button" onclick="renderAuth('login')">Sudah punya akun? Masuk</button>
    </form>
  `;
}

function bindAuth(mode){
  if(mode==='login'){
    $('#loginForm').onsubmit = e => {
      e.preventDefault();
      login(e.target.email.value, e.target.password.value);
    };
  } else {
    $('#regForm').onsubmit = e => {
      e.preventDefault();
      register({
        name: e.target.name.value,
        email: e.target.email.value,
        password: e.target.password.value
      });
    };
  }
}

/* ============================================================
 * MAIN APP SHELL
 * ============================================================ */
const NAV = {
  admin: [
    {id:'dashboard',label:'Dashboard',icon:'M3 12l9-9 9 9'},
    {id:'courses',label:'Manajemen Kursus',icon:'M4 6h16v12H4z'},
    {id:'students',label:'Peserta',icon:'M16 21v-2a4 4 0 00-4-4H6'},
    {id:'transactions',label:'Transaksi',icon:'M3 10h18'},
    {id:'settings',label:'Pengaturan',icon:'M12 15a3 3 0 100-6 3 3 0 000 6z'}
  ],
  student: [
    {id:'sdashboard',label:'Beranda',icon:'M3 12l9-9 9 9'},
    {id:'mycourses',label:'Kursus Saya',icon:'M4 6h16v12H4z'},
    {id:'catalog',label:'Katalog Kursus',icon:'M21 21l-4-4'},
    {id:'cart',label:'Keranjang',icon:'M3 3h2l.4 2M7 13h10'},
    {id:'profile',label:'Profil',icon:'M16 21v-2a4 4 0 00-4-4H6'}
  ]
};

function renderAppShell(){
  const isAdmin = appState.user.role === 'admin';
  const menu = isAdmin ? NAV.admin : NAV.student;

  $('#app').innerHTML = `
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="logo">🎓</div>
          <div><b>${esc(appState.data.settings?.general?.name||'EduFlow')}</b></div>
        </div>
        ${menu.map(it=>`
          <div class="nav-item ${appState.route===it.id?'active':''}" data-route="${it.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="${it.icon}"/></svg>
            ${it.label}
          </div>`).join('')}
        <div style="margin-top:auto;padding:20px 6px">
          <button class="nav-item" onclick="logout()" style="width:100%;color:#fca5a5">Logout</button>
        </div>
      </aside>
      <div class="main">
        <header class="topbar">
          <h1 id="pageTitle" style="text-transform:capitalize">${appState.route}</h1>
          <div class="flex-1"></div>
          <div class="avatar" onclick="document.querySelector('[data-route=profile]').click()">${esc(appState.user.name[0].toUpperCase())}</div>
        </header>
        <div class="page" id="page"></div>
      </div>
    </div>
  `;

  $$('[data-route]').forEach(el => el.onclick = () => {
    appState.route = el.dataset.route;
    renderAppShell(); // Re-render shell active state
  });

  renderPage();
}

/* ============================================================
 * PAGE ROUTER & VIEWS
 * ============================================================ */
function renderPage(){
  const el = $('#page');
  switch(appState.route) {
    case 'dashboard': renderAdminDashboard(el); break;
    case 'courses': renderAdminCourses(el); break;
    case 'students': renderAdminStudents(el); break;
    case 'transactions': renderAdminTransactions(el); break;
    case 'settings': renderAdminSettings(el); break;
    
    case 'sdashboard': renderStudentDashboard(el); break;
    case 'catalog': renderCatalog(el); break;
    case 'mycourses': renderMyCourses(el); break;
    case 'cart': renderCart(el); break;
    case 'profile': renderProfile(el); break;
    default: el.innerHTML = '<div class="empty">Halaman tidak ditemukan.</div>';
  }
}

/* ---------------- ADMIN VIEWS ---------------- */
function renderAdminDashboard(el) {
  const d = appState.data;
  const rev = d.transactions.filter(t=>t.status==='success').reduce((sum,t)=>sum+parseInt(t.amount),0);
  
  el.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="ic">👥</div><b>${d.users.length}</b><span>Total Peserta</span></div>
      <div class="stat"><div class="ic">📚</div><b>${d.courses.length}</b><span>Total Kursus</span></div>
      <div class="stat"><div class="ic">💰</div><b>${fmtRp(rev)}</b><span>Pendapatan</span></div>
      <div class="stat"><div class="ic">🛒</div><b>${d.transactions.length}</b><span>Transaksi</span></div>
    </div>
    <div class="card"><b class="text-lg">Transaksi Terbaru</b>
      <table class="table mt-2">
        <thead><tr><th>ID</th><th>User</th><th>Kursus</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>
          ${d.transactions.slice(0,5).map(t=>`<tr><td>${t.id}</td><td>${esc(t.userName)}</td><td>${esc(t.courseTitle)}</td><td>${fmtRp(t.amount)}</td><td><span class="badge success">${t.status}</span></td></tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderAdminCourses(el) {
  const d = appState.data;
  el.innerHTML = `
    <div class="page-head"><h2>Manajemen Kursus</h2><button class="btn primary" onclick="adminCourseModal()">+ Tambah Kursus</button></div>
    <div class="table-wrap"><table class="table">
      <thead><tr><th>Kursus</th><th>Harga</th><th>Peserta</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody>
        ${d.courses.map(c=>`<tr>
          <td><div class="flex items-center gap-2"><div class="av">${c.emoji}</div><b>${esc(c.title)}</b></div></td>
          <td>${fmtRp(c.price)}</td><td>${c.enrolled||0}</td>
          <td><span class="badge ${c.status==='published'?'success':'warn'}">${c.status}</span></td>
          <td>
             <button class="btn sm ghost" onclick="adminCourseModal('${c.id}')">Edit</button>
             <button class="btn sm ghost" onclick="adminModuleModal('${c.id}')">Modul</button>
             <button class="btn sm danger" onclick="deleteCourse('${c.id}')">Hapus</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  `;
}

window.adminCourseModal = (id = null) => {
  const c = id ? appState.data.courses.find(x=>x.id===id) : {title:'', price:0, emoji:'📘', description:'', status:'draft', level:'Pemula'};
  modal({title: id?'Edit Kursus':'Tambah Kursus',
    body: `<form id="cForm">
      <div class="field"><label>Judul</label><input class="input" name="title" value="${esc(c.title)}" required/></div>
      <div class="field"><label>Harga</label><input class="input" type="number" name="price" value="${c.price}" required/></div>
      <div class="field"><label>Deskripsi</label><textarea class="textarea" name="description" required>${esc(c.description)}</textarea></div>
      <div class="field"><label>Status</label>
        <select class="select" name="status"><option value="draft" ${c.status==='draft'?'selected':''}>Draft</option><option value="published" ${c.status==='published'?'selected':''}>Published</option></select>
      </div>
    </form>`,
    foot: `<button class="btn primary" onclick="saveCourse('${id||''}')">Simpan</button>`
  });
};

window.saveCourse = async (id) => {
  const f = $('#cForm');
  showLoader();
  const res = await apiCall('admin_save_course', {
    id: id || undefined,
    title: f.title.value, price: f.price.value, description: f.description.value, status: f.status.value,
    emoji: '📘', level: 'Pemula', duration: 10 // Defaults for demo
  });
  if(res.status === 'success') { await bootApp(); closeModal(); toast('Kursus disimpan','success'); }
  else { hideLoader(); toast(res.message, 'danger'); }
};

window.deleteCourse = async (id) => {
  if(!confirm("Yakin hapus kursus?")) return;
  showLoader();
  const res = await apiCall('admin_delete_course', {id});
  if(res.status==='success') { await bootApp(); toast('Terhapus','success'); }
  else { hideLoader(); toast(res.message, 'danger'); }
};

window.adminModuleModal = (courseId) => {
  const c = appState.data.courses.find(x=>x.id===courseId);
  modal({title: `Modul: ${c.title}`, size: 'lg',
    body: `
      <div class="mb-2">
        ${c.modules.map(m=>`<div class="list-row"><b>${esc(m.title)}</b> (${m.type}) <button class="btn sm danger ml-auto" onclick="deleteModule('${courseId}','${m.id}')">Hapus</button></div>`).join('')}
      </div>
      <form id="mForm" class="card">
        <b>Tambah Modul Baru</b>
        <div class="field mt-1"><label>Judul Modul</label><input class="input" name="title" required/></div>
        <div class="field"><label>Tipe</label><select class="select" name="type"><option value="video">Video</option><option value="pdf">PDF</option></select></div>
        <button type="button" class="btn primary" onclick="saveModule('${courseId}')">Tambah</button>
      </form>
    `
  });
}

window.saveModule = async (courseId) => {
  const f = $('#mForm');
  showLoader();
  const res = await apiCall('admin_save_module', {
    courseId, module: { title: f.title.value, type: f.type.value, duration: "10:00" }
  });
  if(res.status==='success') { await bootApp(); closeModal(); adminModuleModal(courseId); }
  else { hideLoader(); toast(res.message, 'danger'); }
}

window.deleteModule = async (courseId, moduleId) => {
  showLoader();
  const res = await apiCall('admin_delete_module', {courseId, moduleId});
  if(res.status==='success') { await bootApp(); closeModal(); adminModuleModal(courseId); }
  else { hideLoader(); toast(res.message, 'danger'); }
}

function renderAdminStudents(el) {
  const users = appState.data.users.filter(u=>u.role==='student');
  el.innerHTML = `
    <div class="page-head"><h2>Peserta (${users.length})</h2></div>
    <div class="table-wrap"><table class="table">
      <thead><tr><th>Nama</th><th>Email</th><th>Kursus Diikuti</th><th>Status</th></tr></thead>
      <tbody>${users.map(u=>`<tr><td><b>${esc(u.name)}</b></td><td>${esc(u.email)}</td><td>${u.enrolled.length}</td><td><span class="badge success">${u.status}</span></td></tr>`).join('')}</tbody>
    </table></div>
  `;
}

function renderAdminTransactions(el) {
  const trx = appState.data.transactions;
  el.innerHTML = `
    <div class="page-head"><h2>Transaksi</h2></div>
    <div class="table-wrap"><table class="table">
      <thead><tr><th>ID</th><th>User</th><th>Kursus</th><th>Nominal</th><th>Metode</th><th>Tanggal</th></tr></thead>
      <tbody>${trx.map(t=>`<tr><td>${t.id}</td><td>${esc(t.userName)}</td><td>${esc(t.courseTitle)}</td><td><b>${fmtRp(t.amount)}</b></td><td><span class="badge primary">${t.gateway}</span></td><td>${fmtDate(t.createdAt)}</td></tr>`).join('')}</tbody>
    </table></div>
  `;
}

function renderAdminSettings(el) {
  el.innerHTML = `
    <div class="page-head"><h2>Pengaturan</h2></div>
    <div class="card">
      <form id="sForm">
        <div class="field"><label>Nama Web</label><input class="input" name="name" value="${esc(appState.data.settings?.general?.name||'')}"/></div>
        <button type="button" class="btn primary" onclick="toast('Tersimpan secara lokal (Simulasi API)','success')">Simpan Pengaturan</button>
      </form>
    </div>
  `;
}


/* ---------------- STUDENT VIEWS ---------------- */
function renderStudentDashboard(el) {
  const d = appState.data;
  const enrolled = d.user.enrolled || [];
  const latest = d.courses.slice(-3);
  
  el.innerHTML = `
    <div class="page-head"><h2>Halo, ${esc(d.user.name)} 👋</h2></div>
    <div class="stats">
      <div class="stat"><div class="ic">📚</div><b>${enrolled.length}</b><span>Kursus Diikuti</span></div>
      <div class="stat"><div class="ic">🏆</div><b>${enrolled.filter(e=>e.progress>=100).length}</b><span>Diselesaikan</span></div>
    </div>
    
    <b class="text-lg mb-2" style="display:block">Rekomendasi Terbaru</b>
    <div class="grid-3">${latest.map(c=>renderCourseCard(c)).join('')}</div>
  `;
}

function renderCatalog(el) {
  const cs = appState.data.courses.filter(c=>c.status==='published');
  el.innerHTML = `
    <div class="page-head"><h2>Katalog Kursus</h2></div>
    <div class="grid-3">${cs.map(c=>renderCourseCard(c)).join('')}</div>
  `;
}

function renderCourseCard(c) {
  return `<div class="course-card" onclick="openCoursePreview('${c.id}')">
    <div class="course-thumb">${c.emoji}</div>
    <div class="course-body">
      <h3>${esc(c.title)}</h3>
      <div class="rating">⭐ ${c.rating} · ${c.enrolled} peserta</div>
      <div class="course-meta"><span class="badge">${c.level}</span><b style="color:var(--primary)">${fmtRp(c.price)}</b></div>
    </div>
  </div>`;
}

function renderMyCourses(el) {
  const enrolledIds = appState.data.user.enrolled.map(e=>e.courseId);
  const myCs = appState.data.courses.filter(c => enrolledIds.includes(c.id));
  
  el.innerHTML = `
    <div class="page-head"><h2>Kursus Saya</h2></div>
    <div class="grid-3">${myCs.map(c=>{
      const prog = appState.data.user.enrolled.find(e=>e.courseId===c.id).progress;
      return `<div class="course-card" onclick="openStudyRoom('${c.id}')">
        <div class="course-thumb">${c.emoji}</div>
        <div class="course-body">
          <h3>${esc(c.title)}</h3>
          <div class="progress-bar"><div style="width:${prog}%"></div></div>
          <div class="text-sm muted">${prog}% Selesai</div>
        </div>
      </div>`
    }).join('') || '<div class="empty">Belum ada kursus. Buka katalog untuk mulai belajar.</div>'}</div>
  `;
}

window.openCoursePreview = (cid) => {
  const c = appState.data.courses.find(x=>x.id===cid);
  const isEnrolled = appState.data.user.enrolled.some(e=>e.courseId===cid);
  
  modal({title: c.title, size: 'lg',
    body: `
      <div class="course-thumb" style="height:150px;border-radius:14px">${c.emoji}</div>
      <p class="mt-2">${esc(c.description)}</p>
      <h3 class="mt-2">Modul (${c.modules.length})</h3>
      ${c.modules.map((m,i)=>`<div class="list-row"><b>${i+1}. ${esc(m.title)}</b></div>`).join('')}
    `,
    foot: isEnrolled 
          ? `<button class="btn primary full" onclick="closeModal(); openStudyRoom('${cid}')">Lanjutkan Belajar</button>`
          : `<div class="text-xl font-bold" style="color:var(--primary);margin-right:auto">${fmtRp(c.price)}</div>
             <button class="btn primary" onclick="addToCart('${cid}')">Tambahkan ke Keranjang</button>`
  });
}

window.addToCart = (cid) => {
  const cart = localState.getCart();
  cart[cid] = 1;
  localState.setCart(cart);
  toast('Ditambahkan ke keranjang', 'success');
  closeModal();
}

function renderCart(el) {
  const cart = localState.getCart();
  const items = Object.keys(cart).map(id => appState.data.courses.find(c=>c.id===id)).filter(Boolean);
  const total = items.reduce((sum, c) => sum + parseInt(c.price), 0);

  el.innerHTML = `
    <div class="page-head"><h2>Keranjang Belanja</h2></div>
    ${items.length ? `
      <div class="grid-2">
        <div>
          ${items.map(c=>`<div class="card mb-1 flex items-center gap-2">
            <div class="av">${c.emoji}</div><div class="flex-1"><b>${esc(c.title)}</b></div><b>${fmtRp(c.price)}</b>
            <button class="btn sm danger" onclick="removeFromCart('${c.id}')">✕</button>
          </div>`).join('')}
        </div>
        <div class="card" style="height:fit-content">
          <div class="flex justify-between text-lg mb-2"><span>Total</span><b style="color:var(--primary)">${fmtRp(total)}</b></div>
          <button class="btn primary full" onclick="processCheckout()">Checkout & Bayar</button>
        </div>
      </div>
    ` : '<div class="empty">Keranjang kosong.</div>'}
  `;
}

window.removeFromCart = (id) => {
  const cart = localState.getCart(); delete cart[id]; localState.setCart(cart);
  renderAppShell();
}

window.processCheckout = async () => {
  const cart = localState.getCart();
  const items = Object.keys(cart).map(id => appState.data.courses.find(c=>c.id===id));
  const total = items.reduce((sum, c) => sum + parseInt(c.price), 0);

  showLoader();
  const res = await apiCall('checkout', { items, gateway: 'midtrans_demo', total });
  if(res.status === 'success') {
    localState.setCart({});
    await bootApp(); // Reload state
    toast('Pembayaran Berhasil! Selamat belajar.', 'success');
    appState.route = 'mycourses';
    renderAppShell();
  } else {
    hideLoader(); toast(res.message, 'danger');
  }
}

window.openStudyRoom = (cid) => {
  const c = appState.data.courses.find(x=>x.id===cid);
  const en = appState.data.user.enrolled.find(e=>e.courseId===cid);
  
  modal({title: `Belajar: ${c.title}`, size: 'xl',
    body: `
      <div class="grid" style="grid-template-columns: 2fr 1fr; gap:16px">
        <div>
           <div class="card" style="background:#000; color:#fff; aspect-ratio:16/9; display:grid; place-items:center">
              <span style="font-size:40px">▶ Video Player</span>
           </div>
           <p class="mt-2 text-lg">Pilih modul di sebelah kanan untuk memulai pembelajaran.</p>
        </div>
        <div class="card" style="height:400px; overflow-y:auto">
          <b class="mb-2 block">Daftar Modul</b>
          ${c.modules.map((m,i)=> {
            const isDone = en.completedModules.includes(m.id);
            return `<div class="list-row" style="cursor:pointer; background:${isDone?'var(--primary-soft)':'transparent'}" 
                      onclick="markModuleComplete('${cid}','${m.id}')">
              <div class="av" style="width:24px;height:24px;font-size:10px">${isDone?'✓':i+1}</div>
              <div class="flex-1 text-sm">${esc(m.title)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `
  });
}

window.markModuleComplete = async (cid, mid) => {
  showLoader();
  const res = await apiCall('mark_complete', {courseId: cid, moduleId: mid});
  if(res.status === 'success') {
    await bootApp(); // Refresh progress locally
    closeModal(); openStudyRoom(cid); // Reopen with updated state
    toast('Modul diselesaikan', 'success');
  } else {
    hideLoader(); toast(res.message, 'danger');
  }
}

function renderProfile(el) {
  const u = appState.data.user;
  el.innerHTML = `
    <div class="page-head"><h2>Profil</h2></div>
    <div class="card" style="max-width:500px">
      <form id="pForm">
        <div class="field"><label>Nama</label><input class="input" name="name" value="${esc(u.name)}" required/></div>
        <div class="field"><label>Email</label><input class="input" type="email" value="${esc(u.email)}" disabled/></div>
        <div class="field"><label>Password Baru</label><input class="input" type="password" name="password" placeholder="Isi untuk mengubah"/></div>
        <button type="submit" class="btn primary">Simpan Profil</button>
      </form>
    </div>
  `;
  
  $('#pForm').onsubmit = async (e) => {
    e.preventDefault();
    showLoader();
    const res = await apiCall('update_profile', {
      name: e.target.name.value,
      password: e.target.password.value || undefined
    });
    if(res.status === 'success') {
      await bootApp(); toast('Profil diperbarui', 'success');
    } else {
      hideLoader(); toast(res.message, 'danger');
    }
  }
}

/* ============================================================
 * INITIALIZATION
 * ============================================================ */
document.documentElement.dataset.theme = 'light';
bootApp();

</script>
